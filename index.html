<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6; --fg: #1a1a1a; --card: #ffffff; --card-hover: #f5f3ef;
  --border: #e5e2db; --muted: #999; --accent: #e85d4a; --accent-soft: #fef0ed;
  --input-bg: #f5f3ef; --sidebar-bg: #fcfbf8; --header-bg: #fff;
}
[data-theme="dark"] {
  --bg: #0f0f13; --fg: #e8e6e1; --card: #1a1a1f; --card-hover: #222228;
  --border: #2a2a30; --muted: #777; --accent: #e85d4a; --accent-soft: #2d1f1c;
  --input-bg: #16161a; --sidebar-bg: #13131a; --header-bg: #15151a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito','Segoe UI',sans-serif; background:var(--bg); color:var(--fg); transition:background .25s,color .25s; }
input,select,textarea,button { font-family:inherit; }
.header { background:var(--header-bg); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:100; }
.logo { font-size:20px; font-weight:900; letter-spacing:-.5px; white-space:nowrap; }
.count-badge { font-size:11px; color:var(--muted); font-weight:600; }
.spacer { flex:1; }
.btn { border:none; border-radius:10px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:5px; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--fg); }
.btn-danger { background:#e55; color:#fff; }
.layout { display:flex; height:calc(100vh - 49px); overflow:hidden; }
.sidebar { width:360px; min-width:360px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--sidebar-bg); overflow:hidden; }
.sidebar-search { padding:12px 12px 6px; }
.search-wrap { position:relative; }
.search-wrap .icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--muted); pointer-events:none; }
.search-input { width:100%; padding:9px 10px 9px 34px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--fg); font-size:13px; outline:none; }
.filters { padding:0 12px 6px; display:flex; gap:6px; }
.filter-select { flex:1; padding:7px 6px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--fg); font-size:11.5px; outline:none; }
.results-count { padding:0 14px 5px; font-size:11px; color:var(--muted); font-weight:600; }
.games-list { flex:1; overflow-y:auto; padding:0 12px 12px; -webkit-overflow-scrolling:touch; }
.game-card { padding:12px 14px; border-radius:12px; cursor:pointer; border:1.5px solid var(--border); margin-bottom:7px; background:var(--card); transition:background .12s,border-color .12s; }
.game-card:hover { background:var(--card-hover); }
.game-card.active { background:var(--accent-soft); border-color:var(--accent); }
.card-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.card-icon { font-size:16px; }
.card-name { font-weight:700; font-size:14px; flex:1; line-height:1.3; }
.card-tags { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.tag { font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:20px; }
.tag-muted { font-size:10.5px; color:var(--muted); }
.detail { flex:1; overflow-y:auto; padding:20px 24px; -webkit-overflow-scrolling:touch; }
.detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--muted); text-align:center; padding:40px; }
.detail-empty .big-icon { font-size:56px; margin-bottom:14px; }
.detail-header { display:flex; align-items:flex-start; gap:10px; margin-bottom:18px; }
.detail-icon { font-size:32px; }
.detail-title { font-size:22px; font-weight:900; line-height:1.2; }
.detail-tags { display:flex; gap:5px; margin-top:7px; flex-wrap:wrap; }
.detail-actions { display:flex; gap:5px; margin-left:auto; flex-shrink:0; }
.detail-actions .btn { padding:6px 10px; font-size:13px; }
.meta-row { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.meta-chip { background:var(--input-bg); border-radius:10px; padding:9px 14px; display:flex; align-items:center; gap:7px; }
.meta-label { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; }
.meta-value { font-size:12.5px; font-weight:600; }
.field-block { margin-bottom:15px; }
.field-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:3px; }
.field-value { font-size:13.5px; line-height:1.7; }
.confirm-box { background:var(--accent-soft); border:1px solid #e55; border-radius:12px; padding:14px; margin-top:14px; }
.confirm-box .title { font-weight:700; margin-bottom:8px; font-size:14px; }
.confirm-box .btns { display:flex; gap:8px; }
.edit-form { max-width:660px; }
.edit-form h2 { font-size:20px; font-weight:800; margin-bottom:18px; }
.form-field { margin-bottom:12px; }
.form-field label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:3px; display:block; }
.form-field input, .form-field textarea, .form-field select { width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--fg); font-size:13.5px; outline:none; }
.form-field textarea { resize:vertical; min-height:80px; }
.form-row { display:flex; gap:10px; }
.form-row > div { flex:1; }
.extra-types { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.extra-btn { padding:3px 9px; border-radius:20px; font-size:10.5px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; }
.extra-btn.on { font-weight:600; }
.form-actions { display:flex; gap:8px; margin-top:10px; }
.reset-btn { position:fixed; bottom:6px; right:6px; background:none; border:none; color:var(--border); font-size:8px; cursor:pointer; opacity:.3; z-index:10; }
.reset-btn:hover { opacity:.8; }

/* Overlay for mobile */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:90; }
.mobile-menu { display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--fg); padding:2px; }
.mobile-back { display:none; background:none; border:none; font-size:14px; cursor:pointer; color:var(--accent); font-weight:700; padding:6px 0; margin-bottom:8px; }

/* Desktop: > 900 */
@media(max-width:900px) {

</div>
<button class="reset-btn" id="resetBtn" title="Сброс игротеки">reset</button>

<script>
const TYPE_INFO={ИЗ:{l:"ИЗ",f:"Знакомство (имя)",c:"#E8594F",i:"👋"},ПЗ:{l:"ПЗ",f:"Подробное знакомство",c:"#F2994A",i:"🔍"},ИЗЗ:{l:"ИЗЗ",f:"Закрепление знакомства",c:"#F2C94C",i:"🧠"},ПТБ:{l:"ПТБ",f:"Тактильный барьер",c:"#6FCF97",i:"🤝"},ИВЛ:{l:"ИВЛ",f:"Выявление лидеров",c:"#2F80ED",i:"👑"},"ИС/С":{l:"ИС/С",f:"Сплочение",c:"#9B51E0",i:"🔗"},ПЭФ:{l:"ПЭФ",f:"Повышение эмоц. фона",c:"#FF6B6B",i:"🎉"},СЭФ:{l:"СЭФ",f:"Снижение эмоц. фона",c:"#56CCF2",i:"🌙"},МПВ:{l:"МПВ",f:"Межполовое взаимод.",c:"#FF78CB",i:"💞"},"Игры с залом":{l:"Игры с залом",f:"Игры с залом",c:"#BB6BD9",i:"🎤"},Минутки:{l:"Минутки",f:"Минутки",c:"#27AE60",i:"⏱️"},Розыгрыши:{l:"Розыгрыши",f:"Розыгрыши",c:"#F39C12",i:"🃏"},Последействие:{l:"Последействие",f:"Последействие",c:"#E17055",i:"💫"},Доверие:{l:"Доверие",f:"Доверие",c:"#00B894",i:"🫶"},Здоровалки:{l:"Здоровалки",f:"Здоровалки",c:"#FDCB6E",i:"☀️"},Разбивки:{l:"Разбивки",f:"Разбивки",c:"#0984E3",i:"✂️"}};
const ALL_TYPES=Object.keys(TYPE_INFO);
const AGE_OPTS=["младший (6-10 лет)","средний (11-14 лет)","старший (15-18 лет)","универсальный"];
const ti=t=>TYPE_INFO[t]||{l:t,f:t,c:"#888",i:"🎮"};

function parseLoc(loc){
  if(!loc||loc==="—")return{location:null,requisit:null};
  const m=loc.match(/Локация:\s*([^.]+)\.\s*Реквизит:\s*(.+)/i);
  if(!m)return{location:loc,requisit:null};
  const rawLoc=m[1].trim(),rawReq=m[2].trim();
  const isNoLoc=/без привязки/i.test(rawLoc);
  const isNoReq=rawReq==="—"||rawReq==="-"||rawReq==="";
  return{location:isNoLoc?null:rawLoc, requisit:isNoReq?null:rawReq};
}
function hasRequisit(loc){return parseLoc(loc).requisit!==null;}

const GAMES_KEY="camp_games_v3";
const INITIAL_GAMES=/*GAMES_JSON_START*/[{"name":"Весёлое знакомство в домиках","type":"ИЗ","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: улица или просторное помещение. Реквизит: —","legend":"Ребята, мы оказались в волшебной деревне, где у каждого жителя есть свой домик. Но домики перепутались, и теперь каждому нужно найти соседей! Для этого мы будем бегать от домика к домику и узнавать, как зовут тех, кто там живёт. Давайте знакомиться!","rules":"На площадке обозначаются 5-6 «домиков» (круги мелом или просто углы). Участники свободно бегают. По свистку ведущего все забегают в ближайший домик (по 4-6 человек). Внутри каждый быстро называет своё имя и машет рукой. Через 20 секунд ведущий снова свистит — все выбегают и бегают, пока не прозвучит новый свисток. Домики менять обязательно — нельзя забегать в тот же. Проводится 5-7 раундов, пока все не перезнакомятся.","end":"Деревня ожила — теперь все соседи знают друг друга!"},{"name":"Мячик-знакомка","type":"ИЗ","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: мяч (или любой мягкий предмет для перебрасывания)","legend":"У нас есть волшебный мячик, и он очень любопытный — хочет узнать, как зовут каждого из вас! Когда мячик прилетает к вам в руки, он просит вас громко назвать своё имя. А потом его нужно отправить к тому, чьё имя он ещё не знает. Поможем мячику узнать всех?","rules":"Участники встают в круг. Ведущий держит мяч, называет своё имя и бросает мяч любому участнику. Тот ловит мяч, громко называет своё имя и бросает мяч другому. Мяч нужно бросать тем, кто ещё не представился. Игра заканчивается, когда все назвали свои имена. Можно провести второй круг быстрее.","end":"Мячик доволен — теперь он знает каждого из вас!"},{"name":"Имя и суперсила","type":"ИЗ","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, в нашем отряде собрались настоящие супергерои. Каждый герой носит своё имя и обладает уникальной суперсилой. Сейчас каждый из вас встанет в позу супергероя, назовёт своё имя и покажет свою суперсилу. А весь отряд повторит за вами! Готовы раскрыть свои способности?","rules":"Участники стоят в кругу. Каждый по очереди делает шаг вперёд, принимает «геройскую» позу (руки в боки, кулак вверх и т.д.), громко называет своё имя и показывает движение-«суперсилу» (удар молнии, невидимость, полёт). Все хором повторяют имя и копируют позу с движением. Позы и суперсилы не должны повторяться. Игра завершается, когда все представились.","end":"Вот какая мощная команда супергероев собралась!"},{"name":"Паутина имён","type":"ИЗ","extraTypes":["ИС/С"],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: клубок ниток или верёвка","legend":"Ребята, у меня в руках волшебная нить. Каждый из вас, назвав своё имя, перебросит клубок кому-то другому, оставив конец нити у себя. Постепенно между нами появится настоящая паутина — она покажет, что теперь мы все связаны друг с другом. Давайте сплетём эту сеть!","rules":"Участники стоят в кругу. Ведущий держит клубок, называет своё имя и, зажав конец нити, бросает клубок любому участнику напротив. Тот ловит, называет своё имя, зажимает нить и бросает клубок дальше. Так продолжается, пока все не представятся и в центре круга не образуется паутина из нитей. Бросать нужно тем, у кого ещё нет нити.","end":"Посмотрите, какая крепкая паутина у нас получилась — а всё потому, что каждый из вас внёс свой вклад."},{"name":"Визитка за 10 секунд","type":"ИЗ","extraTypes":[],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники свободно перемещаются по пространству. По сигналу ведущего каждый должен найти себе пару и за 10 секунд «вручить визитку» — назвать своё имя и пожать руку. По следующему сигналу пары меняются. Задача — за отведённое время познакомиться с максимальным количеством людей. В конце ведущий проверяет: просит нескольких участников назвать имена тех, с кем они познакомились.","end":"—"},{"name":"Ритм имён","type":"ИЗ","extraTypes":["ПЭФ"],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в кругу. Ведущий задаёт ритм, хлопая в ладоши. Под этот ритм первый участник произносит своё имя дважды. Затем следующий по кругу делает то же самое. После полного круга задание усложняется: на первые хлопки — своё имя, на вторые — имя любого другого участника, и тот продолжает. Кто сбивается с ритма — встаёт в центр круга и танцует несколько секунд.","end":"—"},{"name":"Меня зовут и я люблю","type":"ИЗ","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в кругу. Каждый по очереди называет своё имя и показывает жест, который ему нравится. Все остальные хором повторяют имя и жест. Так продолжается, пока все не представятся. Жесты не должны повторяться.","end":"—"},{"name":"Имя в ладоши","type":"ИЗ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в кругу. По очереди каждый прохлопывает своё имя по слогам, а весь круг повторяет хлопки и имя в унисон. После полного круга ведущий ускоряет темп. Игра завершается, когда отряд пройдёт круг на максимальной скорости.","end":"—"},{"name":"Здравствуй, это я!","type":"ИЗ","extraTypes":["Здоровалки"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники свободно ходят по площадке. По команде ведущего «Стоп!» каждый должен остановиться и повернуться к ближайшему человеку. Оба одновременно указывают друг на друга и говорят: «Здравствуй, это я — ...!» и называют своё имя. Затем пожимают друг другу руки и расходятся. Игра длится 5-7 раундов.","end":"—"},{"name":"Эхо","type":"ИЗ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Мы попали в горы, а в горах живёт эхо! Каждый из вас прокричит своё имя, а горное эхо — то есть все остальные — повторит его точь-в-точь. Эхо должно звучать так же громко и с той же интонацией. Давайте проверим, какое у нас эхо!","rules":"Участники стоят в кругу. Первый участник громко произносит своё имя с любой интонацией и громкостью. Весь остальной круг хором повторяет имя, стараясь скопировать интонацию и громкость. Затем следующий по кругу представляется, и группа повторяет. Игра завершается после полного круга.","end":"Вот это было мощное эхо! Горы запомнили каждого из нас."},{"name":"Волшебная шляпа","type":"ПЗ","extraTypes":[],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: любой головной убор (кепка, панама, шляпа)","legend":"Ребята, у меня есть волшебная шляпа! Когда она оказывается на голове, она раскрывает секреты: она заставляет рассказать о себе что-то интересное. Кто наденет шляпу, должен будет назвать своё имя и рассказать о своей самой любимой вещи на свете. Шляпа ждёт смельчаков!","rules":"Участники сидят в кругу. Ведущий надевает шляпу, называет своё имя и рассказывает о любимой вещи. Затем передаёт шляпу соседу. Тот надевает шляпу, называет имя и свою любимую вещь. Шляпа передаётся по кругу, пока все не выступят.","end":"Волшебная шляпа узнала о каждом из вас что-то особенное. Теперь она довольна и может отдохнуть."},{"name":"Ромашка желаний","type":"ПЗ","extraTypes":[],"age":"младший (6-10 лет)","time":"20-25 минут","loc":"Локация: помещение. Реквизит: бумага, ножницы, карандаши/фломастеры (подручные средства)","legend":"Ребята, давайте вырастим нашу волшебную ромашку! У каждого из вас будет свой лепесток, на котором вы напишете своё имя и нарисуете то, о чём мечтаете. Потом мы соберём все лепестки в одну большую ромашку и узнаем, какие мечты живут в нашем отряде!","rules":"Каждый участник получает лист бумаги и вырезает из него лепесток. На лепестке пишет своё имя и рисует свою мечту или любимое занятие. Затем по очереди каждый выходит в центр, показывает свой лепесток, называет имя и рассказывает, что нарисовал и почему. После рассказа лепесток прикрепляется к общей серединке на стене или полу. Игра завершается, когда ромашка собрана полностью.","end":"Посмотрите, какая красивая ромашка у нас выросла! В ней — мечты каждого из нас."},{"name":"Две правды и ложь","type":"ПЗ","extraTypes":["ПЭФ"],"age":"средний (11-14 лет)","time":"20-30 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу. Каждый по очереди называет своё имя и произносит три факта о себе: два — правда, один — ложь. Остальные обсуждают и голосуют, какой факт является ложью. После голосования рассказчик раскрывает правильный ответ. Факты должны быть интересными и неочевидными.","end":"—"},{"name":"Интервью по кругу","type":"ПЗ","extraTypes":[],"age":"средний (11-14 лет)","time":"20-30 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Представьте, что каждый из вас — известная личность, а ваш сосед справа — журналист, который берёт у вас интервью для самого популярного журнала. У журналиста есть всего минута, чтобы узнать о вас самое важное и интересное. А потом он представит вас всему отряду. Готовы к славе?","rules":"Участники разбиваются на пары. В течение 1 минуты один расспрашивает другого: имя, увлечения, любимая музыка, интересный факт. Потом роли меняются. После этого каждый по очереди встаёт и представляет отряду своего соседа. Игра завершается, когда все представлены.","end":"Теперь каждый из нас — звезда, о которой знает весь отряд."},{"name":"Карта личности","type":"ПЗ","extraTypes":[],"age":"старший (15-18 лет)","time":"25-30 минут","loc":"Локация: помещение. Реквизит: листы бумаги А4, ручки/карандаши","legend":"—","rules":"Каждый участник получает лист бумаги. По центру пишет своё имя. Затем ведущий задаёт пять категорий по очереди. Участник записывает ответ в соответствующую область листа. После заполнения все по очереди представляют свою «карту личности» отряду. Остальные могут задать один дополнительный вопрос.","end":"—"},{"name":"Ассоциации о себе","type":"ПЗ","extraTypes":[],"age":"старший (15-18 лет)","time":"20-25 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу. Ведущий называет категорию (например: «если бы ты был музыкальным жанром»). Каждый по очереди называет своё имя, свою ассоциацию и объясняет, почему выбрал именно её. Ведущий озвучивает 4-5 категорий за всю игру. Повторять ассоциации других участников нельзя.","end":"—"},{"name":"Клубок историй","type":"ПЗ","extraTypes":[],"age":"универсальный","time":"20-25 минут","loc":"Локация: без привязки к локации. Реквизит: клубок ниток","legend":"У меня в руках клубок, и этот клубок умеет собирать истории. Каждый из вас расскажет что-то о себе, намотает нить на палец и передаст клубок дальше. В конце все наши истории будут связаны одной нитью — и это сделает нас ближе друг к другу. Начнём!","rules":"Участники сидят в кругу. Ведущий держит клубок, наматывает нить на палец, называет своё имя и рассказывает о себе одну интересную деталь. Затем бросает клубок любому участнику. Тот наматывает нить, представляется и рассказывает о себе. Игра продолжается, пока все не представятся.","end":"Посмотрите, какая нить нас связала — в ней история каждого."},{"name":"Рюкзак путешественника","type":"ПЗ","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Представьте, что мы отправляемся в самое невероятное путешествие! Но в рюкзак можно положить только три вещи, которые расскажут всё о вас. Что вы возьмёте?","rules":"Участники сидят в кругу. Каждый по очереди называет своё имя и три «предмета», которые он бы взял в путешествие. Каждый предмет нужно объяснить. Остальные могут задать один уточняющий вопрос. Игра завершается, когда все собрали свой рюкзак.","end":"Рюкзаки собраны! Теперь мы знаем, что для каждого из вас самое ценное."},{"name":"Три слова обо мне","type":"ПЗ","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в кругу. Каждый по очереди называет своё имя и три слова, которые лучше всего его описывают. Остальные запоминают. После полного круга ведущий показывает на случайного участника, и отряд хором пытается вспомнить его три слова.","end":"—"},{"name":"Звёздное небо","type":"ПЗ","extraTypes":[],"age":"универсальный","time":"20-25 минут","loc":"Локация: помещение. Реквизит: бумага, карандаши/ручки","legend":"Ребята, представьте, что каждый из вас — звезда на ночном небе. У каждой звезды есть своё название и свой особенный свет. Сейчас каждый нарисует свою звезду, подпишет имя и напишет на каждом луче что-то важное о себе. Потом мы повесим все звёзды на наше общее небо и познакомимся поближе!","rules":"Каждый участник рисует звезду с пятью лучами. В центре пишет своё имя. На каждом луче — ответ на вопрос ведущего. Затем каждый по очереди представляет свою звезду отряду. Все звёзды крепятся на стену, создавая «небо отряда».","end":"Вот оно — наше звёздное небо! Каждая звезда в нём уникальна."},{"name":"Кто пропал?","type":"ИЗЗ","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: помещение. Реквизит: большое покрывало или плед","legend":"Ребята, в нашем отряде завёлся невидимка! Он умеет прятаться так, что его никто не замечает. Ваша задача — внимательно посмотреть друг на друга и, когда кто-то исчезнет, назвать имя того, кто стал невидимкой. Справитесь?","rules":"Все участники стоят в кругу и закрывают глаза. Ведущий тихо касается плеча одного участника — тот приседает, и ведущий накрывает его покрывалом. По команде «Открыть глаза!» все осматриваются и пытаются назвать имя спрятанного. Кто первый правильно назовёт имя — становится следующим, кого прячут. Игра проводится 5-7 раундов.","end":"Невидимка побеждён! Вы знаете друг друга так хорошо, что спрятаться невозможно."},{"name":"Дотронься до...","type":"ИЗЗ","extraTypes":["ПТБ"],"age":"младший (6-10 лет)","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники свободно стоят. Ведущий говорит: «Дотроньтесь до того, кого зовут...» и называет имя одного из участников. Все должны быстро найти этого человека и дотронуться до него. Тот, кого нашли последним, становится следующим ведущим и называет имя другого участника. Игра продолжается 5-7 раундов.","end":"—"},{"name":"Бинго имён","type":"ИЗЗ","extraTypes":[],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: помещение. Реквизит: листы бумаги, ручки (подручные средства)","legend":"—","rules":"Каждый участник получает лист бумаги и расчерчивает сетку 5×5. В каждую клетку нужно вписать имя одного члена отряда. Затем ведущий вытаскивает из шапки случайные бумажки с именами и называет их. Участники зачёркивают совпавшие имена. Кто первый зачеркнёт линию — кричит «Бинго!» и побеждает. Проводится 2-3 раунда.","end":"—"},{"name":"Поменяйтесь те, кто...","type":"ИЗЗ","extraTypes":["ПЭФ"],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: стулья или обозначенные места (на один меньше, чем участников)","legend":"—","rules":"Все участники сидят в кругу на стульях, один — водящий — стоит в центре. Водящий говорит: «Поменяйтесь местами те, кто...» и добавляет признак. Все, кто подходит, должны поменяться местами, а водящий пытается занять свободный стул. Оставшийся без стула становится водящим. Игра длится 10-15 минут.","end":"—"},{"name":"Фоторобот","type":"ИЗЗ","extraTypes":[],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий описывает одного из участников, не называя имени: цвет одежды, особенности внешности, где стоит/сидит. Остальные должны угадать, о ком идёт речь, и назвать его имя. Кто угадал первым — описывает следующего. Игра проводится 7-10 раундов.","end":"—"},{"name":"Алфавитная шеренга","type":"ИЗЗ","extraTypes":["ИВЛ"],"age":"старший (15-18 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий даёт команду: за 60 секунд отряд должен выстроиться в шеренгу в алфавитном порядке по именам. Участники должны узнать или вспомнить имена друг друга и самоорганизоваться. Ведущий проверяет порядок, проходя по шеренге. Игра завершается при правильном построении.","end":"—"},{"name":"Мяч по кругу с именами","type":"ИЗЗ","extraTypes":[],"age":"универсальный","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: мяч","legend":"—","rules":"Участники стоят в кругу. Ведущий бросает мяч любому участнику, при этом называя его имя. Тот ловит и бросает другому, тоже называя имя того, кому бросает. Если имя названо неправильно, бросающий садится на корточки и может «воскреснуть», если кто-то правильно назовёт его имя и бросит ему мяч.","end":"—"},{"name":"Привет тебе, ...!","type":"ИЗЗ","extraTypes":["Здоровалки"],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники свободно ходят по площадке. По сигналу ведущего каждый должен найти ближайшего человека, назвать его по имени и сказать: «Привет тебе, [имя]!» и пожать руку. Если имя забыли — нужно честно спросить. За каждое правильно названное имя участник загибает один палец на руке. Побеждает тот, кто за 5 раундов загнёт больше пальцев.","end":"—"},{"name":"Угадай по описанию","type":"ИЗЗ","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу. Ведущий шёпотом говорит одному участнику имя кого-то из круга. Этот участник должен описать загаданного человека тремя характеристиками, не называя имени. Кто первый правильно назовёт имя — получает право описывать следующего. Игра длится 7-10 раундов.","end":"—"},{"name":"Встаньте те, кого зовут...","type":"ИЗЗ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу. Ведущий произносит: «Встаньте те, кого зовут...» и называет имя. Все с этим именем встают, а остальные хлопают им. Задача ведущего — пройтись по всем именам, не пропустив никого. Ведущий меняется каждые 5 имён. Игра заканчивается, когда все имена были названы.","end":"—"},{"name":"Атомы и молекулы","type":"ПТБ","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"10 минут","loc":"Локация: улица или просторное помещение. Реквизит: —","legend":"Представьте, что все вы — маленькие атомы, которые свободно летают в пространстве. Но когда я крикну число, атомы должны мгновенно соединиться в молекулы по столько человек, сколько я назову. Кто не успел — выполняет весёлое задание. Атомы, начинайте двигаться!","rules":"Участники свободно перемещаются по площадке. Ведущий называет число. Все должны быстро собраться в группы по столько человек, схватившись за руки. Кто остался без группы — выполняет задание. Ведущий каждый раз называет разные числа. Игра длится 5-7 раундов.","end":"Атомы устали, но все молекулы собраны!"},{"name":"Ручеёк","type":"ПТБ","extraTypes":["МПВ"],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, давайте превратимся в весёлый лесной ручеёк! Ручеёк течёт по лесу, и каждый, кто в него попадает, находит себе друга. Встаём парами, поднимаем руки и готовимся журчать!","rules":"Участники встают парами друг за другом, образуя коридор, и поднимают руки, соединяя их. Один водящий проходит под поднятыми руками, выбирает любого из стоящих, берёт его за руку и ведёт через ручеёк. Они встают в конец парой. Оставшийся без пары участник идёт в начало и проходит через ручеёк, выбирая себе нового напарника. Игра длится 10-15 минут.","end":"Ручеёк весело побежал дальше, а мы теперь ближе друг к другу."},{"name":"Путаница","type":"ПТБ","extraTypes":["ИС/С"],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, мы превращаемся в один огромный клубок! Сейчас вы возьмёте друг друга за руки — но не соседей, а кого-то через круг — и запутаетесь. А потом, не разжимая рук, попробуете распутаться обратно в ровный круг. Звучит просто? Давайте проверим!","rules":"Участники встают в тесный круг. Каждый протягивает правую руку и берёт за руку кого-то напротив. Затем то же самое с левой рукой. Образуется запутанный клубок. Задача — не разжимая рук, распутаться и встать в один или несколько кругов. Можно перешагивать друг через друга, пролезать под руками. Игра завершается, когда клубок распутан.","end":"Клубок распутан! Вы отлично работали вместе."},{"name":"Электрический ток","type":"ПТБ","extraTypes":[],"age":"средний (11-14 лет)","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в кругу и берутся за руки. Ведущий отправляет «ток» — лёгко сжимает руку соседу справа. Тот передаёт дальше. «Ток» должен пройти весь круг и вернуться к ведущему. Засекается время. Задача — пустить ток как можно быстрее. Проводится 3-4 раунда с улучшением времени.","end":"—"},{"name":"Падение на доверии","type":"ПТБ","extraTypes":["Доверие"],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Сейчас мы проверим, насколько мы можем доверять друг другу. Каждый из вас встанет в центр круга, закроет глаза и позволит себе упасть в любую сторону. А стоящие вокруг мягко поймают и поставят обратно. Это требует смелости — но ваш отряд рядом.","rules":"Участники стоят в тесном кругу плечом к плечу. Один человек встаёт в центр, скрещивает руки на груди, закрывает глаза и начинает падать в любую сторону. Стоящие в кругу мягко ловят его и возвращают в вертикальное положение. Через 30-40 секунд центральный меняется. Ведущий строго следит за безопасностью.","end":"—"},{"name":"Скала","type":"ПТБ","extraTypes":[],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: улица или помещение с длинной скамейкой/бордюром. Реквизит: скамейка, бордюр или длинная доска","legend":"—","rules":"Все участники встают на длинную скамейку или бордюр плечом к плечу. Задача — поменяться местами по какому-либо признаку, не спрыгивая со скамейки. Участникам придётся обнимать друг друга, придерживать, протискиваться. Если кто-то спрыгнул — начинаем сначала. Игра завершается при правильном построении.","end":"—"},{"name":"Вагончики","type":"ПТБ","extraTypes":["ПЭФ"],"age":"универсальный","time":"10 минут","loc":"Локация: улица или просторное помещение. Реквизит: —","legend":"Мы — один длинный поезд! Каждый вагончик цепляется к предыдущему, кладя руки на плечи впереди стоящего. Поезд отправляется в путь, и машинист поведёт нас через все повороты. Но будьте внимательны: вагоны не должны расцепиться!","rules":"Участники выстраиваются в колонну. Каждый кладёт руки на плечи впереди стоящего. Первый — «машинист» — ведёт поезд по площадке. По сигналу ведущего первый уходит в конец, а второй становится машинистом. Если цепочка разрывается — поезд останавливается. Игра длится 10 минут.","end":"Поезд прибыл на станцию! Все вагончики доехали."},{"name":"Зеркало","type":"ПТБ","extraTypes":[],"age":"универсальный","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники разбиваются на пары и встают друг напротив друга. Один — «человек», другой — «зеркало». Человек медленно двигается, делает жесты, мимику, а зеркало в точности повторяет все движения. Через минуту роли меняются. По сигналу пары меняются. Проводится 4-5 смен партнёров.","end":"—"},{"name":"Скульптор и глина","type":"ПТБ","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники разбиваются на пары. Один — «скульптор», другой — «глина». Глина стоит расслабленно, скульптор аккуратно «лепит» из неё фигуру: перемещает руки, ноги, наклоняет голову, поворачивает корпус. Ведущий задаёт тему скульптуры. Через 2 минуты все любуются скульптурами, затем пары меняются ролями. Проводится 3-4 раунда.","end":"—"},{"name":"Гусеница","type":"ПТБ","extraTypes":["ИС/С"],"age":"универсальный","time":"10 минут","loc":"Локация: улица или просторное помещение. Реквизит: воздушные шарики (по числу участников минус один) или мячи","legend":"Наша задача — стать самой длинной и самой дружной гусеницей! Между каждым из вас будет зажат шарик — держать руками нельзя. Гусеница должна пройти от старта до финиша, не уронив ни одного шарика.","rules":"Участники встают друг за другом. Между каждой парой зажимается воздушный шарик. Руки убираются за спину. Задача — пройти от старта до финиша всей «гусеницей», не уронив шарики. Если шарик падает — вся гусеница останавливается. Игра завершается при достижении финиша.","end":"Гусеница доползла! Ни один шарик не потерян — вот это командная работа!"},{"name":"Крокодил-командир","type":"ИВЛ","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд делится на группы по 5-7 человек. Каждая группа получает от ведущего слово, которое нужно показать всем остальным без слов (пантомима). Группа сама решает, как это сделать. Ведущий наблюдает, кто берёт инициативу и координирует действия. Остальные группы угадывают слово. Проводится 3-4 раунда.","end":"—"},{"name":"Строим вместе","type":"ИВЛ","extraTypes":[],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: помещение или улица. Реквизит: кубики, палочки, камешки или любой подручный материал","legend":"—","rules":"Отряд делится на группы по 5-6 человек. Каждая группа получает одинаковый набор подручных материалов. Задача — за 10 минут построить самую высокую/красивую/устойчивую башню. Ведущий наблюдает за организацией в группах. Побеждает команда с лучшим результатом.","end":"—"},{"name":"Необитаемый остров","type":"ИВЛ","extraTypes":[],"age":"средний (11-14 лет)","time":"20-30 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Представьте: ваш корабль потерпел крушение, и вы оказались на необитаемом острове. Вам нужно выжить. Но у вас есть только 10 минут, чтобы составить план: что делать, кто за что отвечает, как спастись.","rules":"Отряд делится на группы по 5-7 человек. Каждая группа должна за 10 минут составить план выживания. После этого каждая группа представляет свой план. Ведущий наблюдает за процессом. Лучший план выбирается голосованием.","end":"Вы спасены! Ваши планы были блестящими."},{"name":"Верёвочный квадрат","type":"ИВЛ","extraTypes":["ИС/С"],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: длинная верёвка (3-5 м), повязки на глаза","legend":"—","rules":"Участникам завязывают глаза. Ведущий кладёт в руки группе верёвку, связанную в кольцо. Задача — с завязанными глазами выложить из верёвки ровный квадрат на земле. Разговаривать можно. Ведущий наблюдает, кто начинает руководить процессом.","end":"—"},{"name":"Дебаты за минуту","type":"ИВЛ","extraTypes":[],"age":"старший (15-18 лет)","time":"20-25 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд делится на группы по 5-6 человек. Ведущий озвучивает спорную тему. Группе даётся 3 минуты на подготовку аргументов «за». Затем каждая группа за 1 минуту представляет свои аргументы. Ведущий наблюдает, кто формирует позицию группы. Проводится 3-4 раунда.","end":"—"},{"name":"Скульптура из людей","type":"ИВЛ","extraTypes":["ПТБ"],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд делится на группы по 6-8 человек. Каждая группа получает задание: создать «скульптуру» из тел участников на заданную тему. На подготовку — 5 минут. Затем каждая группа представляет свою скульптуру, замирая в позе. Остальные угадывают тему. Ведущий наблюдает за лидерскими проявлениями. Проводится 2-3 раунда.","end":"—"},{"name":"Общий рисунок","type":"ИВЛ","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: помещение. Реквизит: большие листы бумаги (ватман), фломастеры/карандаши","legend":"—","rules":"Отряд делится на группы по 5-7 человек. Каждая группа получает большой лист и набор фломастеров. Ведущий задаёт тему рисунка. За 10 минут группа должна нарисовать общую картину. Ведущий наблюдает: кто предлагает композицию, координирует работу.","end":"—"},{"name":"Мост из бумаги","type":"ИВЛ","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: помещение. Реквизит: листы бумаги, скотч","legend":"—","rules":"Отряд делится на группы по 5-6 человек. Задача — из листов бумаги и скотча построить мост между двумя стульями, который выдержит максимальный вес. На строительство — 10 минут. Ведущий наблюдает, кто берёт на себя роль руководителя. Побеждает группа с самым прочным мостом.","end":"—"},{"name":"Слепой строй","type":"ИВЛ","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники закрывают глаза. Ведущий даёт задание: «Постройтесь по росту / по возрасту / по алфавиту имён» — с закрытыми глазами. Можно разговаривать и касаться друг друга. Ведущий наблюдает, кто начинает руководить. Даётся 3-5 минут на выполнение. Проводится 2-3 раунда.","end":"—"},{"name":"Экспедиция","type":"ИВЛ","extraTypes":[],"age":"универсальный","time":"20-25 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ваша команда учёных отправляется в научную экспедицию. Вам нужно подготовиться: выбрать капитана, распределить роли, составить маршрут и решить, что взять с собой. У вас 10 минут на подготовку.","rules":"Отряд делится на группы по 5-7 человек. Ведущий объявляет только задачу: «Подготовьте экспедицию». Никаких дополнительных указаний. Группа сама решает всё. Через 10 минут каждая группа презентует свой результат. Ведущий фиксирует, кто стал фактическим лидером.","end":"Экспедиции готовы к отправлению!"},{"name":"Одеяло","type":"ИС/С","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: улица или просторное помещение. Реквизит: большое покрывало или тент","legend":"Ребята, вы — одна большая команда! Перед вами покрывало. Ваша задача — все вместе встать на него, а потом перевернуть покрывало на другую сторону, не сходя с него. Ни одна нога не должна коснуться земли!","rules":"Все участники встают на покрывало. Задача — перевернуть покрывало на другую сторону, при этом ни один участник не должен сойти с него. Если хотя бы один человек наступил на землю — начинаем сначала. Делить на группы нельзя. Игра завершается при успешном перевороте.","end":"—"},{"name":"Паровозик вслепую","type":"ИС/С","extraTypes":["Доверие"],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: —","legend":"Ребята, вы — один длинный паровозик. Но паровозик потерял фары и едет в темноте! Только последний вагон видит дорогу. Он должен передать сигнал по цепочке, чтобы паровозик доехал до станции. Справитесь без слов?","rules":"Весь отряд выстраивается в колонну, кладя руки на плечи впереди стоящего. Все закрывают глаза, кроме последнего участника. Он управляет движением: хлопок по правому плечу — поворот направо, по левому — налево, по обоим — стоп. Сигнал передаётся по цепочке. Задача — весь отряд должен дойти до точки. Говорить нельзя.","end":"Паровозик приехал! Станция достигнута благодаря каждому из вас."},{"name":"Треугольник, квадрат, круг","type":"ИС/С","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: улица или просторное помещение. Реквизит: длинная верёвка, связанная в кольцо","legend":"—","rules":"Все участники берутся за верёвку, связанную в кольцо. Ведущий просит всех закрыть глаза. Затем даёт задание: «Постройте из верёвки квадрат». Участники, не открывая глаз, должны совместно вытянуть верёвку в нужную фигуру. Нельзя делиться на подгруппы — работает весь отряд. Проводится несколько фигур.","end":"—"},{"name":"Счёт до 30","type":"ИС/С","extraTypes":["СЭФ"],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники стоят в кругу с закрытыми глазами. Задача — всем отрядом досчитать от 1 до 30. Каждое число произносит только один человек. Если два человека одновременно произнесли число — счёт начинается сначала. Нельзя договариваться о порядке. Разделение на группы запрещено. Игра завершается, когда отряд досчитает до 30 без сбоев.","end":"—"},{"name":"Лабиринт","type":"ИС/С","extraTypes":["Доверие"],"age":"старший (15-18 лет)","time":"20-25 минут","loc":"Локация: улица или просторное помещение. Реквизит: повязка на глаза, предметы для «лабиринта» (стулья, кегли, бутылки — подручные средства)","legend":"Перед вами лабиринт. Один из вас пройдёт через него с завязанными глазами. Но провести его должен весь отряд — каждый может сказать только одно слово-подсказку. Ваша задача — довести товарища до финиша целым и невредимым.","rules":"На площадке расставляются препятствия. Одному участнику завязывают глаза. Каждый может произнести только одно слово-подсказку за один «шаг» идущего. Участники говорят по очереди по кругу. Если идущий задел препятствие — возвращается на старт. Игра завершается, когда участник доходит до финиша.","end":"—"},{"name":"Живая цепочка","type":"ИС/С","extraTypes":[],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: —","legend":"—","rules":"Весь отряд выстраивается в одну линию и берётся за руки. Задача — не разжимая рук, завязать цепочку в узел, а потом развязать обратно в ровную линию. Руки расцеплять нельзя. Каждый участник важен: если кто-то отпустил руки — начинаем сначала. Делить отряд на группы нельзя. Игра завершается, когда отряд завязал и развязал узел.","end":"—"},{"name":"Узел дружбы","type":"ИС/С","extraTypes":["ПТБ"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники встают в круг и протягивают руки к центру. Каждый берёт за руку двух разных людей (не соседей). Задача — не разжимая рук, распутаться в один круг. Работать должен весь отряд одновременно. Нельзя делиться на части. Игра завершается, когда все стоят в кругу, держась за руки.","end":"—"},{"name":"Общий хлопок","type":"ИС/С","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники стоят в кругу. Задача — одновременно хлопнуть в ладоши так, чтобы прозвучал один-единственный хлопок. Без команды, без счёта — просто почувствовать друг друга. Попытки повторяются до тех пор, пока хлопок не станет единым. Весь отряд работает как одно целое.","end":"—"},{"name":"Переправа","type":"ИС/С","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: листы бумаги или картона (5-6 штук)","legend":"Ребята, перед вами бурная река! Переплыть её невозможно — только перейти по камням. Но камней мало. Вам нужно перебраться на другой берег всем отрядом. Никого нельзя оставить позади!","rules":"На полу раскладываются «камни» (листы бумаги). Весь отряд стоит на одном «берегу». Задача — перебраться на другой, используя только камни. Наступать на «воду» нельзя. Камень, на котором никто не стоит, «уплывает». Делиться на группы нельзя. Игра завершается, когда все на другом берегу.","end":"Переправа удалась! Вы никого не оставили — вот это настоящая команда."},{"name":"Верёвочный круг","type":"ИС/С","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: длинная верёвка, связанная в кольцо","legend":"—","rules":"Все участники встают в круг и берутся за верёвку, связанную в кольцо. По команде все одновременно откидываются назад, натягивая верёвку. Затем ведущий даёт задания: всем вместе сесть, не отпуская верёвки; встать обратно. Если хоть один отпустит — все упадут. Каждый важен для устойчивости.","end":"—"},{"name":"Море волнуется раз","type":"ПЭФ","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Водящий стоит в центре и произносит: «Море волнуется раз, море волнуется два, море волнуется три — морская фигура, замри!» Все замирают в позе. Кто пошевелился или рассмеялся, становится следующим водящим. Тему можно менять: «лесная фигура», «космическая фигура» и т.д.","end":"—"},{"name":"Лавата","type":"ПЭФ","extraTypes":["ПТБ"],"age":"младший (6-10 лет)","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу, взявшись за руки, и двигаются по кругу, напевая: «Дружно танцуем мы — тра-та-та, тра-та-та — танец весёлый наш, это лавата». Ведущий останавливает и спрашивает: «Руки красивые?» Затем предлагает взяться за другую часть тела: уши, нос, колени, плечи. Каждый раунд — новая часть тела. Проводится 5-7 раундов.","end":"—"},{"name":"Зоопарк","type":"ПЭФ","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу. Ведущий назначает каждой тройке участников животное и движение: «слон», «обезьяна», «жираф». Ведущий резко показывает на кого-то и называет животное. Этот участник и его соседи должны мгновенно изобразить фигуру. Кто замешкался — становится в центр. Темп ускоряется.","end":"—"},{"name":"Музыкальный стоп","type":"ПЭФ","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: смартфон с музыкой","legend":"—","rules":"Ведущий включает музыку на смартфоне. Все танцуют. Когда музыка останавливается, ведущий называет задание: «обнять троих!», «пожать пять рук!», «показать самую смешную позу!». Кто выполнил последним — выполняет весёлый фант. Проводится 7-10 раундов.","end":"—"},{"name":"Импровизация","type":"ПЭФ","extraTypes":[],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд сидит в кругу. Два добровольца выходят в центр. Ведущий задаёт ситуацию. Пара импровизирует сценку 1-2 минуты. Зрители могут крикнуть «Замена!» и заменить одного из актёров. Проводится 5-7 ситуаций.","end":"—"},{"name":"Танцевальный баттл по кругу","type":"ПЭФ","extraTypes":[],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: смартфон с музыкой","legend":"—","rules":"Участники стоят в кругу. Включается весёлая музыка. Каждый по очереди выходит в центр и показывает любое танцевальное движение. Все хлопают. Повторять движения нельзя. В конце весь отряд повторяет самые яркие движения вместе.","end":"—"},{"name":"Дождик","type":"ПЭФ","extraTypes":[],"age":"универсальный","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу. Ведущий начинает тереть ладони — все по кругу повторяют. Затем щёлкать пальцами, потом хлопать в ладоши, хлопать по коленям, топать ногами. Получается звук нарастающего дождя. Потом в обратном порядке — дождь стихает.","end":"—"},{"name":"Да-Нет-ка","type":"ПЭФ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий задаёт вопросы с подвохом. Если ответ «да» — все прыгают и кричат «Да!». Если «нет» — топают ногой и кричат «Нет!». Ведущий пытается запутать, задавая вопросы быстро. Кто ошибся — делает смешное движение. Проводится 10-15 вопросов.","end":"—"},{"name":"Сумасшедшие цифры","type":"ПЭФ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий называет цифры, каждая обозначает действие: 1 — хлопок, 2 — прыжок, 3 — крик «Ура!», 4 — присесть, 5 — поворот вокруг себя. Сначала медленно, потом всё быстрее. Затем комбинации: «1-3!», «5-2-4!». Кто путается — выходит в центр и показывает правильное движение.","end":"—"},{"name":"Светофор","type":"ПЭФ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий называет цвета: «Зелёный!» — все бегут, «Жёлтый!» — все идут медленно, «Красный!» — все замирают. Ведущий может добавлять неожиданные «цвета»: «Фиолетовый!» — все кружатся, «Золотой!» — все танцуют. Кто ошибается — становится помощником ведущего.","end":"—"},{"name":"Спящий дракон","type":"СЭФ","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: помещение. Реквизит: —","legend":"Ребята, в центре нашего круга спит дракон. Он очень устал и ему нужен покой. Если дракон проснётся — он рассердится. Поэтому мы должны быть тише мышей. Давайте посидим тихо-тихо и послушаем, как дышит дракон. Кто сможет быть самым тихим?","rules":"Один участник — «дракон» — ложится в центр круга с закрытыми глазами. Остальные сидят вокруг и должны сохранять полную тишину. Дракон слушает: если услышит звук и правильно покажет направление, тот, кто шумел, становится новым драконом. Проводится 3-5 раундов по 2 минуты тишины.","end":"Дракон выспался и теперь доволен. Спасибо, что были такими тихими."},{"name":"Передай тишину","type":"СЭФ","extraTypes":[],"age":"младший (6-10 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, у меня в руках невидимая свеча. Она очень хрупкая — от любого громкого звука или резкого движения она погаснет. Мне нужно передать её по кругу так, чтобы она не погасла. Давайте попробуем — очень аккуратно и тихо.","rules":"Участники сидят в кругу. Ведущий делает вид, что держит в ладонях «невидимую свечу» и аккуратно передаёт её соседу. Все молчат. Если кто-то производит звук или делает резкое движение — «свеча гаснет», и круг начинается заново. Задача — передать свечу по всему кругу без единого звука.","end":"Свеча прошла весь круг и не погасла. Вы были невероятно аккуратны."},{"name":"Слепой счёт","type":"СЭФ","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники сидят в кругу с закрытыми глазами. Задача — досчитать до числа, равного количеству участников. Каждое число говорит только один человек. Если два человека произнесли число одновременно — всё сначала. Нельзя говорить подряд. Нужно прислушиваться друг к другу и чувствовать момент. Игра требует полной тишины и концентрации.","end":"—"},{"name":"Расскажи на ухо","type":"СЭФ","extraTypes":["ПТБ"],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все сидят в кругу. Ведущий шёпотом говорит соседу на ухо позитивное утверждение. Тот передаёт сообщение дальше, добавляя от себя одно доброе слово. Когда сообщение возвращается к ведущему, он произносит его вслух. Все улыбаются. Проводится 2-3 круга. Во время игры соблюдается тишина.","end":"—"},{"name":"Сердцебиение отряда","type":"СЭФ","extraTypes":["ИС/С"],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все участники стоят в тесном кругу, закрыв глаза. Ведущий просит положить правую руку на грудь, почувствовав своё сердцебиение. Через минуту — положить левую руку на спину впереди стоящего. Ведущий тихо говорит: «Мы — один организм. Попробуйте дышать в одном ритме». Все стоят в тишине 2-3 минуты.","end":"—"},{"name":"Звуки природы","type":"СЭФ","extraTypes":[],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: помещение (приглушённый свет). Реквизит: смартфон с записью звуков природы (необязательно)","legend":"Закройте глаза и представьте, что вы на берегу тихого лесного озера. Вокруг вас шумят деревья, поют птицы, плещется вода. Каждый из вас сейчас станет частью этого леса — кто-то будет ветром, кто-то — птицей, кто-то — водой. Давайте создадим этот лес вместе.","rules":"Участники сидят в кругу с закрытыми глазами. Ведущий шёпотом раздаёт роли: кто-то шелестит, кто-то «капает» (щёлкает пальцами), кто-то тихо гудит как ветер. По жесту ведущего звуки начинаются по одному и соединяются. Через 3-4 минуты ведущий по одному «выключает» звуки, пока не наступит тишина.","end":"Лес затих. Спасибо, что были его частью."},{"name":"Волна тишины","type":"СЭФ","extraTypes":[],"age":"универсальный","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу. Ведущий начинает медленно поднимать руки вверх — все повторяют по очереди (волной). Когда руки наверху — все молчат 10 секунд. Затем ведущий медленно опускает руки — все медленно садятся. Сидя, все закрывают глаза и сидят в тишине 1 минуту. Ведущий тихо говорит «Спасибо» — все открывают глаза.","end":"—"},{"name":"Невидимый рисунок","type":"СЭФ","extraTypes":["ПТБ"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники разбиваются на пары. Один поворачивается спиной. Второй пальцем рисует на его спине простой рисунок или букву. Тот, кому рисуют, пытается угадать. Все делают это одновременно и молча. Потом пары меняются ролями. Проводится 4-5 раундов.","end":"—"},{"name":"Облако","type":"СЭФ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Представьте, что каждый из вас — лёгкое облачко. Облака плывут по небу медленно и бесшумно. Они не торопятся. Иногда они замирают, а иногда тихо покачиваются на ветру. Давайте превратимся в облака и поплывём.","rules":"Участники стоят свободно по площадке. Ведущий тихим голосом даёт команды: «Облака медленно плывут...», «Облака замирают...». Все медленно и бесшумно двигаются. Полная тишина. Через 3-5 минут ведущий тихо говорит: «Облака опускаются на землю» — все медленно садятся.","end":"Облака приземлились. Какая тишина."},{"name":"Хранитель огня","type":"СЭФ","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: помещение (приглушённый свет желателен). Реквизит: фонарик от смартфона","legend":"Ребята, у нас есть огонёк. Он маленький, но очень важный — это огонёк нашего отряда. Мы передадим его по кругу, и каждый побудет его хранителем. Пока вы держите огонёк, загадайте доброе желание для нашего отряда. Тишина — главное условие.","rules":"Участники сидят в кругу. Ведущий включает фонарик на смартфоне и передаёт его соседу. Тот держит его 5-10 секунд (загадывая желание) и передаёт дальше. Вся игра проходит в полной тишине. Когда фонарик обошёл весь круг, ведущий тихо говорит: «Огонёк побывал у каждого. Теперь он горит в каждом из нас».","end":"Огонёк вернулся, но частичка его осталась с каждым."},{"name":"Рыцари и принцессы","type":"МПВ","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Когда-то давно в одном королевстве жили рыцари и принцессы. Рыцари были смелыми, а принцессы — мудрыми. Каждый рыцарь должен был найти свою принцессу для волшебного танца, чтобы спасти королевство от скуки. Давайте поиграем в это королевство!","rules":"Мальчики — «рыцари», девочки — «принцессы». Все свободно ходят по площадке. По команде ведущего «Турнир!» рыцари подходят к любой принцессе и кланяются, а принцесса делает реверанс. Пара берётся за руки и садится. Каждый раунд пары должны быть новыми. Проводится 5-7 раундов.","end":"Королевство спасено благодаря дружбе рыцарей и принцесс!"},{"name":"Комплимент соседу","type":"МПВ","extraTypes":[],"age":"младший (6-10 лет)","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу, чередуясь: мальчик — девочка. Каждый по очереди поворачивается к соседу противоположного пола и говорит ему комплимент. Тот, кому сказали комплимент, благодарит и говорит комплимент своему соседу с другой стороны. Волна комплиментов идёт по кругу.","end":"—"},{"name":"Танцевальный миксер","type":"МПВ","extraTypes":["ПЭФ"],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: смартфон с музыкой","legend":"—","rules":"Участники образуют два круга: внутренний (девочки) и внешний (мальчики), лицом друг к другу. Включается музыка — круги движутся в противоположных направлениях. Музыка останавливается — каждый оказывается напротив партнёра. Ведущий даёт задание паре. Проводится 7-10 раундов.","end":"—"},{"name":"Найди свою пару","type":"МПВ","extraTypes":[],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: карточки с парными словами (подручные: бумага, ручка)","legend":"—","rules":"Ведущий заранее пишет на карточках парные слова (соль — перец, Ромео — Джульетта). Карточки раздаются: одна половина — мальчикам, другая — девочкам. По команде каждый должен найти свою «пару». Найдя друг друга, пара показывает короткую сценку. Проводится 2-3 раунда.","end":"—"},{"name":"Свидание вслепую","type":"МПВ","extraTypes":["ПЗ"],"age":"старший (15-18 лет)","time":"20-25 минут","loc":"Локация: помещение. Реквизит: стулья, ширма или покрывало","legend":"—","rules":"Ставятся два стула спиной друг к другу (или через ширму). Садятся мальчик и девочка — они не видят друг друга. Ведущий задаёт вопросы обоим. После 5 вопросов ведущий спрашивает: «Как ты думаешь, кто сидит по ту сторону?». Открывают ширму. Проводится 3-4 пары.","end":"—"},{"name":"Вальс знакомств","type":"МПВ","extraTypes":["ПТБ"],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: смартфон с музыкой","legend":"—","rules":"Включается спокойная музыка. Мальчики подходят к девочкам и приглашают на «медленный танец». Танцуя, пара разговаривает: каждый рассказывает о себе. Через 1 минуту музыка меняется на быструю — все расходятся. Задача — потанцевать с максимальным количеством разных партнёров. Проводится 5-7 смен.","end":"—"},{"name":"Строим фигуры в парах","type":"МПВ","extraTypes":["ПТБ"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники разбиваются на пары (мальчик + девочка). Ведущий называет предмет или букву. Каждая пара должна изобразить это из своих тел. По каждой команде пары меняются. Ведущий оценивает самые оригинальные фигуры. Проводится 7-10 раундов.","end":"—"},{"name":"Доверяй-перешагивай","type":"МПВ","extraTypes":["Доверие"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: повязки на глаза","legend":"—","rules":"Участники разбиваются на пары (мальчик + девочка). Одному завязывают глаза. Второй берёт его за руку и ведёт по площадке, помогая обходить препятствия. Через 2-3 минуты роли меняются. Пары меняются каждый раунд. Ведущий следит за безопасностью.","end":"—"},{"name":"Апельсинка","type":"МПВ","extraTypes":["ПЭФ"],"age":"универсальный","time":"10 минут","loc":"Локация: без привязки к локации. Реквизит: апельсин или мяч","legend":"—","rules":"Участники встают в круг, чередуясь: мальчик — девочка. Задача — передать апельсин (или мяч) по кругу, зажав его подбородком (без рук). Если апельсин упал — начинаем с того места. Руками трогать нельзя. Можно засечь время и побить рекорд.","end":"—"},{"name":"Парное рисование","type":"МПВ","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: помещение. Реквизит: бумага, фломастеры/карандаши","legend":"—","rules":"Участники разбиваются на пары (мальчик + девочка). Каждая пара получает один лист и один фломастер. Оба берутся за фломастер одновременно и рисуют общий рисунок на заданную тему. Разговаривать нельзя — нужно чувствовать движения партнёра. Через 3 минуты каждая пара показывает свой рисунок. Проводится 3-4 раунда.","end":"—"},{"name":"Повторяй за мной","type":"Игры с залом","extraTypes":[],"age":"младший (6-10 лет)","time":"5-7 минут","loc":"Локация: зал/помещение. Реквизит: —","legend":"—","rules":"Ведущий стоит на сцене и показывает движения, которые зал повторяет. Темп ускоряется. Затем ведущий добавляет «обманки»: говорит одно, но показывает другое. Зал должен делать то, что ведущий ГОВОРИТ. Кто ошибается — встаёт и танцует 5 секунд. Проводится 3-5 минут.","end":"—"},{"name":"Если весело живётся","type":"Игры с залом","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"5 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий произносит: «Если весело живётся, делай так!» — и показывает движение. Зал повторяет. С каждым куплетом добавляется новое движение. Куплет заканчивается: «Если весело живётся, мы друг другу улыбнёмся, если весело живётся, делай так!» — все движения подряд. Всего 4-5 куплетов.","end":"—"},{"name":"Три движения","type":"Игры с залом","extraTypes":[],"age":"средний (11-14 лет)","time":"5-7 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий показывает залу три движения и присваивает каждому номер: 1 — руки вверх, 2 — руки в стороны, 3 — руки на пояс. Затем ведущий начинает путать: называет одно, но показывает другое. Зал должен следовать только номеру. Темп ускоряется. Кто ошибается — встаёт. Последние сидящие — победители.","end":"—"},{"name":"Регулятор громкости","type":"Игры с залом","extraTypes":[],"age":"средний (11-14 лет)","time":"5 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий объясняет: его рука — регулятор громкости. Рука внизу — тишина, на уровне пояса — шёпот, на уровне груди — нормальный голос, вверху — крик. Зал произносит фразу, а ведущий регулирует громкость, резко меняя положение руки. Проводится 3-5 минут.","end":"—"},{"name":"Бразильский карнавал","type":"Игры с залом","extraTypes":["ПЭФ"],"age":"старший (15-18 лет)","time":"5-7 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий делит зал на 4 сектора. Каждому сектору даётся свой ритмический рисунок. Сначала каждый сектор отрабатывает свой ритм. Потом ведущий «включает» секторы по одному — получается многослойный ритм. Ведущий «выключает» и «включает» секторы, создавая разные комбинации.","end":"—"},{"name":"Ответ залом","type":"Игры с залом","extraTypes":[],"age":"старший (15-18 лет)","time":"5 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий обучает зал нескольким фразам-ответам: на «Как дела?» зал хором отвечает «Отлично!» и т.д. Ведущий произносит фразы вперемешку, ускоряя темп. Затем добавляет обманки — новые вопросы. Зал должен отвечать только на «правильные» вопросы. Проводится 3-5 минут перед мероприятием.","end":"—"},{"name":"Дирижёр зала","type":"Игры с залом","extraTypes":[],"age":"универсальный","time":"5-7 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий — «дирижёр». Правая рука управляет правой половиной зала, левая — левой. Когда рука поднимается — эта половина кричит «А-а-а!», когда опускается — замолкает. Дирижёр может поднять обе руки или чередовать, создавая «волну» звука. Темп ускоряется. Проводится 3-5 минут.","end":"—"},{"name":"Чайничек с крышечкой","type":"Игры с залом","extraTypes":["ПЭФ"],"age":"универсальный","time":"5-7 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий разучивает с залом речёвку с движениями: «Чайничек — крышечка, крышечка — шишечка, шишечка — дырочка, дырочка — пар!» На каждое слово — своё движение. Каждый раунд одно слово заменяется на «ля-ля-ля», но движение остаётся. К концу все слова заменены — остаются только движения.","end":"—"},{"name":"Светофор зала","type":"Игры с залом","extraTypes":[],"age":"универсальный","time":"5 минут","loc":"Локация: зал. Реквизит: три карточки (красная, жёлтая, зелёная) — можно из бумаги","legend":"—","rules":"Ведущий показывает карточки: зелёная — зал хлопает и кричит, жёлтая — тихо хлопает, красная — полная тишина. Ведущий быстро меняет карточки. Зал должен мгновенно переключаться. Проводится 3-5 минут.","end":"—"},{"name":"Раз-два-три, смотри!","type":"Игры с залом","extraTypes":[],"age":"универсальный","time":"5 минут","loc":"Локация: зал. Реквизит: —","legend":"—","rules":"Ведущий считает «Раз-два-три, смотри!» и показывает определённое количество пальцев. Задача зала — встать ровно столько человек. Зал должен синхронизироваться без переговоров. Проводится 5-7 раундов.","end":"—"},{"name":"Камень-ножницы-бумага-турнир","type":"Минутки","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все находят себе пару и играют в «Камень-ножницы-бумага». Проигравший становится «болельщиком» победителя. Победитель находит другого победителя — играют снова. Так продолжается, пока не останутся два участника с огромными командами болельщиков. Финальная игра определяет чемпиона.","end":"—"},{"name":"Цепочка слов","type":"Минутки","extraTypes":[],"age":"младший (6-10 лет)","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий называет слово. Следующий участник называет слово на последнюю букву предыдущего. Повторять слова нельзя. Кто задумался дольше 5 секунд — пропускает ход. Игру можно прервать в любой момент.","end":"—"},{"name":"Контакт","type":"Минутки","extraTypes":[],"age":"средний (11-14 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Один участник загадывает слово и называет первую букву. Остальные пытаются угадать слово, задавая вопросы-описания. Если другой угадчик понял загаданное слово, он кричит «Контакт!», оба считают до трёх и произносят слово одновременно. Если совпали — ведущий открывает следующую букву.","end":"—"},{"name":"Крокодил","type":"Минутки","extraTypes":["ПЭФ"],"age":"средний (11-14 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Один участник загадывает слово и показывает его без слов (пантомимой). Остальные отгадывают. Кто угадал — показывает следующее слово. Нельзя произносить звуки и показывать на предметы. Игру можно прервать в любой момент.","end":"—"},{"name":"Ассоциации","type":"Минутки","extraTypes":[],"age":"старший (15-18 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники сидят в кругу. Первый называет слово. Следующий говорит первую ассоциацию. Цепочка идёт по кругу. Нельзя повторять уже названные слова. Игру можно прервать в любой момент.","end":"—"},{"name":"Данетки","type":"Минутки","extraTypes":[],"age":"старший (15-18 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий рассказывает странную ситуацию. Участники задают вопросы, на которые можно ответить только «да» или «нет». Задача — восстановить полную картину ситуации. Игру можно прервать в любой момент и вернуться к ней позже.","end":"—"},{"name":"Я никогда не...","type":"Минутки","extraTypes":["ПЗ"],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все показывают 10 пальцев. По очереди каждый говорит: «Я никогда не...» и называет то, чего никогда не делал. Все, кто это ДЕЛАЛ, загибают один палец. Кто загнул все 10 — выбывает. Игру можно прервать в любой момент.","end":"—"},{"name":"Тише-громче","type":"Минутки","extraTypes":[],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Один участник выходит. Остальные прячут маленький предмет. Водящий возвращается и ходит по площадке. Остальные хлопают: чем ближе к цели — тем громче. Когда находит — меняется роль. Игру можно прервать в любой момент.","end":"—"},{"name":"Испорченный телефон","type":"Минутки","extraTypes":["ПЭФ"],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники стоят в ряд. Первый шепчет на ухо соседу слово или фразу. Тот передаёт дальше шёпотом. Последний произносит вслух то, что услышал. Сравнивают с оригиналом. Обычно получается очень смешно. Игру можно прервать в любой момент.","end":"—"},{"name":"Летает — не летает","type":"Минутки","extraTypes":[],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий быстро называет предметы. Если предмет летает — участники поднимают руки. Если не летает — руки внизу. Ведущий пытается запутать: сам поднимает руки на «нелетающие» предметы. Кто ошибся — делает шаг вперёд. Игру можно прервать в любой момент.","end":"—"},{"name":"Невидимая скамейка","type":"Розыгрыши","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, сейчас мы будем тренировать суперсилу! Я научу вас сидеть... на невидимой скамейке! Это очень сложно, но если верить — всё получится. Кто хочет попробовать?","rules":"Ведущий «рассаживает» детей на невидимую скамейку: все встают друг за другом в круг, плотно. По команде каждый медленно садится на колени того, кто стоит сзади. Если все сядут одновременно — получится устойчивый круг. Секрет: ведущий заранее говорит, что это суперсила, а на самом деле это просто физика. Дети приятно удивляются.","end":"Видите? У вас есть суперсила! А секрет в том, что вместе мы можем всё."},{"name":"Волшебное слово","type":"Розыгрыши","extraTypes":[],"age":"младший (6-10 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, я знаю волшебное слово, которое заставляет всех делать странные вещи. Хотите проверить?","rules":"Ведущий говорит команды, но выполнять нужно ТОЛЬКО если перед командой сказано слово «пожалуйста». Розыгрыш в том, что после нескольких раундов ведущий говорит: «Кто ни разу не ошибся — поднимите руку!» (без «пожалуйста»). Почти все поднимают — и попадаются.","end":"Попались! Но теперь вы точно будете внимательнее."},{"name":"Телеграмма","type":"Розыгрыши","extraTypes":[],"age":"средний (11-14 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий вызывает добровольца и говорит: «Тебе пришла очень важная телеграмма! Повторяй за мной всё слово в слово». Ведущий начинает: «Пришла телеграмма...» — повторяет. «Из Африки...» — повторяет. «В ней написано...» — повторяет. Длинная пауза. Суть розыгрыша: в телеграмме буквально написано «...» — то есть ничего. Все смеются.","end":"—"},{"name":"Посвящение в лагерники","type":"Розыгрыши","extraTypes":["ПЭФ"],"age":"средний (11-14 лет)","time":"10-15 минут","loc":"Локация: помещение. Реквизит: повязка на глаза, подушка","legend":"Ребята, в нашем лагере есть древняя традиция: каждый новичок проходит ритуал посвящения. Это секретный обряд, и каждый проходит его по одному. Не бойтесь — это совершенно безопасно. Кто первый смельчак?","rules":"Добровольцу завязывают глаза. Три «испытания»: «Перешагни пропасть!» (на полу подушка), «Поцелуй священный артефакт!» (целует свою же руку), «Громко скажи: Я — великий лагерник!» Все хлопают. Снимают повязку — все добродушно смеются. Он становится «посвящённым» и помогает разыграть следующего.","end":"Поздравляем — ты теперь настоящий лагерник!"},{"name":"Сломанный факс","type":"Розыгрыши","extraTypes":["ПЭФ"],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: бумага, ручки","legend":"—","rules":"Участники встают в колонну. Последний получает от ведущего картинку. Он рисует пальцем на спине впереди стоящего. Тот рисует своё понимание на спине следующего. Так «факс» передаётся. Первый рисует на бумаге. Сравнивают оригинал и результат. Розыгрыш в том, насколько искажается рисунок. Проводится 3-4 раунда.","end":"—"},{"name":"Да, милорд","type":"Розыгрыши","extraTypes":[],"age":"старший (15-18 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий вызывает добровольца: «Задай мне любой вопрос, я отвечаю только «Да, милорд» или «Нет, милорд»». Розыгрыш: через 2-3 минуты ведущий предлагает поменяться ролями. Теперь ведущий задаёт каверзные и смешные вопросы, ставя добровольца в комичные ситуации. Все весело смеются.","end":"—"},{"name":"МПС","type":"Розыгрыши","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий говорит: «Я загадал человека из отряда. Его обозначение — МПС. Задавайте вопросы «да/нет»». Розыгрыш: МПС = «Мой Правый Сосед» — ведущий каждый раз отвечает про того, кто сидит справа от спрашивающего. Ответы будут противоречить друг другу, пока кто-то не догадается.","end":"—"},{"name":"Колпак","type":"Розыгрыши","extraTypes":["ПЭФ"],"age":"универсальный","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все разучивают: «Колпак мой треугольный, треугольный мой колпак. А если не треугольный, то это не мой колпак». Затем слово «колпак» заменяется жестом. Потом «треугольный». Потом «мой». Постепенно все слова заменяются жестами. Кто ошибётся — удивляется, что это сложнее, чем кажется.","end":"—"},{"name":"Электричка","type":"Розыгрыши","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий вызывает 4-5 добровольцев. «Вы — пассажиры электрички. Повторяйте за мной!» Ведущий раскачивается вправо-влево, все повторяют. «Поезд тормозит» — наклоняются вперёд. «Поворот!» — в сторону. В финале «Остановка!» — и резко садится на пол. Все повторяют. Общий смех.","end":"—"},{"name":"Да и нет не говори","type":"Розыгрыши","extraTypes":[],"age":"универсальный","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий вызывает добровольца: «Я задаю вопросы. Нельзя говорить «да», «нет», «чёрный» и «белый». Если скажешь — проиграл!» Ведущий задаёт хитрые вопросы. Розыгрыш в том, что вопросы постепенно становятся всё более быстрыми, пока доброволец не ошибётся.","end":"—"},{"name":"Чемодан добрых слов","type":"Последействие","extraTypes":[],"age":"младший (6-10 лет)","time":"20-25 минут","loc":"Локация: помещение. Реквизит: бумага, ручки/карандаши, конверты или пакетики","legend":"Ребята, наша смена подходит к концу, и каждый из вас уезжает домой с чемоданом. Но мы наполним этот чемодан не вещами, а добрыми словами! Каждый напишет тёплое пожелание каждому — и увезёт домой целый чемодан тёплых слов от друзей.","rules":"Каждый участник получает конверт со своим именем. Конверты кладутся в центр. Каждый пишет доброе пожелание каждому и складывает записки в конверты. В конце каждый забирает свой конверт и читает послания. Ведущий тоже пишет каждому. Игра проходит в тёплой, тихой атмосфере.","end":"Ваши чемоданы полны добрых слов. Берите их с собой и перечитывайте, когда соскучитесь."},{"name":"Костёр воспоминаний","type":"Последействие","extraTypes":[],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: помещение или улица (вечер). Реквизит: фонарик от смартфона (имитация костра)","legend":"Ребята, давайте разведём наш отрядный костёр воспоминаний. У каждого из вас есть искра — воспоминание об этой смене, которое вы хотите сохранить навсегда. Бросим эти искры в общий костёр, чтобы он горел в наших сердцах всегда.","rules":"Участники сидят в кругу. В центре — фонарик (имитация костра). Каждый по очереди рассказывает самое яркое воспоминание о смене. После рассказа «бросает искру в костёр». Ведущий тоже делится. Игра завершается общими аплодисментами.","end":"Наш костёр будет гореть вечно — в наших сердцах и воспоминаниях."},{"name":"Нить дружбы","type":"Последействие","extraTypes":[],"age":"средний (11-14 лет)","time":"20-25 минут","loc":"Локация: без привязки к локации. Реквизит: клубок ниток, ножницы","legend":"Ребята, у меня в руках нить — нить дружбы. Сейчас каждый из вас намотает кусочек этой нити на запястье и скажет, что ему дала эта смена. Потом мы разрежем нить, и каждый увезёт свой кусочек домой — как напоминание о нашем отряде.","rules":"Участники сидят в кругу. Ведущий держит клубок, наматывает нить на запястье и говорит, что значила для него эта смена. Передаёт клубок соседу. Когда круг замкнулся, каждый разрезает нить между собой и соседом, оставляя «браслет». Игра завершается молча.","end":"Нити разрезаны, но связь между нами — нет."},{"name":"Письмо себе в будущее","type":"Последействие","extraTypes":[],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: помещение. Реквизит: бумага, ручки, конверты","legend":"—","rules":"Каждый участник пишет письмо самому себе через год. В письме: что запомнилось, чему научился, какие друзья появились, какие цели на будущее. Письмо запечатывается в конверт с пометкой «Открыть через год». Конверты участники забирают домой.","end":"—"},{"name":"Свеча","type":"Последействие","extraTypes":["СЭФ"],"age":"старший (15-18 лет)","time":"30-40 минут","loc":"Локация: помещение (приглушённый свет). Реквизит: фонарик от смартфона (имитация свечи)","legend":"—","rules":"Участники сидят в кругу. В центре — «свеча» (фонарик). Каждый по очереди берёт свечу и говорит — что ему дала эта смена, кому он благодарен. Нельзя перебивать, комментировать. Только слушать. После каждого выступления — тишина 5 секунд. Когда все высказались, все берутся за руки.","end":"—"},{"name":"Альбом отряда","type":"Последействие","extraTypes":[],"age":"старший (15-18 лет)","time":"25-30 минут","loc":"Локация: помещение. Реквизит: большой лист бумаги (ватман), фломастеры, ручки","legend":"—","rules":"На большом листе ватмана каждый участник обводит ладонь, внутри пишет своё имя
