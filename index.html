 и пожелание отряду. Вокруг ладоней рисуются общие воспоминания. Каждый может написать друг другу послания. Ведущий добавляет свою ладонь. Альбом остаётся как память.","end":"—"},{"name":"Клубок благодарности","type":"Последействие","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: клубок ниток","legend":"—","rules":"Участники сидят в кругу. Ведущий держит клубок, зажимает конец нити, говорит, кому из отряда благодарен и за что, и бросает клубок этому человеку. Тот благодарит кого-то другого и бросает клубок дальше. Когда все связаны нитью, ведущий говорит: «Посмотрите, какая крепкая сеть — это наша дружба».","end":"—"},{"name":"Звезда пожеланий","type":"Последействие","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: помещение. Реквизит: бумага, ручки, нитки (подручные)","legend":"Ребята, посмотрите на небо — видите, сколько звёзд? Каждая звезда — это пожелание. Сейчас каждый создаст свою звезду с пожеланием для нашего отряда. Мы повесим их и создадим наше собственное небо пожеланий.","rules":"Каждый участник вырезает из бумаги звезду и пишет на ней пожелание. Звёзды подвешиваются. Затем все по очереди читают свои пожелания вслух. Остальные слушают молча. После прочтения все аплодируют.","end":"Наше небо пожеланий светит ярко. Пусть каждое из них сбудется."},{"name":"Общее фото-слово","type":"Последействие","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий предлагает отряду «собрать» общее слово из тел — как живую скульптуру. Отряд выбирает слово, которое описывает их смену. Все вместе выкладывают буквы из тел. Ведущий фотографирует. Можно составить несколько слов. Игра завершается общим объятием.","end":"—"},{"name":"Живая открытка","type":"Последействие","extraTypes":["ПЭФ"],"age":"универсальный","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд придумывает «живую открытку» — неподвижную групповую композицию, передающую главное чувство о смене. Все занимают позы. Ведущий «фотографирует» (хлопок — все замирают на 10 секунд). Можно создать 3-4 открытки на разные темы.","end":"—"},{"name":"Слепой и поводырь","type":"Доверие","extraTypes":["ПТБ"],"age":"младший (6-10 лет)","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: повязки на глаза","legend":"Ребята, сейчас один из вас на время потеряет зрение, а другой станет его глазами. Поводырь поведёт «слепого» через все препятствия, и задача поводыря — позаботиться о безопасности товарища. Это требует настоящего доверия!","rules":"Участники разбиваются на пары. Одному завязывают глаза. Второй берёт его за руку и ведёт по площадке. Через 3 минуты роли меняются. Пары также меняются каждый раунд. Ведущий следит за безопасностью. Проводится 3-4 раунда.","end":"Вы были отличными поводырями — каждый позаботился о своём товарище."},{"name":"Мостик доверия","type":"Доверие","extraTypes":[],"age":"младший (6-10 лет)","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, представьте, что перед вами глубокая пропасть. Перейти через неё можно только по живому мостику, который построят ваши друзья. Вы доверите им свою безопасность?","rules":"Участники встают в два ряда лицом друг к другу и вытягивают руки. Один участник ложится на вытянутые руки и «проплывает» по мостику — его медленно передают от одной пары рук к другой. Ведущий страхует процесс. Каждый желающий может «проплыть».","end":"Мостик выдержал — потому что каждый из вас держал его надёжно."},{"name":"Минное поле","type":"Доверие","extraTypes":[],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: различные предметы для «мин» (бутылки, кегли, мячи — подручные), повязки на глаза","legend":"Перед вами минное поле. Один из вас пойдёт через него с завязанными глазами. Но не бойтесь — ваш напарник будет голосом вести вас между мин. Главное — доверять голосу.","rules":"На площадке расставляются «мины». Участники разбиваются на пары. Одному завязывают глаза. Второй стоит на финише и словами направляет. Касание «мины» — возврат на старт. Потом роли и пары меняются. Ведущий следит за безопасностью.","end":"—"},{"name":"Живой мост","type":"Доверие","extraTypes":["ИС/С"],"age":"средний (11-14 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники встают в два плотных ряда лицом друг к другу. Каждый вытягивает руки вперёд, чередуясь с руками стоящих напротив — получается «ковёр» из рук. Один доброволец ложится на руки лицом вверх и «проплывает». Ведущий стоит рядом и страхует. Все желающие могут пройти. Доброволец должен полностью расслабиться и довериться отряду.","end":"—"},{"name":"Свободное падение","type":"Доверие","extraTypes":["ПТБ"],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: устойчивая возвышенность (скамейка, ступенька высотой 30-50 см)","legend":"—","rules":"Один участник встаёт на возвышенность спиной к отряду. Остальные встают в два ряда, вытянув руки. Стоящий скрещивает руки на груди, закрывает глаза и по команде «Готовы? Падаю!» (отряд: «Падай, мы готовы!») падает назад. Отряд ловит. Ведущий обязательно страхует. Только добровольно.","end":"—"},{"name":"Круг доверия с завязанными глазами","type":"Доверие","extraTypes":["СЭФ"],"age":"старший (15-18 лет)","time":"15-20 минут","loc":"Локация: без привязки к локации. Реквизит: повязки на глаза","legend":"—","rules":"Все завязывают глаза. Ведущий просит медленно идти к центру, вытянув руки. Когда встречают чьи-то руки — берут их. Задача: образовать ровный круг, не снимая повязок. Когда круг сформирован — все снимают повязки и видят результат. Затем, держась за руки, все одновременно откидываются назад.","end":"—"},{"name":"Стена доверия","type":"Доверие","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: повязка на глаза","legend":"—","rules":"Один участник стоит с завязанными глазами на одном конце площадки. На другом конце — отряд, выстроившийся плотным рядом. Путешественник идёт прямо. Задача отряда — вовремя и мягко остановить. Отряд сам решает, как: словом, прикосновением, объятием. Каждый желающий может быть путешественником.","end":"—"},{"name":"Маятник в тройке","type":"Доверие","extraTypes":["ПТБ"],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Участники разбиваются на тройки. Один встаёт в центр. Двое — спереди и сзади. Центральный закрывает глаза, скрещивает руки и покачивается вперёд-назад. Двое ловят и мягко возвращают. Через минуту роли меняются. Все должны побывать в центре. Ведущий следит за безопасностью.","end":"—"},{"name":"Упади — поймаем","type":"Доверие","extraTypes":[],"age":"универсальный","time":"10-15 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в плотном кругу. Один в центре закрывает глаза и начинает падать. Стоящие мягко ловят и возвращают. Центральный может покачиваться и менять направление. Через 30 секунд — следующий. Все желающие пробуют. Ведущий следит за плотностью круга.","end":"—"},{"name":"Тропинка доверия","type":"Доверие","extraTypes":[],"age":"универсальный","time":"15-20 минут","loc":"Локация: улица или просторное помещение. Реквизит: повязки на глаза","legend":"Впереди — тропинка, которую можно пройти только с закрытыми глазами. Но вы не одни — весь отряд будет рядом. Каждый из вас пройдёт эту тропинку, а остальные будут его оберегать. Главное — довериться.","rules":"Участник с завязанными глазами идёт по маршруту. Остальные стоят вдоль маршрута по обе стороны. Их задача — мягко направлять идущего. Говорить могут только шёпотом. Каждый желающий проходит тропинку. Ведущий страхует.","end":"Тропинка пройдена. Вы были рядом друг с другом — в этом и есть доверие."},{"name":"Доброе утро, зверята!","type":"Здоровалки","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"Ребята, сегодня утром мы здороваемся не как люди, а как звери! Я буду называть животное, а вы здороваетесь так, как здоровалось бы это животное. Готовы? Доброе утро!","rules":"Ведущий называет животное — участники здороваются соответствующим образом: «котики!» — мурлыкают и трутся, «слоники!» — обнимаются и трубят. Каждое утро можно придумывать новых животных. Проводится 3-5 «приветствий».","end":"Доброе утро, зверята! Теперь мы точно проснулись."},{"name":"Здравствуй, друг!","type":"Здоровалки","extraTypes":[],"age":"младший (6-10 лет)","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу. Ведущий произносит кричалку с движениями: «Здравствуй, правая рука!» — «Здравствуй, левая рука!» — «Здравствуй, друг!» — «Здравствуй, друг!» — «Здравствуй, здравствуй, дружный круг!» Повторяется 2-3 раза, каждый раз громче.","end":"—"},{"name":"Приветствие народов мира","type":"Здоровалки","extraTypes":["ПЗ"],"age":"средний (11-14 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий рассказывает, как здороваются в разных странах: в Японии — поклон, у маори — касание носами, во Франции — поцелуй в обе щеки (имитация), в Тибете — показать язык, в Кении — подпрыгнуть. По команде все здороваются с ближайшим человеком указанным способом. Каждое утро — новый способ.","end":"—"},{"name":"Секретное рукопожатие","type":"Здоровалки","extraTypes":["МПВ"],"age":"средний (11-14 лет)","time":"5-10 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все свободно ходят по площадке. По сигналу каждый находит пару и вместе придумывает уникальное «секретное рукопожатие» из 3-4 движений. Проводится 5-7 раундов. На следующее утро ведущий проверяет: «Найдите вчерашнего партнёра и поздоровайтесь!»","end":"—"},{"name":"Утреннее радио","type":"Здоровалки","extraTypes":["ПЭФ"],"age":"старший (15-18 лет)","time":"5-7 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Каждое утро один участник (по очереди) становится «ведущим утреннего радио». Он придумывает оригинальный способ поприветствовать отряд. Каждый день — новый «радиоведущий». Отряд отвечает хором: «Доброе утро, [имя]!»","end":"—"},{"name":"Утро комплиментов","type":"Здоровалки","extraTypes":[],"age":"старший (15-18 лет)","time":"5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все стоят в кругу. Каждый по очереди поворачивается к соседу справа, здоровается по имени и говорит комплимент. Волна приветствий-комплиментов идёт по кругу. Когда круг замыкается, все хором: «Доброе утро, отряд!»","end":"—"},{"name":"Международное утро","type":"Здоровалки","extraTypes":[],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий каждое утро выбирает язык и учит отряд говорить «доброе утро» на этом языке. По сигналу все здороваются друг с другом на выбранном языке. Каждый день — новый язык.","end":"—"},{"name":"Здравствуй, ладошка!","type":"Здоровалки","extraTypes":["ПТБ"],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все свободно ходят. По сигналу ведущего каждый находит ближайшего человека и здоровается определённым способом: «Ладошка!» — касаются ладонями, «Локоток!» — касаются локтями, «Спинка!» — касаются спинами. Каждый раз — новый партнёр. Проводится 5-7 раундов.","end":"—"},{"name":"Обнимашки по числам","type":"Здоровалки","extraTypes":["ПТБ"],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все свободно ходят. Ведущий называет число — участники обнимаются по столько человек. Кто остался без группы — обнимает ведущего. Финал: число = количеству участников — весь отряд обнимается. Все хором: «Доброе утро!»","end":"—"},{"name":"Утренний клич","type":"Здоровалки","extraTypes":[],"age":"универсальный","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Отряд заранее придумывает свой уникальный утренний клич. Каждое утро ведущий начинает: «Отряд, готовы?» — и все произносят клич хором. Это создаёт ритуал и чувство принадлежности.","end":"—"},{"name":"Звериные семейки","type":"Разбивки","extraTypes":["ПЭФ"],"age":"младший (6-10 лет)","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий шёпотом говорит каждому участнику название животного (количество = количество нужных групп). По команде все начинают издавать звуки своего животного и ищут «родственников» по звуку. Когда все семейки собрались — группы готовы.","end":"—"},{"name":"Цветные метки","type":"Разбивки","extraTypes":[],"age":"младший (6-10 лет)","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: цветные стикеры или кусочки цветной бумаги","legend":"—","rules":"Ведущий приклеивает каждому на лоб цветной стикер — участник не знает свой цвет. По команде каждый должен найти людей с таким же цветом. Смотреть на свой стикер нельзя — только помогать другим.","end":"—"},{"name":"Пазл","type":"Разбивки","extraTypes":[],"age":"средний (11-14 лет)","time":"3-5 минут","loc":"Локация: помещение. Реквизит: открытки или картинки, разрезанные на части (подручные: разрезать листы бумаги с рисунками)","legend":"—","rules":"Ведущий заранее разрезает несколько картинок на столько частей, сколько людей должно быть в группе. Кусочки перемешиваются и раздаются. По команде каждый ищет людей, чьи кусочки подходят. Собравшие одну картинку — одна группа.","end":"—"},{"name":"Атомы","type":"Разбивки","extraTypes":[],"age":"средний (11-14 лет)","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все свободно ходят. Ведущий командует: «Атомы — по [число]!» Участники быстро объединяются в группы. Последнее число = нужный размер групп. Эти группы остаются для работы. Быстрый и энергичный способ.","end":"—"},{"name":"Общее и различное","type":"Разбивки","extraTypes":["ПЗ"],"age":"старший (15-18 лет)","time":"5-7 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий задаёт категорию: «Разделитесь по любимому времени года» и т.д. Участники сами находят единомышленников. Если групп получилось не то количество — ведущий корректирует категорию. Способ помогает узнать друг друга лучше.","end":"—"},{"name":"Числовая разбивка","type":"Разбивки","extraTypes":[],"age":"старший (15-18 лет)","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Все встают в круг и рассчитываются. Можно рассчитаться не «1-2-3-4», а «яблоко-груша-банан-вишня» — все «яблоки» — одна группа. Быстро и без лишних сложностей.","end":"—"},{"name":"Мозаика","type":"Разбивки","extraTypes":[],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: карточки с символами (подручные: бумага, ручка)","legend":"—","rules":"Ведущий заранее рисует на карточках символы (звёзды, круги, треугольники — по числу групп). Количество карточек каждого символа = размер группы. Карточки перемешиваются и раздаются. По команде участники ищут одинаковые символы.","end":"—"},{"name":"Фруктовый салат","type":"Разбивки","extraTypes":["ПЭФ"],"age":"универсальный","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий шёпотом называет каждому фрукт (по числу нужных групп). По команде «Фруктовый салат!» все выкрикивают название своего фрукта и ищут «одинаковые фрукты». Весело и быстро.","end":"—"},{"name":"Выбор капитанов","type":"Разбивки","extraTypes":["ИВЛ"],"age":"универсальный","time":"3-5 минут","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий выбирает «капитанов» — столько, сколько нужно групп. Капитаны по очереди выбирают себе по одному участнику в команду. Выбор идёт по кругу, пока все не распределены.","end":"—"},{"name":"Встань по признаку","type":"Разбивки","extraTypes":[],"age":"универсальный","time":"2-3 минуты","loc":"Локация: без привязки к локации. Реквизит: —","legend":"—","rules":"Ведущий называет признак: «Встаньте по месяцу рождения!» или «по первой букве имени!». Участники самоорганизуются в группы. Ведущий затем объединяет или разделяет группы до нужного размера. Способ создаёт случайные, но интересные группы.","end":"—"}]/*GAMES_JSON_END*/;

let games=[], selected=null, editing=null, editData=null, confirmDel=null, dark=false, sidebarOpen=false;

function init(){
  try{ const s=localStorage.getItem(GAMES_KEY); if(s) games=JSON.parse(s); else games=JSON.parse(JSON.stringify(INITIAL_GAMES)); }catch(e){ games=JSON.parse(JSON.stringify(INITIAL_GAMES)); }
  const ft=document.getElementById('filterType');
  ALL_TYPES.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=ti(t).i+' '+ti(t).l;ft.appendChild(o);});
  document.getElementById('searchInput').addEventListener('input',()=>{selected=null;editing=null;render();});
  ft.addEventListener('change',()=>{selected=null;render();});
  document.getElementById('filterAge').addEventListener('change',()=>{selected=null;render();});
  document.getElementById('addBtn').addEventListener('click',startAdd);
  document.getElementById('themeBtn').addEventListener('click',()=>{dark=!dark;document.body.setAttribute('data-theme',dark?'dark':'');document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';});
  document.getElementById('menuBtn').addEventListener('click',()=>{sidebarOpen=!sidebarOpen;toggleSidebar();});
  document.getElementById('overlay').addEventListener('click',()=>{sidebarOpen=false;toggleSidebar();});
  document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('Сбросить игротеку к начальному состоянию? Все изменения будут потеряны.')){localStorage.removeItem(GAMES_KEY);games=JSON.parse(JSON.stringify(INITIAL_GAMES));selected=null;editing=null;render();}});
  render();
}
function save(){try{localStorage.setItem(GAMES_KEY,JSON.stringify(games));}catch(e){}}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open',sidebarOpen);document.getElementById('overlay').classList.toggle('show',sidebarOpen);}
function getFiltered(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const ft=document.getElementById('filterType').value;
  const fa=document.getElementById('filterAge').value;
  return games.filter(g=>{
    const ms=!s||g.name.toLowerCase().includes(s)||g.rules.toLowerCase().includes(s)||(g.legend&&g.legend.toLowerCase().includes(s))||g.type.toLowerCase().includes(s);
    const mt=ft==='all'||g.type===ft||(g.extraTypes&&g.extraTypes.includes(ft));
    const ma=fa==='all'||g.age===fa||g.age==='универсальный';
    return ms&&mt&&ma;
  });
}
function startAdd(){editing=-1;editData={name:'',type:'ИЗ',extraTypes:[],age:'универсальный',time:'',loc:'',legend:'—',rules:'',end:'—'};selected=null;sidebarOpen=false;toggleSidebar();render();}
function startEdit(idx){const f=getFiltered();editData=JSON.parse(JSON.stringify(f[idx]));editing=idx;render();}
function cancelEdit(){editing=null;editData=null;render();}
function saveEdit(){
  if(!editData.name.trim()||!editData.rules.trim()){alert('Название и правила обязательны');return;}
  if(editing===-1){games.push(editData);selected=getFiltered().length;}
  else{const f=getFiltered();const ri=games.indexOf(f[editing]);games[ri]=editData;selected=editing;}
  editing=null;editData=null;save();render();
}
function deleteGame(){
  const f=getFiltered();const ri=games.indexOf(f[confirmDel]);games.splice(ri,1);selected=null;confirmDel=null;editing=null;save();render();
}
function render(){
  const f=getFiltered();
  document.getElementById('totalCount').textContent=games.length+' игр';
  document.getElementById('resultsCount').textContent='Найдено: '+f.length;
  // List
  const list=document.getElementById('gamesList');
  list.innerHTML='';
  if(f.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Ничего не найдено</div>';} 
  else f.forEach((g,i)=>{
    const t=ti(g.type);
    const d=document.createElement('div');
    d.className='game-card'+(selected===i&&editing===null?' active':'');
    const ageShort=g.age==='универсальный'?'🌍 универс.':g.age.replace(/ \(.*?\)/g,'');
    const hasReq=hasRequisit(g.loc);
    d.innerHTML=`<div class="card-top"><span class="card-icon">${t.i}</span><span class="card-name">${esc(g.name)}</span>${hasReq?'<span title="Нужен реквизит" style="font-size:13px;opacity:.7">🎒</span>':''}</div><div class="card-tags"><span class="tag" style="background:${t.c}22;color:${t.c};border:1px solid ${t.c}44">${t.l}</span><span class="tag-muted">${ageShort}</span><span class="tag-muted">⏱ ${esc(g.time)}</span></div>`;
    d.addEventListener('click',()=>{selected=i;editing=null;confirmDel=null;sidebarOpen=false;toggleSidebar();render();document.getElementById('detail').scrollTop=0;});
    list.appendChild(d);
  });
  // Detail
  const det=document.getElementById('detail');
  if(editing!==null&&editData){renderEditForm(det);return;}
  if(selected!==null&&f[selected]){renderDetail(det,f[selected]);return;}
  det.innerHTML='<div class="detail-empty"><div class="big-icon">🏕️</div><div style="font-size:17px;font-weight:700;margin-bottom:6px">Выберите игру из списка</div><div style="font-size:13px">или нажмите «+ Добавить»</div></div>';
}
function renderDetail(det,g){
  const t=ti(g.type);
  const extraHTML=(g.extraTypes||[]).map(et=>{const e=ti(et);return `<span class="tag" style="background:${e.c}15;color:${e.c};border:1px solid ${e.c}33">${e.i} ${e.l}</span>`;}).join('');
  const p=parseLoc(g.loc);
  const showLegend=g.legend&&g.legend!=='—';
  const showEnd=g.end&&g.end!=='—';
  det.innerHTML=`
    <button class="mobile-back show" onclick="selected=null;render()">← К списку</button>
    <div class="detail-header">
      <span class="detail-icon">${t.i}</span>
      <div style="flex:1"><div class="detail-title">${esc(g.name)}</div>
        <div class="detail-tags"><span class="tag" style="background:${t.c}22;color:${t.c};border:1px solid ${t.c}44">${t.f}</span>${extraHTML}</div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-ghost" onclick="startEdit(${selected})">✏️</button>
        <button class="btn btn-ghost" style="color:#e55" onclick="confirmDel=${selected};render()">🗑️</button>
      </div>
    </div>
    <div class="meta-row">
      <div class="meta-chip"><span style="font-size:15px">👶</span><div><div class="meta-label">Возраст</div><div class="meta-value">${esc(g.age)}</div></div></div>
      <div class="meta-chip"><span style="font-size:15px">⏱️</span><div><div class="meta-label">Время</div><div class="meta-value">${esc(g.time)}</div></div></div>
    </div>
    ${p.location?`<div class="field-block"><div class="field-label">Локация</div><div class="field-value">${esc(p.location)}</div></div>`:''}
    ${p.requisit?`<div class="field-block"><div class="field-label">🎒 Реквизит</div><div class="field-value">${esc(p.requisit)}</div></div>`:''}
    ${showLegend?`<div class="field-block"><div class="field-label">Легенда</div><div class="field-value">${esc(g.legend)}</div></div>`:''}
    <div class="field-block"><div class="field-label">Правила</div><div class="field-value">${esc(g.rules)}</div></div>
    ${showEnd?`<div class="field-block"><div class="field-label">Завершение</div><div class="field-value">${esc(g.end)}</div></div>`:''}
    ${confirmDel===selected?`<div class="confirm-box"><div class="title">Удалить «${esc(g.name)}»?</div><div class="btns"><button class="btn btn-danger" onclick="deleteGame()">Удалить</button><button class="btn btn-ghost" onclick="confirmDel=null;render()">Отмена</button></div></div>`:''}
  `;
}
function renderEditForm(det){
  const isNew=editing===-1;
  const typeOpts=ALL_TYPES.map(t=>`<option value="${t}"${editData.type===t?' selected':''}>${ti(t).i} ${t}</option>`).join('');
  const ageOpts=AGE_OPTS.map(a=>`<option value="${a}"${editData.age===a?' selected':''}>${a}</option>`).join('');
  const extraBtns=ALL_TYPES.filter(t=>t!==editData.type).map(t=>{const on=(editData.extraTypes||[]).includes(t);const c=ti(t);return `<button class="extra-btn${on?' on':''}" style="${on?'border-color:'+c.c+';color:'+c.c+';background:'+c.c+'22':''}" data-et="${t}">${c.i} ${c.l}</button>`;}).join('');
  det.innerHTML=`
    <div class="edit-form">
      <h2>${isNew?'Новая игра':'Редактирование'}</h2>
      <div class="form-field"><label>Название *</label><input id="ef_name" value="${esc(editData.name)}"></div>
      <div class="form-row">
        <div class="form-field"><label>Тип</label><select id="ef_type">${typeOpts}</select></div>
        <div class="form-field"><label>Возраст</label><select id="ef_age">${ageOpts}</select></div>
      </div>
      <div class="form-field"><label>Доп. типы (до 2)</label><div class="extra-types" id="ef_extra">${extraBtns}</div></div>
      <div class="form-field"><label>Время проведения</label><input id="ef_time" value="${esc(editData.time)}"></div>
      <div class="form-field"><label>Локация и реквизит</label><input id="ef_loc" value="${esc(editData.loc)}"></div>
      <div class="form-field"><label>Легенда</label><textarea id="ef_legend">${esc(editData.legend)}</textarea></div>
      <div class="form-field"><label>Правила *</label><textarea id="ef_rules">${esc(editData.rules)}</textarea></div>
      <div class="form-field"><label>Завершение</label><textarea id="ef_end">${esc(editData.end)}</textarea></div>
      <div class="form-actions">
        <button class="btn btn-accent" id="ef_save">💾 Сохранить</button>
        <button class="btn btn-ghost" id="ef_cancel">Отмена</button>
      </div>
    </div>`;
  // Bind
  document.getElementById('ef_save').addEventListener('click',()=>{
    editData.name=document.getElementById('ef_name').value;
    editData.type=document.getElementById('ef_type').value;
    editData.age=document.getElementById('ef_age').value;
    editData.time=document.getElementById('ef_time').value;
    editData.loc=document.getElementById('ef_loc').value;
    editData.legend=document.getElementById('ef_legend').value;
    editData.rules=document.getElementById('ef_rules').value;
    editData.end=document.getElementById('ef_end').value;
    saveEdit();
  });
  document.getElementById('ef_cancel').addEventListener('click',cancelEdit);
  document.getElementById('ef_type').addEventListener('change',e=>{editData.type=e.target.value;editData.extraTypes=(editData.extraTypes||[]).filter(t=>t!==e.target.value);render();});
  document.querySelectorAll('[data-et]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.et;const et=editData.extraTypes||[];
      if(et.includes(t))editData.extraTypes=et.filter(x=>x!==t);
      else if(et.length<2)editData.extraTypes=[...et,t];
      // Preserve inputs
      editData.name=document.getElementById('ef_name').value;
      editData.time=document.getElementById('ef_time').value;
      editData.loc=document.getElementById('ef_loc').value;
      editData.legend=document.getElementById('ef_legend').value;
      editData.rules=document.getElementById('ef_rules').value;
      editData.end=document.getElementById('ef_end').value;
      render();
    });
  });
}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
