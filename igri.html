  {n:"Крик-Единства",t:["Игры с залом","ПЭФ","Здоровалки"],a:"универсальный",d:"5 мин",l:"без привязки",p:"-",leg:"Сейчас мы создадим общий крик, который объединит весь зал! Я начинаю тихо: «Мы...», вы подхватываете громче: «...команда!». Затем ещё громче: «...одна!». А на финале — все вместе кричим наше общее слово так, чтобы услышали во всём лагере!",r:"Вожатый начинает фразу тихо, зал подхватывает, наращивая громкость на каждом слоге. Финальное слово кричат все вместе на пике громкости. Можно повторить 2-3 раза с разными фразами. Важно: следить, чтобы все успевали подхватывать, не перебивать.",c:"Крик единства прозвучал! Теперь мы чувствуем силу нашей команды и готовы к событию."},
  {n:"Движение-Зал",t:["Игры с залом","ПЭФ","ПТБ"],a:"универсальный",d:"7 мин",l:"помещение/улица",p:"-",leg:"Превратим этот зал в танцпол одной команды! Я показываю простое движение — вы повторяете. Затем добавляем второе, третье. Когда соберём цепочку из 4-5 движений — выполним её все вместе под счёт и начнём мероприятие с улыбкой!",r:"Вожатый на сцене показывает движение, зал повторяет. Добавляются новые движения по одному, цепочка растёт. Когда собрано 4-5 элементов — выполняются все вместе 2-3 раза. Можно ускорять темп, добавлять звуки. Завершается общим выполнением и криком «Старт!».",c:"Движения собраны! Теперь мы двигаемся как один организм и готовы к действию."},
  {n:"Стоп-Имя",t:["Минутки","ИЗ","ПЭФ"],a:"младший",d:"3-5 мин",l:"без привязки",p:"-",leg:"Ребята, мы с вами играем в «Стоп-Имя»! Я считаю до трёх, а вы двигаетесь. Когда я говорю «Стоп!» — замираете и называете имя любого друга из отряда. Потом снова двигаемся. Давайте проверим, как быстро мы можем переключаться!",r:"Дети свободно двигаются. Вожатый считает: «Раз-два-три!». На «Стоп!» все замирают и называют имя соседа или любого участника. Кто назвал — молодец, кто не успел — группа помогает. Игра продолжается 3-5 раундов, можно прервать в любой момент.",c:"Игра завершена! Мы потренировали внимание и ещё раз вспомнили имена друзей."},
  {n:"Цвет-Движение",t:["Минутки","ПЭФ","Минутки"],a:"младший",d:"3-4 мин",l:"без привязки",p:"-",leg:"У нас есть волшебные цвета, которые превращаются в движения! Когда я называю «красный» — прыгаем, «синий» — хлопаем, «жёлтый» — кружимся. Темп буду менять, а вы — ловить цвет и движение. Готовы к быстрой зарядке?",r:"Дети стоят. Вожатый называет цвета в разном порядке. Дети выполняют соответствующие движения. Можно добавлять новые цвета, ускорять темп, путать. Игра длится 3-4 минуты, можно прервать на любом раунде.",c:"Зарядка прошла отлично! Теперь у нас бодрое настроение и быстрая реакция."},
  {n:"Блиц-Вопрос",t:["Минутки","ПЗ","ПЭФ"],a:"средний",d:"4-5 мин",l:"без привязки",p:"-",leg:"У нас есть 60 секунд на блиц-опрос! Я задаю быстрый вопрос — вы хором или по очереди отвечаете одним словом. Темп высокий, ответы короткие. Цель — не подумать, а почувствовать и выдать первое, что приходит в голову. Поехали!",r:"Вожатый задаёт простые вопросы: «Любимый цвет?», «Что радует сегодня?», «Одно слово про отряд?». Дети отвечают быстро, хором или по цепочке. Можно менять темп, задавать 5-7 вопросов. Игра длится 4-5 минут, прерывается по сигналу.",c:"Блиц завершён! Мы узнали друг о друге маленькие, но важные детали."},
  {n:"Ритм-Стоп",t:["Минутки","ПЭФ","ПТБ"],a:"средний",d:"4 мин",l:"без привязки",p:"-",leg:"Мы с вами создаём живой ритм, который может остановиться в любую секунду! Я задаю ритм хлопками — вы подхватываете. Когда я говорю «Стоп!» — замираете в той позе, в которой были. Потом снова включаем ритм. Проверим реакцию!",r:"Дети стоят. Вожатый задаёт ритм хлопками, группа повторяет. На «Стоп!» все замирают. Через 3 секунды — снова ритм. Можно ускорять, добавлять движения, менять направление. Игра длится 4 минуты, прерывается по сигналу.",c:"Ритм остановлен! Мы потренировали внимание и реакцию — теперь мы ещё более собраны."},
  {n:"Слово-Эстафета",t:["Минутки","ПЗ","ПЭФ"],a:"старший",d:"5 мин",l:"без привязки",p:"-",leg:"У нас есть одна минута на словесную эстафету! Я говорю слово на тему «лето» — вы по цепочке добавляете своё, связанное с предыдущим. Темп быстрый, повторяться нельзя. Когда время вышло — останавливаемся и улыбаемся тому, что получилось!",r:"Дети в кругу или стоят. Вожатый начинает: «Солнце». Следующий: «Пляж», следующий: «Море» и т.д. Темп быстрый, нельзя повторяться. Можно менять темы: «дружба», «мечта», «отряд». Игра длится 3-5 минут, прерывается по сигналу.",c:"Эстафета завершена! Мы увидели, как много общих ассоциаций у нашей команды."},
  {n:"Миг-Решение",t:["Минутки","ИВЛ","ПЭФ"],a:"старший",d:"4-5 мин",l:"без привязки",p:"-",leg:"Представьте, что у вас есть ровно 10 секунд на решение! Я задаю ситуацию: «Что возьмёте на необитаемый остров?» — вы быстро называете один предмет. Без долгих раздумий — только первое, что приходит в голову. Готовы к скоростному мозговому штурму?",r:"Вожатый задаёт быстрые ситуационные вопросы. Дети отвечают по цепочке или хором, одним словом/короткой фразой. Темп высокий, на ответ — 5-10 секунд. Можно 5-7 вопросов. Игра прерывается по сигналу в любой момент.",c:"Мозговой штурм завершён! Мы увидели, как быстро и креативно наша команда принимает решения."},
  {n:"Хлоп-Если",t:["Минутки","ПЗ","ПЭФ"],a:"универсальный",d:"3-5 мин",l:"без привязки",p:"-",leg:"Мы играем в «Хлоп-Если»! Я говорю утверждение, а вы хлопаете, если оно про вас. Например: «Хлопните, если любите мороженое!». Темп быстрый, утверждения разные — так мы быстро узнаем друг о друге что-то новое!",r:"Дети стоят. Вожатый говорит утверждения: «Хлопните, если... сегодня улыбались», «...любите приключения», «...хотите дружить». Дети хлопают, если согласны. Темп можно ускорять, утверждения менять. Игра длится 3-5 минут, прерывается в любой момент.",c:"Опрос завершён! Мы быстро узнали, что нас объединяет и чем мы отличаемся."},
  {n:"Цифра-Движение",t:["Минутки","ПЭФ","Минутки"],a:"универсальный",d:"3-4 мин",l:"без привязки",p:"-",leg:"У нас есть волшебные цифры, которые превращаются в движения! «Один» — прыжок, «два» — хлопок, «три» — поворот. Я называю цифры вразброс, а вы — выполняете движение. Темп буду ускорять — проверим реакцию!",r:"Дети стоят. Вожатый называет цифры 1-3-4 в разном порядке. Дети выполняют соответствующие движения. Можно добавлять новые цифры, путать, ускорять. Игра длится 3-4 минуты, прерывается по сигналу.",c:"Реакция проверена! Теперь мы ещё более внимательны и скоординированы."},
  {n:"Вопрос-Лови",t:["Минутки","ПЗ","ПЭФ"],a:"универсальный",d:"4-5 мин",l:"без привязки",p:"мягкий мяч или игрушка",leg:"У нас есть волшебный мяч, который ловит вопросы! Я кидаю мяч и задаю вопрос — тот, кто поймал, быстро отвечает и кидает дальше. Вопросы простые, ответы короткие. Главное — успеть поймать и ответить!",r:"Дети в кругу. Вожатый кидает мяч ребёнку и задаёт вопрос («Любимый фрукт?», «Что радует?»). Ребёнок отвечает, кидает следующему. Темп быстрый, вопросы простые. Игра длится 4-5 минут, прерывается в любой момент.",c:"Вопросы пойманы! Мы быстро узнали друг о друге маленькие, но приятные детали."},
  {n:"Замри-На-Имя",t:["Минутки","ИЗЗ","ПЭФ"],a:"универсальный",d:"3-5 мин",l:"без привязки",p:"-",leg:"Мы с вами играем в «Замри-На-Имя»! Вы двигаетесь, а когда я называю чьё-то имя — все замирают, а тот, чьё имя назвали — делает шаг вперёд и улыбается. Потом снова двигаемся. Проверим, как быстро мы реагируем на имена друзей!",r:"Дети свободно двигаются. Вожатый называет имя любого участника. Все замирают, названный делает шаг вперёд, улыбается, возвращается. Движение продолжается. Можно ускорять, называть по два имени. Игра длится 3-5 минут, прерывается в любой момент.",c:"Игра завершена! Мы ещё раз закрепили имена и потренировали реакцию."},
  {n:"Волшебное Слово",t:["Розыгрыши","ПЭФ","ИЗ"],a:"младший",d:"5-7 мин",l:"без привязки",p:"-",leg:"Ребята, у нас есть секрет: если сказать волшебное слово «Чико-брыко», то всё, что вы сделаете после, станет в два раза веселее! Давайте проверим: я говорю «Чико-брыко», а вы пробуете прыгнуть, хлопнуть, крикнуть — и смотрите, как меняется настроение!",r:"Вожатый объясняет, что «волшебное слово» делает действия веселее. Дети пробуют выполнять простые действия до и после слова, сравнивают «ощущения». На самом деле правило одно: улыбаться после слова. Через 2-3 раунда вожатый «раскрывает секрет»: волшебство — в вашей улыбке!",c:"Секрет раскрыт! Волшебство было в нас самих — в умении улыбаться и веселиться вместе."},
  {n:"Невидимый Предмет",t:["Розыгрыши","ПЭФ","ПТБ"],a:"младший",d:"5-7 мин",l:"без привязки",p:"-",leg:"У меня в руках невидимый, но очень важный предмет — «Улыбка-Прыгунья»! Она передаётся только тому, кто широко улыбнётся. Давайте передадим её по кругу: улыбнулись — получили, передали дальше. Смотрите, как она всех заряжает!",r:"Вожатый «держит» невидимый предмет, «передаёт» ребёнку, который улыбается. Тот «берёт», улыбается, передаёт следующему. На самом деле предмета нет — важен только момент улыбки и передачи. Через 2-3 круга вожатый «роняет» предмет со смешным звуком — все смеются.",c:"Предмет «потерян», но улыбки остались с нами! Теперь мы знаем: самое ценное — это наше хорошее настроение."},
  {n:"Секретная Команда",t:["Розыгрыши","ИВЛ","ПЭФ"],a:"средний",d:"7-10 мин",l:"без привязки",p:"-",leg:"Ребята, у нас есть секретная миссия: только те, кто моргнёт левым глазом, входят в «Секретную Команду» и получают особое задание. Но говорить об этом нельзя! Давайте посмотрим, кто заметит, кто войдёт в команду, и что же это за задание такое...",r:"Вожатый незаметно моргает левым глазом некоторым детям, «посвящая» их в «секретную команду». «Посвящённые» получают «секретное задание» — например, через минуту все вместе сказать «Бум!». Остальные не понимают, что происходит. В конце вожатый раскрывает «секрет»: команда — все, а задание — просто повеселиться!",c:"Секрет раскрыт! Оказалось, что в «Секретной Команде» — весь отряд, а лучшее задание — это улыбаться и быть вместе."},
  {n:"Переводчик-Прикол",t:["Розыгрыши","ПЭФ","ПЗ"],a:"средний",d:"7-10 мин",l:"без привязки",p:"-",leg:"Я сейчас буду говорить на «языке дельфинов», а вы — мои переводчики! Но есть нюанс: переводить нужно не слова, а эмоции. Я говорю «буль-буль-прыг» — вы показываете, что, по-вашему, это значит. Главное — не бояться ошибиться и веселиться!",r:"Вожатый произносит набор звуков, дети «переводят» жестами, мимикой, короткими фразами. Нет правильных ответов — важна импровизация и смех. Через 5-7 раундов вожатый «раскрывает»: язык был выдуманный, а перевод — в вашем настроении!",c:"Перевод завершён! Оказалось, что лучший переводчик — это ваша фантазия и умение смеяться."},
  {n:"Тест-На-Внимательность",t:["Розыгрыши","ПЭФ","ИВЛ"],a:"старший",d:"8-10 мин",l:"без привязки",p:"-",leg:"Ребята, сейчас мы проведём супер-важный тест на внимательность! Вам нужно делать всё, что я говорю, кроме одного: если я скажу слово «синий» — не выполняйте действие. Готовы? Начинаем: поднимите руку, хлопните, присядьте...",r:"Вожатый даёт команды на действия. Дети выполняют. Но «запретное слово» («синий») на самом деле не имеет силы — вожатый его не использует. Через 2-3 минуты «раскрывает»: теста не было, а ловушка — в том, что вы искали подвох там, где его не было!",c:"Тест завершён! Оказалось, что иногда мы сами усложняем простые вещи, а лучший ответ — расслабиться и посмеяться."},
  {n:"Секретный Сигнал",t:["Розыгрыши","ПЭФ","ИС/С"],a:"старший",d:"7-10 мин",l:"без привязки",p:"-",leg:"У нас есть секретный сигнал, который срабатывает только у «избранных». Если я незаметно поправлю часы — вы должны все одновременно сказать «Опа!». Но никому не говорите, что вы в курсе! Давайте проверим, кто заметит сигнал...",r:"Вожатый «посвящает» 2-3 человек в «секрет», говоря, что на поправку часов нужно ответить «Опа!». На самом деле сигнал не срабатывает. Через пару минут вожатый «случайно» поправляет часы — «посвящённые» говорят «Опа!», остальные в недоумении. Затем раскрывается: сигнал был шуточный, а «избранные» — все!",c:"Секрет раскрыт! Оказалось, что лучший сигнал — это наша способность вместе посмеяться над ситуацией."},
  {n:"Невидимая Нить",t:["Розыгрыши","ПТБ","ПЭФ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"У нас между руками — невидимая, но очень прочная нить! Если я потяну её в одну сторону — вы все наклонитесь туда. Но есть секрет: нить «работает» только у тех, кто верит в чудо. Давайте проверим, у кого сильная вера!",r:"Вожатый «держит» невидимую нить, «тянет» её — дети наклоняются. На самом деле дети просто повторяют движение за вожатым. Через 2-3 раунда вожатый «роняет» нить со смешным звуком — все смеются. Раскрывается: нить была в вашем доверии и готовности играть!",c:"Нить «порвалась», но смех остался! Теперь мы знаем: лучшее волшебство — это наше умение доверять и веселиться."},
  {n:"Секретный Танец",t:["Розыгрыши","ПЭФ","ПТБ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"смартфон с музыкой (опционально)",leg:"У нас есть секретный танец, который знают только «посвящённые»! Если зазвучит особая мелодия — они начинают танцевать, а остальные должны угадать, в чём секрет. Но тсс! Не говорите, если вы в курсе!",r:"Вожатый «посвящает» 2-3 человек, говоря, что на свист/хлопок нужно начать танцевать. Включает музыку — «посвящённые» танцуют, остальные в недоумении. Через 2 раунда раскрывается: секрет в том, чтобы просто позволить себе быть смешным и весёлым!",c:"Танец раскрыт! Оказалось, что «посвящённые» — все, кто не боится смеяться и танцевать."},
  {n:"Волшебный Счёт",t:["Розыгрыши","ПЭФ","Минутки"],a:"универсальный",d:"4-6 мин",l:"без привязки",p:"-",leg:"Мы считаем до десяти, но есть волшебное правило: на числе «семь» нужно не говорить, а хлопнуть! Но я могу запутывать: иногда говорить «семь», иногда — нет. Давайте проверим, кто самый внимательный... и кто попадётся на прикол!",r:"Дети считают по кругу. Вожатый объясняет правило: на «семь» — хлопок. Но на самом деле вожатый иногда сам говорит «семь» вместо хлопка, сбивая с толку. Через 2-3 круга раскрывается: правило было, но главный прикол — в вашей реакции и смехе!",c:"Счёт завершён! Оказалось, что лучший результат — это не идеальное выполнение, а умение посмеяться над собой."},
  {n:"Тайный Знак",t:["Розыгрыши","ПЭФ","ИЗ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"У нас есть тайный знак: если я подмигну — вы все должны сказать «Бинго!». Но никому не рассказывайте, что вы знаете секрет! Давайте посмотрим, кто заметит знак, а кто — нет...",r:"Вожатый объясняет 2-3 детям «секрет»: на подмигивание — сказать «Бинго!». Затем вожатый подмигивает — «посвящённые» кричат «Бинго!», остальные в недоумении. Через 2-3 раунда раскрывается: знак был шуточный, а «секрет» — в умении вместе посмеяться!",c:"Знак раскрыт! Оказалось, что лучший тайный знак — это наша общая улыбка."},
  {n:"Чемодан Воспоминаний",t:["Последействие","ПЗ","СЭФ"],a:"младший",d:"12-15 мин",l:"помещение",p:"коробка, украшенная как «чемодан», листочки, карандаши",leg:"Ребята, наша смена подходит к концу, и нам пора собирать чемодан воспоминаний! В этот волшебный чемодан мы положим не вещи, а самые тёплые моменты: смешной случай, нового друга, любимую игру. Давайте вместе наполним его, чтобы увезти с собой частичку нашего отряда!",r:"Дети сидят в кругу. Вожатый передаёт «чемодан» (коробку). Каждый по очереди называет одно воспоминание о смене («Я запомнил, как мы...»), можно нарисовать символ на листочке и положить в чемодан. Группа слушает, может дополнить, похлопать. Игра завершается, когда чемодан «полон».",c:"Чемодан собран! Теперь у каждого из нас есть невидимый, но очень ценный багаж — тёплые воспоминания, которые мы увозим с собой."},
  {n:"Письмо-Себе",t:["Последействие","ПЗ","СЭФ"],a:"младший",d:"15 мин",l:"помещение",p:"листочки, карандаши, конверты (можно сделать из бумаги)",leg:"Давайте напишем письмо самому себе — в будущее! В этом письме — то, что вы хотите помнить об этой смене: кто стал другом, чему научились, что было самым весёлым. Мы запечатаем письма и откроем их, когда встретимся снова — или просто сохраним в сердце.",r:"Дети получают листочки и карандаши. Вожатый помогает сформулировать: «Напиши одно слово про друга, одно — про приключение, одно — про себя». Дети рисуют или пишут (кто как умеет). Складывают в конверт, подписывают. Конверты можно забрать или «спрятать» у вожатого до встречи.",c:"Письма написаны! Теперь у каждого есть послание из лета, которое напомнит: ты — часть нашей большой и дружной истории."},
  {n:"Круг Благодарности",t:["Последействие","ПЗ","СЭФ"],a:"средний",d:"15-20 мин",l:"помещение/улица",p:"-",leg:"Наша смена подходит к финалу, и сейчас — время сказать «спасибо». Давайте встанем в круг и по очереди поблагодарим кого-то из отряда: за помощь, за смех, за поддержку. Не нужно длинных речей — достаточно одного предложения от сердца.",r:"Дети в кругу. Вожатый начинает: «Я благодарю [имя] за то, что...». Затем передаёт «слово» следующему (можно мягким мячом или просто взглядом). Каждый говорит благодарность одному человеку. Важно: слушать внимательно, не перебивать, принимать слова с улыбкой. Игра завершается, когда все скажут.",c:"Круг замкнулся! Теперь у каждого из нас есть тёплые слова, которые мы увозим с собой — как напоминание: ты важен, ты нужен, ты — часть нашей команды."},
  {n:"Карта Достижений",t:["Последействие","ПЗ","ПЭФ"],a:"средний",d:"15-20 мин",l:"помещение",p:"большой лист, маркеры, стикеры",leg:"Давайте создадим карту наших общих побед! На этой карте — не города, а моменты, которыми мы гордимся: первый день, смешной случай, преодоление страха. Каждый из вас добавит свой «остров» — то, что стало важным лично для него и для всего отряда.",r:"Дети работают с общим листом. Каждый получает стикер или место на карте, где рисует/пишет своё достижение или воспоминание («Научился прыгать с вышки», «Нашёл друга», «Не боялся выступать»). Затем — мини-экскурсия по карте: каждый кратко рассказывает о своём «острове».",c:"Карта готова! Теперь у нас есть визуальное напоминание: вместе мы прошли большой путь, и каждый внёс свой вклад в общее приключение."},
  {n:"Капсула Времени",t:["Последействие","ПЗ","СЭФ"],a:"старший",d:"20 мин",l:"помещение",p:"коробка, листочки, ручки, скотч",leg:"Мы создаём капсулу времени — послание в будущее от нашего отряда. Внутри — не вещи, а мысли: что вы хотите помнить, что пожелать себе и друзьям, какой совет дать тем, кто придёт после нас. Давайте наполним её искренностью, чтобы открыть через год — или просто сохранить в сердце.",r:"Дети получают листочки. Вожатый предлагает темы: «Что я беру с собой», «Что хочу пожелать отряду», «Совет будущим участникам». Дети пишут (анонимно или с именем). Листочки складывают в коробку, запечатывают. Можно договориться об открытии или просто символически «запечатать» в памяти.",c:"Капсула запечатана! Теперь у нас есть общее послание, которое напоминает: эта смена — часть нашей истории, и она продолжается в каждом из нас."},
  {n:"Финальный Круг",t:["Последействие","Доверие","СЭФ"],a:"старший",d:"15-20 мин",l:"помещение/улица",p:"-",leg:"Мы подходим к финалу, и сейчас — время тишины и искренности. Встанем в круг, возьмёмся за руки, закроем глаза. Каждый из нас мысленно отправит в центр круга одно слово, одно чувство, одно пожелание для отряда. Когда все отправят — мы вместе «вдохнём» это и сохраним в сердце.",r:"Дети в кругу, держатся за руки, глаза закрыты. Вожатый даёт 30 секунд на формулировку. Затем — минута тишины, чтобы «отправить» пожелание. После — общий глубокий вдох и выдох, «впитывая» общие слова. Можно завершить тихим «спасибо» по кругу.",c:"Круг завершён! Теперь у каждого из нас внутри — тихое, но очень важное послание: мы были вместе, мы были командой, и это остаётся с нами."},
  {n:"Свиток Памяти",t:["Последействие","ПЗ","СЭФ"],a:"универсальный",d:"12-15 мин",l:"помещение",p:"длинный лист бумаги (можно склеить), маркеры",leg:"Давайте создадим общий свиток памяти нашего отряда! На этом свитке — не текст, а символы, рисунки, слова, которые напоминают о наших лучших моментах. Каждый из вас добавит свой штрих — то, что хочет унести с собой в сердце.",r:"Дети работают с общим листом. По очереди каждый подходит, рисует символ, пишет слово или короткую фразу о смене. Можно добавлять в любом порядке, дополнять рисунки друг друга. Когда свиток «заполнен» — все вместе рассматривают, делятся впечатлениями.",c:"Свиток готов! Теперь у нас есть общая летопись, которая напоминает: каждый из нас — важная страница в истории нашего отряда."},
  {n:"Звезда Воспоминаний",t:["Последействие","ПЗ","СЭФ"],a:"универсальный",d:"10-12 мин",l:"помещение",p:"звёздочки из бумаги, маркеры, нитка",leg:"Каждая звезда на небе хранит воспоминание. Давайте создадим своё созвездие: на каждой звёздочке — одно тёплое воспоминание о смене. Мы соберём их в одно целое и повесим так, чтобы оно напоминало: мы — часть чего-то большего и прекрасного.",r:"Дети получают бумажные звёздочки. На каждой пишут/рисуют одно воспоминание. Затем все звёздочки крепятся на общую нить или доску, образуя «созвездие». Можно кратко рассказать о своей звезде. Завершается общим взглядом на созвездие и тихим «спасибо».",c:"Созвездие собрано! Теперь у нас есть видимое напоминание: каждое воспоминание — как звезда, а вместе они светят ярко и долго."},
  {n:"Обещание-Другу",t:["Последействие","ПЗ","Доверие"],a:"универсальный",d:"12-15 мин",l:"помещение",p:"листочки, ручки",leg:"Давайте дадим друг другу маленькие, но важные обещания: «Я напишу тебе», «Я вспомню наш смех», «Я сохраню нашу дружбу». Не нужно громких слов — достаточно одного предложения от сердца, которое вы готовы выполнить.",r:"Дети делятся на пары или остаются в кругу. Каждый получает листочек, пишет одно обещание другу или отряду. Можно зачитать вслух (по желанию) или просто сохранить. Важно: обещание должно быть реальным и тёплым. Завершается обменом листочками или общим «спасибо».",c:"Обещания даны! Теперь у каждого из нас есть маленькое, но важное напоминание: связь, которую мы создали, может продолжаться и после смены."},
  {n:"Финальный Вдох",t:["Последействие","СЭФ","Доверие"],a:"универсальный",d:"8-10 мин",l:"помещение/улица",p:"-",leg:"Мы подходим к финалу, и сейчас — время тишины и благодарности. Встаньте в круг, закройте глаза, сделайте глубокий вдох. На вдохе — вспомните самый тёплый момент смены, на выдохе — отпустите грусть расставания. Давайте вместе сохраним это чувство в сердце.",r:"Дети в кругу, глаза закрыты. Вожатый ведёт дыхательное упражнение: вдох — вспомнить хорошее, выдох — отпустить тревогу. Через 3-4 цикла — минута тишины. Завершается плавным открытием глаз и общей улыбкой или тихим «спасибо».",c:"Вдох завершён! Теперь у каждого из нас внутри — спокойствие и благодарность за то, что было, и уверенность в том, что впереди — новые встречи."},
  {n:"Слепой Путешественник",t:["Доверие","ПТБ","ИЗЗ"],a:"младший",d:"10-12 мин",l:"помещение/улица",p:"повязки на глаза (платки)",leg:"Ребята, представьте, что вы — отважные путешественники, которые идут через волшебный лес. Но сейчас туман, и видеть нельзя. Ваш друг-проводник будет бережно вести вас за руку, подсказывая, где шагнуть. Доверьтесь ему — и вы точно дойдёте до цели!",r:"Дети делятся на пары. Один закрывает глаза, второй — проводник — ведёт его за руку по безопасному маршруту (обходя препятствия, подсказывая «ступенька», «поворот»). Через 3 минуты меняются ролями. Вожатые контролируют безопасность. Важно: проводник говорит тихо и чётко, не дёргает.",c:"Путешествие завершено! Мы увидели: когда доверяешь другу — даже в тумане можно дойти куда угодно."},
  {n:"Падающее Дерево",t:["Доверие","ПТБ","ИС/С"],a:"младший",d:"10 мин",l:"помещение/улица",p:"-",leg:"Представьте, что вы — стройные деревья в лесу. Иногда дерево наклоняется, но рядом стоят другие деревья, которые его поддержат. Давайте попробуем: один из вас аккуратно наклоняется вперёд, а двое соседей бережно ловят и возвращают обратно. Главное — довериться и почувствовать поддержку!",r:"Дети втроём: один в центре, двое по бокам. Центральный скрещивает руки на груди, закрывает глаза, напрягает тело и медленно наклоняется вперёд на 10-15 см. Боковые ловят его плечи и мягко возвращают. Через 2-3 наклона меняются ролями. Вожатые страхуют. Важно: наклоняться только прямо, не сгибать колени резко.",c:"Деревья выросли крепкими! Теперь мы знаем: рядом всегда есть те, кто поддержит, если довериться."},
  {n:"Слепой Художник-2",t:["Доверие","ПТБ","ПЗ"],a:"средний",d:"15 мин",l:"помещение",p:"повязки на глаза, бумага, фломастеры",leg:"Вы — художники, которые рисуют... доверяя партнёру! Один закрывает глаза и держит фломастер, а второй — словами направляет его руку: «чуть выше», «теперь вправо», «нарисуй круг». Получится ли создать рисунок, когда ты не видишь, но доверяешь?",r:"Дети в парах. Один закрывает глаза, берёт фломастер и кладёт руку на бумагу. Второй словами направляет движения («подними руку», «веди вправо», «стоп»). Задача — нарисовать простую фигуру (дом, солнце, смайл). Через 5 минут меняются ролями. Вожатые помогают формулировать инструкции.",c:"Картины готовы! Мы увидели: когда доверяешь словам друга, можно создать нечто красивое даже без зрения."},
  {n:"Доверительный Пад",t:["Доверие","ПТБ","ИС/С"],a:"средний",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Представьте, что вы стоите на краю скалы, но за вашей спиной — надёжные руки друзей. Один из вас закрывает глаза, скрещивает руки и аккуратно падает назад — а команда бережно ловит. Это упражнение поможет почувствовать: ты не один, тебя поддержат!",r:"Дети делятся на группы по 6-8 человек. Один встаёт спиной к группе, скрещивает руки на груди, закрывает глаза. Группа встаёт полукругом, вытягивает руки ладонями вверх. По сигналу центральный медленно падает назад — группа ловит, мягко амортизирует и возвращает в вертикаль. Через 1-2 раза меняются. Вожатые страхуют.",c:"Падения завершены! Теперь мы чувствуем: за спиной — надёжная команда, которой можно довериться."},
  {n:"Навигатор Доверия",t:["Доверие","ИВЛ","ПЗ"],a:"старший",d:"15-20 мин",l:"улица",p:"повязки на глаза, простые препятствия (конусы, верёвки)",leg:"Вы — исследователь, который идёт через неизведанную территорию с закрытыми глазами. Ваш партнёр — навигатор — видит путь и словами ведёт вас к цели. Доверьтесь его словам, слушайте внимательно — и вы вместе преодолеете любое препятствие!",r:"Дети в парах. Один закрывает глаза, второй — навигатор — стоит рядом и словами направляет («два шага вперёд», «поворот налево», «подними ногу»). На маршруте — простые препятствия (обойти конус, перешагнуть верёвку). Задача — дойти до финиша, не задев препятствия. Через 5-7 минут меняются ролями. Вожатые контролируют безопасность.",c:"Маршрут пройден! Мы увидели: когда доверяешь навигатору и слушаешь внимательно — можно пройти любой путь."},
  {n:"Живая Опора",t:["Доверие","ПТБ","ИС/С"],a:"старший",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Представьте, что вы — часть живой конструкции, где каждый — опора для другого. Один из вас закрывает глаза и медленно переносит вес на партнёра, тот — принимает и возвращает. Так мы научимся чувствовать вес доверия и ответственность за другого.",r:"Дети в парах, стоят лицом друг к другу на расстоянии шага. Один закрывает глаза, слегка наклоняется вперёд, перенося вес на партнёра. Тот принимает вес руками на плечи/предплечья, удерживает 3-5 секунд, мягко возвращает. Через 3-4 раза меняются. Важно: движения плавные, без рывков, вожатые страхуют.",c:"Опора выдержала! Теперь мы чувствуем: доверие — это не только отдать вес, но и уметь его принять."},
  {n:"Проводник-Слепой",t:["Доверие","ПТБ","ИЗЗ"],a:"универсальный",d:"10 мин",l:"помещение/улица",p:"повязки на глаза",leg:"Один из вас — проводник, второй — путешественник с закрытыми глазами. Проводник берёт за руку и ведёт по простому маршруту, предупреждая о поворотах и препятствиях. Доверьтесь — и вы вместе пройдёте любой путь!",r:"Дети в парах. Один закрывает глаза, второй ведёт за руку или за локоть, говоря: «ступенька», «поворот», «стоп». Маршрут — 5-7 простых элементов. Через 3 минуты меняются ролями. Вожатые контролируют безопасность.",c:"Путь пройден! Мы увидели: когда доверяешь проводнику — даже с закрытыми глазами можно идти уверенно."},
  {n:"Круг Поддержки",t:["Доверие","СЭФ","ИС/С"],a:"универсальный",d:"8-10 мин",l:"помещение/улица",p:"-",leg:"Встаньте в плотный круг, плечом к плечу. Один из вас в центре закрывает глаза, расслабляется и медленно наклоняется в любую сторону. Круг бережно принимает его и возвращает в центр. Так мы почувствуем: за спиной — надёжная команда!",r:"Дети в плотном кругу. Один в центре закрывает глаза, скрещивает руки, напрягает тело. Медленно наклоняется вперёд/назад/вбок — круг мягко принимает плечами/руками и возвращает. Через 3-4 наклона меняются. Вожатые страхуют.",c:"Круг замкнулся! Теперь мы знаем: в центре поддержки можно расслабиться и довериться."},
  {n:"Доверительный Шаг",t:["Доверие","ПТБ","ПЭФ"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Встаньте в пары лицом друг к другу на расстоянии шага. Закройте глаза, вытяните руки вперёд. По сигналу сделайте шаг навстречу — и ваши ладони встретятся. Это простой, но важный момент: довериться и сделать шаг, зная, что тебя встретят!",r:"Дети в парах. Закрывают глаза, вытягивают руки. По сигналу делают шаг вперёд — ладони встречаются. Если не встретились — делают ещё полшага. Можно усложнить: шаг с поворотом, с хлопком. Важно: шаг плавный, без рывка.",c:"Шаги сделаны! Теперь мы чувствуем: доверие начинается с малого — с готовности протянуть руку."},
  {n:"Тихий Страж",t:["Доверие","СЭФ","ПТБ"],a:"универсальный",d:"10 мин",l:"помещение",p:"-",leg:"Закройте глаза и представьте: за вашей спиной стоит тихий страж, который охраняет ваш покой. На самом деле — это ваш друг из отряда, который молча стоит за вами и следит, чтобы вам было безопасно. Просто расслабьтесь и почувствуйте эту незримую поддержку.",r:"Дети в парах. Один закрывает глаза, стоит или сидит расслабленно. Второй встаёт за спиной на расстоянии шага, молча «охраняет» (не прикасается, просто присутствует). Через 2 минуты меняются. Важно: полная тишина, плавные перемещения.",c:"Страж отступил! Теперь мы знаем: поддержка бывает тихой, но от этого не менее надёжной."},
  {n:"Утренний Паровозик",t:["Здоровалки","ПЭФ","ПТБ"],a:"младший",d:"5-7 мин",l:"помещение/улица",p:"-",leg:"Доброе утро, друзья! Наш отряд — это весёлый паровозик, который отправляется в новый день! Каждый вагончик приветствует соседа: хлопком, улыбкой, добрым словом. Давайте сцепимся и покатимся навстречу приключениям!",r:"Дети выстраиваются в цепочку, кладут руки на плечи впереди стоящего. По очереди каждый говорит соседу справа доброе утро + имя + жест (хлопок, «дай пять», кивок). Когда цепочка проходит — все вместе кричат «Поехали!» и делают шаг вперёд.",c:"Паровозик в пути! Теперь мы поприветствовали друг друга и готовы к новому дню."},
  {n:"Солнечный Круг",t:["Здоровалки","ПЭФ","ИЗ"],a:"младший",d:"5 мин",l:"улица/помещение",p:"-",leg:"Доброе утро, солнышки! Давайте встанем в круг и подарим друг другу лучики добра. Каждый из вас «отправит» солнышко соседу: улыбнётся, назовёт имя и скажет «Доброе утро!». Так наш круг засияет по-настоящему!",r:"Дети в кругу. По очереди каждый поворачивается к соседу справа, улыбается, называет имя и говорит «Доброе утро!». Сосед отвечает «И тебе!». Так по кругу. Можно добавить жест: «послать» воздушный поцелуй или лучик руками.",c:"Круг засиял! Теперь у каждого есть порция утреннего тепла от друзей."},
  {n:"Привет-Эстафета",t:["Здоровалки","ПЭФ","ПТБ"],a:"средний",d:"7 мин",l:"без привязки",p:"-",leg:"Доброе утро, команда! Сегодня мы приветствуем друг друга по-особенному: каждый придумывает свой уникальный жест-приветствие и передаёт его по цепочке. Так мы создадим свою утреннюю традицию, которая зарядит нас на весь день!",r:"Дети в кругу. Первый придумывает жест + слово («Привет, [имя]!» + хлопок по плечу). Сосед повторяет жест и слово, затем добавляет свой вариант. Так по кругу. Можно усложнить: запоминать и повторять все предыдущие приветствия.",c:"Эстафета завершена! Теперь у нас есть коллекция утренних приветствий, которые можно использовать каждый день."},
  {n:"Утренний Ритм",t:["Здоровалки","ПЭФ","ИС/С"],a:"средний",d:"7-10 мин",l:"без привязки",p:"-",leg:"Доброе утро! Давайте начнём день с общего ритма: я задаю паттерн хлопков и слов, вы подхватываете. Когда весь отряд зазвучит в унисон — мы готовы к новым свершениям! Поехали!",r:"Дети в кругу. Вожатый задаёт ритм: «Добр-хлоп-утро-хлоп-ребята-хлоп». Группа повторяет. Постепенно ритм усложняется, добавляются движения. Когда все синхронны — общий финальный хлопок и крик «Вперёд!».",c:"Ритм найден! Теперь мы звучим как одна команда и готовы к делу."},
  {n:"Привет-Настроение",t:["Здоровалки","ПЗ","ПЭФ"],a:"старший",d:"8-10 мин",l:"без привязки",p:"-",leg:"Доброе утро! Давайте поприветствуем друг друга не просто словами, а с настроением. Каждый из вас скажет «Привет, [имя]!» и добавит одно слово, которое описывает ваше утро: «бодрое», «творческое», «вдохновляющее». Так мы узнаем не только имена, но и настрой друг друга!",r:"Дети в кругу. По очереди каждый называет имя соседа и добавляет слово-настроение. Можно добавить жест или интонацию. Группа может повторить слово хором. Темп умеренный, с паузами на осмысление.",c:"Настроения озвучены! Теперь мы знаем, с каким настроем каждый начинает день, и можем поддержать друг друга."},
  {n:"Утренний Круг Силы",t:["Здоровалки","Доверие","СЭФ"],a:"старший",d:"10 мин",l:"помещение/улица",p:"-",leg:"Доброе утро. Встанем в круг, возьмёмся за руки, закроем глаза. Сейчас каждый из нас мысленно отправит в центр круга одно слово-намерение на сегодня: «спокойствие», «смелость», «вдохновение». Когда все отправят — мы вместе «вдохнём» эти слова и начнём день с общей силой.",r:"Дети в кругу, держатся за руки, глаза закрыты. Вожатый даёт 30 секунд на формулировку намерения. Затем — минута тишины. После — общий глубокий вдох и выдох. Завершается плавным открытием глаз и тихим «Доброе утро» по кругу.",c:"Круг замкнулся! Теперь у нас есть общее намерение, которое будет поддерживать нас весь день."},
  {n:"Привет-Движение",t:["Здоровалки","ПЭФ","ПТБ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Доброе утро! Давайте поприветствуем друг друга движением: я показываю жест, вы повторяете и добавляете свой. Так мы создадим цепочку утренних приветствий, которая зарядит нас энергией!",r:"Дети в кругу. Первый показывает жест + говорит «Привет, [имя]!». Сосед повторяет жест и слово, затем добавляет свой жест. Так по кругу. Можно ускорять темп, добавлять звуки.",c:"Цепочка собрана! Теперь у нас есть общий язык утренних жестов, который объединяет отряд."},
  {n:"Утреннее Эхо",t:["Здоровалки","ПЭФ","ИЗ"],a:"универсальный",d:"5 мин",l:"без привязки",p:"-",leg:"Доброе утро! Представьте, что наш отряд — это волшебное эхо. Я говорю «Привет, [имя]!» — вы хором повторяете. Затем следующий говорит своё приветствие — и снова эхо. Так мы услышим каждое имя и зарядимся добром!",r:"Дети в кругу. Вожатый начинает: «Привет, [имя первого]!». Группа хором повторяет. Затем первый говорит «Привет, [имя второго]!» — группа повторяет. Так по кругу. Можно добавлять интонации, жесты.",c:"Эхо ответило! Теперь каждое имя прозвучало, и мы готовы к новому дню."},
  {n:"Привет-Ассоциация",t:["Здоровалки","ПЗ","ПЭФ"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Доброе утро! Давайте поприветствуем друг друга с ассоциацией: «Привет, [имя], ты сегодня как [солнце/ветер/радуга]!». Так мы не только назовём имена, но и подарим друг другу красивые образы на весь день!",r:"Дети в кругу. По очереди каждый говорит соседу: «Привет, [имя], ты сегодня как...» + ассоциация. Можно добавить жест или интонацию. Группа может повторить ассоциацию хором. Темп спокойный, с паузами.",c:"Ассоциации подарены! Теперь у каждого есть красивый образ, с которым он начинает день."},
  {n:"Утренний Сигнал",t:["Здоровалки","ПЭФ","Минутки"],a:"универсальный",d:"5 мин",l:"без привязки",p:"-",leg:"Доброе утро! У нас есть утренний сигнал: когда я поднимаю руку — вы все вместе говорите «Доброе утро, отряд!». Давайте потренируемся, чтобы наш сигнал звучал громко, дружно и заряжал на весь день!",r:"Дети стоят свободно. Вожатый подаёт сигнал (поднимает руку, хлопает, свистит). Группа хором отвечает «Доброе утро, отряд!» + жест (хлопок, взмах). Можно менять сигналы, ускорять темп, добавлять варианты ответа.",c:"Сигнал принят! Теперь у нас есть общий утренний код, который объединяет и заряжает отряд."},
  {n:"Цветные Команды",t:["Разбивки","ПЭФ","Минутки"],a:"младший",d:"5 мин",l:"без привязки",p:"цветные карточки или ленточки (можно заменить на предметы)",leg:"Ребята, нам нужно разделиться на команды для большого приключения! У каждого из вас есть волшебный цвет. Когда я скажу «Красные!» — все, у кого красный, собираются вместе. Так мы быстро и весело создадим команды для игры!",r:"Дети получают цветные карточки (или вожатый показывает цвет). По команде «Красные!» — дети с красным собираются в группу. Затем «Синие!», «Жёлтые!» и т.д. Можно усложнить: собирать по 2 цвета, по звуку, по жесту. Важно: вожатые помогают детям найти свою группу.",c:"Команды собраны! Теперь мы готовы к приключениям в маленьких, но дружных группах."},
  {n:"Животные-Группы",t:["Разбивки","ПЭФ","ПТБ"],a:"младший",d:"5-7 мин",l:"без привязки",p:"карточки с животными (можно нарисовать)",leg:"Представьте, что вы — зверята, которые ищут свою стаю! У каждого из вас есть секретное животное. Когда я скажу «Ищем львов!» — все львята рычат и собираются вместе. Так мы найдём свои команды через звуки и движения!",r:"Дети получают карточки с животными (не показывают другим). По сигналу начинают издавать звуки своего животного и двигаться, ища «своих». Когда группа собралась — садятся вместе. Можно повторить с другими животными. Вожатые помогают, если кто-то потерялся.",c:"Стаи собраны! Теперь каждая команда знает своих «зверят» и готова к игре."},
  {n:"Пазл-Команды",t:["Разбивки","ПЭФ","ИС/С"],a:"средний",d:"7-10 мин",l:"помещение/улица",p:"разрезанные картинки или фразы (на бумаге)",leg:"У нас есть секрет: чтобы найти свою команду, нужно собрать пазл! Каждый из вас получил кусочек картинки или фразы. Ваша задача: найти тех, у кого остальные части, и вместе собрать целое. Так мы создадим команды через сотрудничество!",r:"Дети получают кусочки пазла (картинка, разрезанная на 4-5 частей, или фраза, разбитая на слова). Без слов, жестами и короткими фразами ищут «своих». Когда группа собралась и собрала пазл — садятся вместе. Вожатые контролируют процесс.",c:"Пазлы собраны! Теперь каждая команда — это целая картинка, готовая к новым задачам."},
  {n:"Вопрос-Разбивка",t:["Разбивки","ПЗ","ПЭФ"],a:"средний",d:"7-10 мин",l:"без привязки",p:"карточки с вопросами (опционально)",leg:"Чтобы найти свою команду, ответьте на вопрос: «Как ты любишь проводить время?». Те, у кого похожие ответы, собираются вместе. Так мы не только разобьёмся на группы, но и узнаем, что нас объединяет!",r:"Дети получают карточки с вопросами или вариантами ответов («спорт», «творчество», «приключения», «тихий отдых»). По сигналу начинают искать тех, у кого такой же или похожий ответ. Когда группа из 5-7 человек собралась — садятся. Можно обсудить в группе, почему выбрали этот ответ.",c:"Группы сформированы! Теперь в каждой команде — люди с общими интересами, с которыми легко работать."},
  {n:"Ценности-Команды",t:["Разбивки","ПЗ","ИВЛ"],a:"старший",d:"10-12 мин",l:"без привязки",p:"карточки с ценностями (дружба, творчество, лидерство и т.д.)",leg:"Чтобы найти свою команду, определите, что для вас важно прямо сейчас: дружба, творчество, приключения, спокойствие. Те, кто выбрал близкие ценности, собираются вместе. Так мы создадим группы, где будет легко договариваться и творить!",r:"Дети получают карточки с ценностями или выбирают из списка. Без долгих обсуждений ищут тех, у кого похожий выбор. Когда группа из 5-6 человек собралась — садятся и кратко обсуждают: «Почему мы выбрали это?». Вожатые модерируют процесс.",c:"Команды сформированы! Теперь в каждой группе — люди с общими ориентирами, что упростит совместную работу."},
  {n:"Задача-Разбивка",t:["Разбивки","ИВЛ","ИС/С"],a:"старший",d:"10-15 мин",l:"помещение/улица",p:"карточки с типами задач (организация, креатив, логика, коммуникация)",leg:"Нам нужно разделиться на команды для разных задач. Каждый из вас выбирает, в чём он силён: организовывать, придумывать, анализировать или общаться. Те, кто выбрал близкие навыки, собираются вместе — так мы создадим сбалансированные команды!",r:"Дети получают карточки с типами задач или выбирают из списка. Ищут тех, у кого похожий или дополнительный навык (например, в команде должны быть и организаторы, и креативщики). Когда группа из 5-6 человек собралась — представляют себя: «Мы — команда, которая...».",c:"Команды готовы! Теперь каждая группа имеет свой профиль и готова к выполнению задач."},
  {n:"Счёт-Разбивка",t:["Разбивки","ПЭФ","Минутки"],a:"универсальный",d:"3-5 мин",l:"без привязки",p:"-",leg:"Быстро и весело разобьёмся на команды! Я считаю: «Первые, вторые, третьи, четвёртые!». Вы запоминаете своё число. Когда я скажу «Первые!» — все единицы собираются вместе. Так за минуту мы создадим группы для игры!",r:"Дети стоят в шеренге или кругу. Вожатый быстро считает по порядку, присваивая каждому номер (1-4 или 1-5). Затем по команде «Первые!» — все с номером 1 собираются в группу. Повторяется для всех номеров. Можно менять порядок счёта, ускорять темп.",c:"Группы собраны! Теперь мы готовы к игре в маленьких, но дружных командах."},
  {n:"Жест-Команда",t:["Разбивки","ПЭФ","ПТБ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Чтобы найти свою команду, покажите жест! Я шепну каждому на ушко один из трёх жестов. Когда я скажу «Ищем своих!» — вы показываете жест и ищете тех, у кого такой же. Так мы разобьёмся без слов, только через движения!",r:"Вожатый шепчет каждому ребёнку один из 3-4 жестов (хлопок, взмах, кивок). По сигналу дети начинают показывать жест и искать «своих». Когда группа собралась — садятся вместе. Можно усложнить: жест + звук.",c:"Команды найдены! Теперь каждая группа знает свой секретный жест и готова к игре."},
  {n:"Дата-Разбивка",t:["Разбивки","ПЗ","Минутки"],a:"универсальный",d:"5 мин",l:"без привязки",p:"-",leg:"Быстро разобьёмся по дате рождения! Без слов, только жестами покажите месяц, в котором вы родились. Те, у кого близкие месяцы, собираются вместе. Так мы создадим группы и узнаем, у кого скоро день рождения!",r:"Дети без слов показывают месяц рождения пальцами или жестами (январь — 1 палец, декабрь — 12 и т.д.). Ищут тех, у кого близкие месяцы. Когда группа из 5-7 человек собралась — садятся. Можно затем назвать месяцы вслух для проверки.",c:"Группы сформированы! Теперь мы знаем, у кого когда день рождения, и готовы к игре."},
  {n:"Ритм-Разбивка",t:["Разбивки","ПЭФ","ПТБ"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Чтобы найти свою команду, слушайте ритм! Я отбиваю паттерн хлопками — вы повторяете. Те, у кого получился одинаковый ритм, собираются вместе. Так мы разобьёмся через музыку и движение!",r:"Вожатый отбивает 2-3 разных ритма (простой, сложный, с паузами). Дети повторяют тот ритм, который запомнили. Затем ищут тех, кто хлопает так же. Когда группа собралась — садятся. Можно менять ритмы, ускорять темп.",c:"Ритмы совпали! Теперь каждая команда знает свой паттерн и готова к игре."}
];

let games = [];

// Загрузка данных
function loadData() {
  const stored = localStorage.getItem('vozh_games_full_v3');
  if (stored) {
    try { games = JSON.parse(stored); } catch (e) {
      games = [...initialGames];
      localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
    }
  } else {
    games = [...initialGames];
    localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
  }
  updateTypeFilter();
  applyFilters();
}

function updateTypeFilter() {
  const typeFilter = document.getElementById('type-filter');
  const currentVal = typeFilter.value;
  typeFilter.innerHTML = '<option value="all">Все</option>';
  const allTypes = [...new Set(games.flatMap(g => g.t))].sort();
  allTypes.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    if(t === currentVal) opt.selected = true;
    typeFilter.appendChild(opt);
  });
}

// Рендер карточек
function renderGames(list) {
  const container = document.getElementById('games-container');
  container.innerHTML = '';
  document.getElementById('stats').textContent = `Найдено: ${list.length} игр`;
  if (list.length === 0) {
    container.innerHTML = '<div class="no-results">🔍 Игры не найдены. Добавьте новую!</div>';
    return;
  }
  list.forEach((g, index) => {
    const realIndex = games.findIndex(x => x.n === g.n && x.t[0] === g.t[0]);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-actions">
        <button class="icon-btn" onclick="openModal(${realIndex})" title="Редактировать">✏️</button>
        <button class="icon-btn del" onclick="quickDelete(${realIndex})" title="Удалить">🗑️</button>
      </div>
      <div class="card-title">${g.n}</div>
      <div class="tags">
        ${g.t.map(t => `<span class="tag">${t}</span>`).join('')}
        <span class="tag age">${g.a}</span>
      </div>
      <div class="meta">
        <span>⏱️ ${g.d}</span>
        <span>📍 ${g.l}</span>
        <span>🎒 ${g.p}</span>
      </div>
      <button class="toggle-btn">📖 Показать полное описание</button>
      <div class="details">
        <h4>📜 Легенда</h4><p>${g.leg}</p>
        <h4>📐 Правила</h4><p>${g.r}</p>
        <h4>🏁 Завершение игры</h4><p>${g.c}</p>
      </div>
    `;
    const btn = card.querySelector('.toggle-btn');
    const details = card.querySelector('.details');
    btn.addEventListener('click', () => {
      details.classList.toggle('open');
      btn.textContent = details.classList.contains('open') ? '📖 Скрыть описание' : '📖 Показать полное описание';
    });
    container.appendChild(card);
  });
}

// Фильтрация
function applyFilters() {
  const searchVal = document.getElementById('search').value.toLowerCase().trim();
  const ageVal = document.getElementById('age-filter').value;
  const typeVal = document.getElementById('type-filter').value;
  const filtered = games.filter(g => {
    const matchSearch = !searchVal || g.n.toLowerCase().includes(searchVal) || g.leg.toLowerCase().includes(searchVal) || g.r.toLowerCase().includes(searchVal);
    const matchAge = ageVal === 'all' || g.a === ageVal;
    const matchType = typeVal === 'all' || g.t.includes(typeVal);
    return matchSearch && matchAge && matchType;
  });
  renderGames(filtered);
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('age-filter').addEventListener('change', applyFilters);
document.getElementById('type-filter').addEventListener('change', applyFilters);

// Модальное окно
const modalOverlay = document.getElementById('modal-overlay');
function openModal(index = null) {
  const title = document.getElementById('modal-title');
  const btnDelete = document.getElementById('btn-delete');
  document.getElementById('edit-id').value = "";
  document.getElementById('f-name').value = "";
  document.getElementById('f-types').value = "";
  document.getElementById('f-age').value = "универсальный";
  document.getElementById('f-duration').value = "";
  document.getElementById('f-loc').value = "";
  document.getElementById('f-equip').value = "";
  document.getElementById('f-leg').value = "";
  document.getElementById('f-rules').value = "";
  document.getElementById('f-comp').value = "";

  if (index !== null && games[index]) {
    const g = games[index];
    title.textContent = "Редактировать игру";
    document.getElementById('edit-id').value = index;
    document.getElementById('f-name').value = g.n;
    document.getElementById('f-types').value = g.t.join(", ");
    document.getElementById('f-age').value = g.a;
    document.getElementById('f-duration').value = g.d;
    document.getElementById('f-loc').value = g.l;
    document.getElementById('f-equip').value = g.p;
    document.getElementById('f-leg').value = g.leg;
    document.getElementById('f-rules').value = g.r;
    document.getElementById('f-comp').value = g.c;
    btnDelete.style.display = "block";
  } else {
    title.textContent = "Добавить новую игру";
    btnDelete.style.display = "none";
  }
  modalOverlay.style.display = 'flex';
  setTimeout(() => modalOverlay.classList.add('open'), 10);
}

function closeModal() {
  modalOverlay.classList.remove('open');
  setTimeout(() => { modalOverlay.style.display = 'none'; }, 200);
}

function saveGame() {
  const name = document.getElementById('f-name').value.trim();
  const typesStr = document.getElementById('f-types').value.trim();
  if (!name || !typesStr) { alert("Пожалуйста, заполните Название и Типы игр."); return; }
  const types = typesStr.split(',').map(s => s.trim()).filter(s => s !== "");
  const newGame = {
    n: name, t: types, a: document.getElementById('f-age').value,
    d: document.getElementById('f-duration').value, l: document.getElementById('f-loc').value,
    p: document.getElementById('f-equip').value, leg: document.getElementById('f-leg').value,
    r: document.getElementById('f-rules').value, c: document.getElementById('f-comp').value
  };
  const editId = document.getElementById('edit-id').value;
  if (editId !== "") games[parseInt(editId)] = newGame;
  else games.unshift(newGame);
  localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
  closeModal();
  updateTypeFilter();
  applyFilters();
}

function deleteGame() {
  if (confirm("Вы уверены, что хотите удалить эту игру?")) {
    const editId = document.getElementById('edit-id').value;
    if (editId !== "") {
      games.splice(parseInt(editId), 1);
      localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
      closeModal();
      updateTypeFilter();
      applyFilters();
    }
  }
}

function quickDelete(index) {
  if (confirm("Удалить эту игру?")) {
    games.splice(index, 1);
    localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
    updateTypeFilter();
    applyFilters();
  }
}

function resetData() {
  if (confirm("Вы уверены? Все ваши изменения будут удалены, и восстановится полная исходная игротека.")) {
    games = [...initialGames];
    localStorage.setItem('vozh_games_full_v3', JSON.stringify(games));
    updateTypeFilter();
    applyFilters();
  }
}

modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

// 🌗 ТЕМНАЯ/СВЕТЛАЯ ТЕМА
const themeToggle = document.getElementById('theme-toggle');
const currentTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', currentTheme);
updateThemeIcon(currentTheme);

themeToggle.addEventListener('click', () => {
  const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeIcon(newTheme);
});

function updateThemeIcon(theme) {
  themeToggle.textContent = theme === 'light' ? '🌙' : '☀️';
}

loadData();
</script>
</body>
</html>
