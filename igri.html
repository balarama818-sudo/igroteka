<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏕️ Игротека Вожатого PRO (160 игр)</title>
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --primary: #2563eb; --primary-hover: #1d4ed8; --danger: #ef4444;
      --input-bg: #ffffff; --tag-bg: #e0f2fe; --tag-text: #0369a1;
      --tag-age-bg: #fef3c7; --tag-age-text: #b45309; --modal-bg: rgba(0,0,0,0.5);
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8;
      --border: #334155; --shadow: 0 4px 6px -1px rgba(0,0,0,0.5);
      --primary: #3b82f6; --primary-hover: #60a5fa; --danger: #f87171;
      --input-bg: #0f172a; --tag-bg: #1e3a8a; --tag-text: #93c5fd;
      --tag-age-bg: #78350f; --tag-age-text: #fcd34d; --modal-bg: rgba(0,0,0,0.7);
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
    body{background:var(--bg);color:var(--text);line-height:1.6;padding:20px;padding-bottom:80px;transition:background 0.3s,color 0.3s;}
    header{text-align:center;margin-bottom:30px;padding-right: 80px;}
    h1{font-size:2rem;color:var(--primary);margin-bottom:8px;}
    .subtitle{color:var(--muted);font-size:0.95rem;}
    
    /* 🌗 Правый верхний угол */
    .top-controls{position:fixed;top:20px;right:20px;z-index:50;display:flex;gap:10px;align-items:center;}
    .ctrl-btn{background:var(--card);border:1px solid var(--border);color:var(--text);height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all 0.2s;box-shadow:var(--shadow);backdrop-filter:blur(6px);padding:0 12px;gap:6px;font-weight:500;}
    .ctrl-btn:hover{background:var(--border);transform:translateY(-2px);}
    .ctrl-btn.reset{width:auto;}
    .ctrl-btn.theme{width:40px;padding:0;}
    @media(max-width:600px){.top-controls{top:15px;right:15px;}.ctrl-btn{height:36px;font-size:1rem;padding:0 10px;}.ctrl-btn.reset{font-size:0.8rem;}header{padding-right:0;}}

    .filters{background:var(--card);padding:15px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;transition:0.3s;}
    .filter-group{flex:1;min-width:180px;}
    label{display:block;font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:4px;}
    input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;background:var(--input-bg);color:var(--text);transition:border 0.2s,background 0.3s,color 0.3s;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,0.3);}
    
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;}
    .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:0.3s;border:1px solid transparent;position:relative;}
    .card:hover{transform:translateY(-2px);border-color:var(--border);}
    
    .card-actions{position:absolute;top:15px;right:15px;display:flex;gap:6px;opacity:0;transition:0.2s;}
    .card:hover .card-actions{opacity:1;}
    @media(max-width:600px){.card-actions{opacity:1;top:10px;right:10px;}}
    
    .icon-btn{background:var(--border);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:0.2s;font-size:0.9rem;}
    .icon-btn:hover{background:var(--muted);color:var(--text);}
    .icon-btn.del:hover{background:rgba(239,68,68,0.2);color:var(--danger);}
    
    .card-title{font-size:1.15rem;font-weight:700;color:var(--primary);margin-bottom:8px;line-height:1.3;padding-right:60px;}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
    .tag{background:var(--tag-bg);color:var(--tag-text);padding:3px 7px;border-radius:15px;font-size:0.65rem;font-weight:600;text-transform:uppercase;transition:0.3s;}
    .tag.age{background:var(--tag-age-bg);color:var(--tag-age-text);}
    .meta{display:flex;gap:10px;font-size:0.8rem;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;}
    .meta span{display:flex;align-items:center;gap:3px;}
    
    .details{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
    .details.open{display:block;animation:fadeIn 0.3s ease;}
    .details h4{margin:10px 0 4px;color:var(--primary);font-size:0.85rem;font-weight:700;}
    .details p{font-size:0.88rem;color:var(--text);margin-bottom:8px;white-space:pre-line;opacity:0.9;}
    .toggle-btn{margin-top:8px;background:none;border:none;color:var(--primary);font-weight:600;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;gap:4px;}
    
    .fab{position:fixed;bottom:30px;right:30px;width:55px;height:55px;background:var(--primary);color:white;border:none;border-radius:50%;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,0.4);transition:0.2s;display:flex;align-items:center;justify-content:center;z-index:10;}
    .fab:hover{background:var(--primary-hover);transform:scale(1.05);}
    
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--modal-bg);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.2s;}
    .modal-overlay.open{display:flex;opacity:1;}
    .modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:25px;box-shadow:0 20px 25px rgba(0,0,0,0.2);transform:scale(0.9);transition:transform 0.2s,background 0.3s;color:var(--text);}
    .modal-overlay.open .modal{transform:scale(1);}
    
    .modal h2{margin-bottom:15px;color:var(--primary);text-align:center;font-size:1.3rem;}
    .form-group{margin-bottom:12px;}
    .form-group label{margin-bottom:6px;}
    .form-actions{display:flex;gap:10px;margin-top:15px;}
    .btn{padding:10px;border-radius:8px;border:none;font-weight:600;cursor:pointer;font-size:0.9rem;flex:1;transition:0.2s;}
    .btn-p{background:var(--primary);color:white;}
    .btn-p:hover{background:var(--primary-hover);}
    .btn-s{background:var(--border);color:var(--muted);}
    .btn-s:hover{background:var(--muted);color:var(--text);}
    .btn-d{background:rgba(239,68,68,0.15);color:var(--danger);}
    .btn-d:hover{background:rgba(239,68,68,0.25);}
    
    .stats{font-size:0.85rem;color:var(--muted);margin-bottom:15px;}
    .no-results{grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);background:var(--card);border-radius:var(--radius);}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  </style>
</head>
<body>

<header>
  <h1>🏕️ Игротека Вожатого</h1>
  <p class="subtitle">160 игр. Полные описания. Фильтры, поиск, редактирование и добавление новых.</p>
</header>

<div class="top-controls">
  <button class="ctrl-btn theme" id="theme-toggle" title="Сменить тему">🌙</button>
  <button class="ctrl-btn reset" onclick="resetData()" title="Восстановить исходные 160 игр">🔄 Сбросить</button>
</div>

<div class="stats" id="stats">Загрузка...</div>

<div class="filters">
  <div class="filter-group"><label for="search">🔍 Поиск</label><input type="text" id="search" placeholder="Название, правило, легенда..."></div>
  <div class="filter-group"><label for="age-filter">👶 Возраст</label><select id="age-filter"><option value="all">Все</option><option value="младший">Младший (6-10)</option><option value="средний">Средний (11-14)</option><option value="старший">Старший (15-18)</option><option value="универсальный">Универсальный</option></select></div>
  <div class="filter-group"><label for="type-filter">🎮 Тип игры</label><select id="type-filter"><option value="all">Все</option></select></div>
</div>

<div id="games-container" class="grid"></div>

<button class="fab" onclick="openModal()" title="Добавить игру">+</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Добавить игру</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group"><label>Название игры *</label><input type="text" id="f-name" required></div>
    <div class="form-group"><label>Типы (через запятую) *</label><input type="text" id="f-types" placeholder="ИЗ, ПЭФ, Минутки" required></div>
    <div class="form-group">
      <label>Возраст</label>
      <select id="f-age">
        <option value="младший">Младший (6-10)</option>
        <option value="средний">Средний (11-14)</option>
        <option value="старший">Старший (15-18)</option>
        <option value="универсальный">Универсальный</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1"><label>Время</label><input type="text" id="f-duration" placeholder="10 мин"></div>
      <div class="form-group" style="flex:1"><label>Локация</label><input type="text" id="f-loc" placeholder="Помещение/Улица"></div>
    </div>
    <div class="form-group"><label>Реквизит</label><input type="text" id="f-equip" placeholder="- или список"></div>
    <div class="form-group"><label>Легенда</label><textarea id="f-leg" rows="3" placeholder="Вводная часть..."></textarea></div>
    <div class="form-group"><label>Правила</label><textarea id="f-rules" rows="4" placeholder="Ход игры, роли, цели..."></textarea></div>
    <div class="form-group"><label>Завершение игры</label><textarea id="f-comp" rows="2" placeholder="Финальные слова/выход..."></textarea></div>
    
    <div class="form-actions">
      <button class="btn btn-s" onclick="closeModal()">Отмена</button>
      <button class="btn btn-d" id="btn-delete" onclick="deleteGame()" style="display:none;">Удалить</button>
      <button class="btn btn-p" onclick="saveGame()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ПОЛНАЯ БАЗА ДАННЫХ (160 ИГР С ИСХОДНЫМИ ОПИСАНИЯМИ)
const initialGames = [
  {n:"Имя-Эхо",t:["ИЗ","ПЭФ","Здоровалки"],a:"младший",d:"7-10 мин",l:"без привязки",p:"-",leg:"Ребята, представьте, что мы попали в волшебную пещеру, где каждое слово возвращается к нам эхом. Но это эхо особенное — оно запоминает имена! Давайте познакомимся так, чтобы пещера запомнила каждого из вас. Когда я назову своё имя, вы повторите его хором, а потом назовёте своё — и эхо подхватит!",r:"Дети стоят в кругу. Вожатый называет своё имя, все хором повторяют. Затем по очереди каждый ребёнок называет своё имя, а группа повторяет его как эхо. Можно добавить жест или движение к имени. Игра заканчивается, когда все назовут имена.",c:"Волшебная пещера запомнила все имена! Теперь мы можем звать друг друга по имени, и эхо всегда ответит."},
  {n:"Мяч-Привет",t:["ИЗ","ПЭФ","Здоровалки"],a:"младший",d:"8-12 мин",l:"помещение/улица",p:"мягкий мяч",leg:"Сегодня к нам прилетел космический мяч с планеты Знакомств! Он умеет находить новых друзей, но для этого ему нужно услышать ваше имя. Мяч будет путешествовать по кругу, и кто его поймает — громко называет своё имя, а все отвечают: «Привет, [имя]!»",r:"Дети в кругу. Вожатый бросает мяч ребёнку, тот называет имя, все хором говорят «Привет, [имя]!». Затем ребёнок бросает мяч следующему. Мяч должен побывать у всех. Игра завершается, когда все назовут имена.",c:"Космический мяч выполнил миссию — теперь вся команда знает имена друг друга!"},
  {n:"Имя-Ассоциация",t:["ИЗ","ПЭФ","ПЗ"],a:"средний",d:"10-15 мин",l:"без привязки",p:"-",leg:"Представьте, что каждое имя — это ключ к сундуку с сокровищами. Но чтобы сундук открылся, нужно подобрать к имени яркую ассоциацию: цветок, животное, явление природы. Давайте познакомимся так, чтобы запомнить не только имена, но и то, с чем они у нас ассоциируются.",r:"Дети по очереди называют своё имя и короткую ассоциацию (например, «Аня — как апрель»). Следующий участник сначала повторяет имя и ассоциацию предыдущего, затем называет свои. Игра идёт по кругу. Можно не требовать запоминания всех, главное — проговаривание.",c:"Сундуки с сокровищами открыты — мы узнали имена и яркие образы друг друга!"},
  {n:"Снежный Ком-Лайт",t:["ИЗ","ИЗЗ","ПЭФ"],a:"средний",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Мы с вами — снежинки, которые только что встретились в небе. Чтобы не растеряться в полёте, давайте запоминать имена друг друга, собирая «снежный ком». Каждая новая снежинка добавляет своё имя к уже названным — так мы станем одним большим, дружным снегопадом!",r:"Дети в кругу. Первый называет своё имя. Второй повторяет имя первого + своё. Третий — два предыдущих + своё и так далее. Если кто-то забывает — группа помогает. Игра заканчивается, когда все назовут имена.",c:"Наш снежный ком стал таким большим и крепким — теперь мы точно не потеряемся!"},
  {n:"Имя-Визитка",t:["ИЗ","ПЗ","ПЭФ"],a:"старший",d:"10-12 мин",l:"без привязки",p:"-",leg:"Представьте, что вы — участники международного форума, и у вас есть ровно 10 секунд, чтобы представить себя новому знакомому. Только имя и один яркий жест или слово, которое вас характеризует. Давайте сделаем это быстро, энергично и с улыбкой!",r:"Дети стоят. По очереди каждый выходит в центр, называет имя и делает жест/говорит одно слово (например, «Макс — драйв!»). Группа может повторить жест или слово. Темп быстрый. Игра завершается после всех участников.",c:"Форум открыт! Теперь мы знаем, как зовут каждого, и запомнили яркие детали."},
  {n:"Цепочка Имён",t:["ИЗ","ИЗЗ","ПЭФ"],a:"старший",d:"10-15 мин",l:"помещение/улица",p:"-",leg:"Мы с вами — звенья одной цепи. Чтобы цепь стала крепкой, каждое звено должно знать, как зовут соседа. Давайте создадим живую цепочку имён: каждый запомнит имя того, кто перед ним, и передаст эстафету дальше.",r:"Дети в кругу. Первый называет своё имя. Второй повторяет имя первого + своё. Третий — два предыдущих + своё. Можно усложнить: добавлять жест. Если кто-то ошибается — группа поддерживает. Игра заканчивается, когда все назовут цепочку.",c:"Цепь замкнута! Теперь мы связаны не только руками, но и именами."},
  {n:"Имя-Движение",t:["ИЗ","ПЭФ","ПТБ"],a:"универсальный",d:"8-12 мин",l:"помещение/улица",p:"-",leg:"Представьте, что ваше имя — это волшебное заклинание, которое оживляет тело! Когда вы называете своё имя, вы показываете движение, а все повторяют его за вами. Так мы не только запомним имена, но и зарядимся энергией!",r:"Дети в кругу. По очереди каждый называет своё имя и показывает любое движение (хлопок, прыжок, поворот). Группа повторяет имя и движение. Темп можно ускорять. Игра завершается после всех участников.",c:"Заклинания сработали — мы запомнили имена и зарядились хорошим настроением!"},
  {n:"Имя-Аплодисменты",t:["ИЗ","ПЭФ","Здоровалки"],a:"универсальный",d:"7-10 мин",l:"без привязки",p:"-",leg:"Сегодня каждый из вас — звезда на сцене! А звёздам положены аплодисменты. Давайте познакомимся так: когда вы называете своё имя, все хлопают в ладоши и говорят: «[Имя], мы рады тебя видеть!».",r:"Дети стоят. По очереди каждый выходит вперёд, называет имя. Группа хором говорит «[Имя], мы рады тебя видеть!» и хлопает. Можно добавить жест. Игра заканчивается, когда все представятся.",c:"Аплодисменты стихли, но радость от знакомства осталась с нами!"},
  {n:"Имя-Цветок",t:["ИЗ","СЭФ","ПЭФ"],a:"универсальный",d:"10 мин",l:"улица/помещение",p:"-",leg:"Представьте, что мы — сад, в котором распускаются цветы. Каждый цветок имеет своё имя. Когда вы называете своё имя, вы «распускаетесь» — делаете плавное движение руками, как лепестки. Давайте создадим цветущий сад знакомств!",r:"Дети в кругу. По очереди каждый называет своё имя и делает плавное движение «распускания». Группа может повторить движение. Темп спокойный. Игра завершается, когда все «распустятся».",c:"Наш сад расцвёл! Теперь мы знаем имена всех цветов в нём."},
  {n:"Имя-Ритм",t:["ИЗ","ПЭФ","ПТБ"],a:"универсальный",d:"10-15 мин",l:"без привязки",p:"-",leg:"Мы с вами — музыканты одного оркестра. У каждого инструмента своё название, как и у вас — своё имя. Давайте создадим ритм знакомств: когда вы называете имя, вы отбиваете его хлопками или притопами, а мы подхватываем!",r:"Дети в кругу. По очереди каждый называет своё имя, отбивая слоги хлопками (напр., «Ма-ша» — два хлопка). Группа повторяет имя и ритм. Можно усложнять ритм. Игра заканчивается после всех.",c:"Оркестр настроен! Теперь мы знаем имена и ритмы друг друга."},
  {n:"Мой Любимый Зверь",t:["ПЗ","ИЗ","ПЭФ"],a:"младший",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Ребята, представьте, что мы попали в волшебный лес, где каждый может превратиться в того зверя, который ему больше всего нравится. Расскажите, в кого бы вы превратились и почему — так мы узнаем друг о друге что-то интересное!",r:"Дети в кругу. По очереди каждый называет своё имя, любимого зверя и одну причину (например, «Я Лена, я бы стала лисичкой, потому что она хитрая и весёлая»). Можно показать движение зверя. Группа может повторить. Игра завершается после всех.",c:"Волшебный лес запомнил всех зверят! Теперь мы знаем не только имена, но и кто какой зверь."},
  {n:"Чемоданчик Хобби",t:["ПЗ","ИЗ","ИС/С"],a:"младший",d:"15 мин",l:"помещение",p:"воображаемый чемодан (можно использовать коробку)",leg:"У нас есть волшебный чемоданчик, в который мы складываем свои увлечения. Каждый из вас положит в него своё хобби — то, что любит делать. Давайте познакомимся через то, что нам нравится!",r:"Дети по очереди называют имя и хобби (например, «Я Ваня, я люблю рисовать»), делают движение, имитирующее действие. Группа может повторить движение. «Кладут» в чемодан. Игра заканчивается, когда все «положат» хобби.",c:"Чемоданчик полон! Теперь мы знаем, чем увлекаются наши новые друзья."},
  {n:"Три Факта",t:["ПЗ","ИЗ","ИВЛ"],a:"средний",d:"15-20 мин",l:"без привязки",p:"-",leg:"Представьте, что вы — герои книги, и читателям нужно узнать о вас три важных факта, кроме имени. Давайте познакомимся так: назовите имя и три факта о себе — что любите, чем гордитесь, о чём мечтаете.",r:"Дети в кругу. Каждый по очереди называет имя и три факта (например, «Я Катя, люблю танцевать, боюсь темноты, мечтаю побывать в Париже»). Можно задавать один уточняющий вопрос после каждого. Игра завершается после всех.",c:"Книга нашей команды написана! Теперь мы знаем друг о друге гораздо больше."},
  {n:"Карта Интересов",t:["ПЗ","ИЗ","МПВ"],a:"средний",d:"15-20 мин",l:"помещение",p:"лист бумаги, маркеры (опционально)",leg:"Мы с вами — исследователи, которые составляют карту интересов нашего отряда. Каждый из вас — уникальный остров с своими сокровищами: хобби, мечты, страхи. Давайте нанесём эти острова на общую карту!",r:"Дети делятся на пары или тройки. В мини-группах каждый рассказывает имя и 2-3 факта о себе (интересы, сильная сторона). Затем один от группы представляет участников. Можно нарисовать символ на общем листе.",c:"Карта заполнена! Теперь мы видим, какие сокровища скрывает каждый остров нашей команды."},
  {n:"Интервью-Блиц",t:["ПЗ","ИЗ","ИВЛ"],a:"старший",d:"20 мин",l:"помещение/улица",p:"смартфон для таймера (опционально)",leg:"Представьте, что вы — участники реалити-шоу, и у вас есть ровно 60 секунд, чтобы рассказать о себе самое важное. Имя, одно увлечение, одна цель на эту смену. Готовы к блиц-знакомству?",r:"Дети в парах. У каждой пары 2 минуты: по 60 секунд на рассказ + 30 секунд на вопрос. Вопросы: «Что тебя вдохновляет?», «Чем гордишься?». Затем пары меняются. В конце — короткое представление партнёра отряду.",c:"Эфир завершён! Теперь мы знаем не только имена, но и цели друг друга."},
  {n:"Сильная Сторона",t:["ПЗ","ИЗ","ИС/С"],a:"старший",d:"15-20 мин",l:"без привязки",p:"-",leg:"Каждый из нас — как супергерой со своей уникальной силой. Давайте познакомимся через то, в чём мы сильны: назовите имя и одну свою сильную сторону, которая может помочь отряду в этой смене.",r:"Дети в кругу. По очереди каждый называет имя и сильную сторону (например, «Я Дима, я умею находить выход из сложных ситуаций»). Можно добавить пример. Группа может аплодировать. Игра завершается после всех.",c:"Команда супергероев собрана! Теперь мы знаем, на кого можно положиться в трудную минуту."},
  {n:"Ассоциация-Хобби",t:["ПЗ","ИЗ","ПЭФ"],a:"универсальный",d:"12-15 мин",l:"без привязки",p:"-",leg:"Представьте, что ваше любимое занятие — это цвет, звук или движение. Давайте познакомимся через ассоциации: назовите имя, хобби и покажите, как оно «звучит» или «движется».",r:"Дети в кругу. Каждый называет имя, хобби и показывает ассоциацию (движение, звук). Группа повторяет имя и ассоциацию. Темп энергичный. Игра завершается после всех.",c:"Мы услышали и увидели увлечения друг друга — теперь знакомство стало ярче!"},
  {n:"Вопрос-Эстафета",t:["ПЗ","ИЗ","ИС/С"],a:"универсальный",d:"15 мин",l:"помещение/улица",p:"мяч или любой предмет",leg:"У нас есть волшебный вопрос, который путешествует по отряду. Когда он попадает к вам, вы называете имя и отвечаете на вопрос: «Что тебя сегодня обрадовало?». Так мы узнаем не только имена, но и настроение друг друга.",r:"Дети в кругу. Вожатый задаёт вопрос и передаёт предмет. Ребёнок с предметом называет имя, отвечает, передаёт дальше. Вопрос можно менять. Игра завершается, когда предмет обойдёт круг.",c:"Вопрос обошёл всех — теперь мы знаем, что радует каждого в отряде."},
  {n:"Портрет в Трёх Словах",t:["ПЗ","ИЗ","СЭФ"],a:"универсальный",d:"10-15 мин",l:"без привязки",p:"-",leg:"Представьте, что вас можно описать всего тремя словами, кроме имени. Какими бы они были? Давайте познакомимся так: имя + три слова, которые вас характеризуют.",r:"Дети в кругу. По очереди каждый называет имя и три слова (например, «Аня — добрая, творческая, мечтательная»). Можно объяснить выбор. Группа слушает внимательно. Игра завершается после всех.",c:"Портреты готовы! Теперь мы видим друг друга чуть глубже."},
  {n:"Хобби-Пантомима",t:["ПЗ","ИЗ","ПЭФ"],a:"универсальный",d:"15-20 мин",l:"помещение/улица",p:"-",leg:"Мы играем в угадай-хобби! Один из вас покажет без слов своё любимое занятие, а мы попробуем угадать. А потом — назовём имя и расскажем, почему это хобби важно для вас.",r:"Дети в кругу. По очереди каждый выходит, показывает пантомимой хобби. Группа угадывает. Затем участник называет имя и кратко рассказывает о хобби. Игра завершается после всех.",c:"Все хобби угаданы и рассказаны — теперь мы знаем, чем живёт каждый в отряде."},
  {n:"Кто Позвал?",t:["ИЗЗ","ИЗ","ПЭФ"],a:"младший",d:"10 мин",l:"помещение/улица",p:"-",leg:"Ребята, мы с вами — волшебные колокольчики, которые учатся узнавать голоса друзей. Один из вас закроет глазки, а другой тихонько позовёт его по имени. Задача — угадать, кто позвал! Так мы потренируем память и внимание к друзьям.",r:"Дети в кругу. Один ребёнок в центре с закрытыми глазами. Вожатый указывает на любого участника, тот тихо называет имя ребёнка в центре. Ребёнок угадывает, кто позвал. Если угадал — меняется с позвавшим. Игра идёт 5-7 раундов.",c:"Наши колокольчики научились узнавать голоса друзей — теперь мы точно не перепутаем, кто есть кто!"},
  {n:"Имя-Передай",t:["ИЗЗ","ПЭФ","Минутки"],a:"младший",d:"8-10 мин",l:"без привязки",p:"мягкая игрушка или мяч",leg:"У нас в руках волшебный посланник, который передаёт имена по кругу. Когда музыка играет — мы передаём его, а когда останавливается — тот, у кого посланник, называет имя любого друга из отряда. Посмотрим, как хорошо мы запомнили друг друга!",r:"Дети в кругу, передают предмет под музыку. Когда музыка останавливается, ребёнок с предметом называет имя любого участника отряда. Если назвал верно — все хлопают, если нет — группа помогает. Игра длится 5-7 раундов.",c:"Посланник выполнил задачу — мы убедились, что помним имена всех друзей!"},
  {n:"Детектив Имён",t:["ИЗЗ","ПЗ","ИВЛ"],a:"средний",d:"15 мин",l:"помещение",p:"листочки с именами, шляпа/коробка",leg:"Мы с вами — детективы, которые расследуют дело о пропавших именах. В этой шляпе — имена всех участников отряда. Ваша задача: вытащить имя, найти этого человека и рассказать о нём один факт, который запомнили при знакомстве.",r:"Дети стоят. Вожатый перемешивает листочки с именами. Каждый по очереди тянет имя, находит человека и говорит: «Это [имя], я запомнил, что он/она...». Если факт верный — все аплодируют. Если нет — человек сам дополняет. Игра завершается, когда все имена будут названы.",c:"Дело раскрыто! Детективы доказали, что помнят имена и факты о каждом."},
  {n:"Эстафета Памяти",t:["ИЗЗ","ПЭФ","ИС/С"],a:"средний",d:"12-15 мин",l:"улица/помещение",p:"конусы или метки для дистанции",leg:"Представьте, что мы участвуем в олимпиаде памяти! Каждый из вас — бегун, который должен добежать до финиша и назвать имя товарища по команде, который стоит на другом конце. Чем быстрее и точнее назовёте — тем больше очков заработает отряд!",r:"Дети делятся на 2 команды, стоят в шеренгах. По сигналу первый бежит к противоположной шеренге, называет имя любого участника другой команды. Если верно — бежит обратно и передаёт эстафету. Если ошибся — команда помогает. Побеждает команда, быстрее завершившая эстафету.",c:"Олимпиада завершена! Мы доказали, что память на имена — наша суперсила."},
  {n:"Ассоциативный Круг",t:["ИЗЗ","ПЗ","СЭФ"],a:"старший",d:"15 мин",l:"без привязки",p:"-",leg:"Мы с вами создаём живую сеть воспоминаний. Каждый из вас назовёт имя участника, который стоит рядом, и добавит ассоциацию, которая у вас с ним связана: цвет, эмоция, момент из знакомства. Так мы сплетём невидимую нить памяти.",r:"Дети в кругу. По очереди каждый называет имя соседа (слева или справа) и короткую ассоциацию («Маша — как солнечный зайчик, потому что она всегда улыбается»). Следующий продолжает. Если кто-то затрудняется — группа подсказывает. Игра идёт по кругу.",c:"Сеть памяти сплетена — теперь имена и образы друзей всегда будут с нами."},
  {n:"Имя-Навигатор",t:["ИЗЗ","ИЗ","ИВЛ"],a:"старший",d:"10-12 мин",l:"помещение/улица",p:"-",leg:"Вы — навигаторы в большом городе под названием «Отряд». Ваша задача: по памяти построить маршрут и назвать имена трёх людей, которые стоят в определённом порядке (например, «кто стоит в красном, кто рядом с окном, кто сегодня в кепке»). Проверим, как работает ваша внутренняя карта!",r:"Вожатый даёт задание: «Назовите имя того, кто...» (описывает признак). Дети по очереди называют имена. Можно усложнить: назвать 2-3 человека подряд. Тот, кто назвал верно, получает право дать следующее задание. Игра длится 7-10 раундов.",c:"Навигаторы справились — внутренняя карта отряда обновлена и работает точно!"},
  {n:"Имя-Хлопок",t:["ИЗЗ","ПЭФ","Минутки"],a:"универсальный",d:"7-10 мин",l:"без привязки",p:"-",leg:"Мы играем в ритмическое эхо! Я хлопну в ладоши и назову имя — а вы должны хлопнуть и назвать имя другого человека. Темп будет ускоряться, так что будьте внимательны к друзьям вокруг!",r:"Дети в кругу. Вожатый начинает: хлопает и называет имя. Тот, чьё имя назвали, хлопает и называет другое имя. Цепочка продолжается. Если кто-то ошибается или медлит — группа помогает. Темп можно менять.",c:"Ритм завершён — мы доказали, что имена друзей звучат в нашей памяти чётко и вовремя!"},
  {n:"Фото-Память",t:["ИЗЗ","ПЗ","СЭФ"],a:"универсальный",d:"10-12 мин",l:"помещение",p:"смартфон с камерой (опционально)",leg:"Представьте, что ваш взгляд — это камера, которая делает снимки друзей. Закройте глаза, а когда я скажу «кадр», откройте и запомните, кто где стоит. Потом назовите имена тех, кого «сфотографировали»!",r:"Дети стоят в произвольном порядке. По команде «кадр» открывают глаза на 5 секунд, затем закрывают. Вожатый спрашивает: «Кто стоял слева от Саши?», «Назовите имя человека в синей футболке». Дети отвечают. Можно сделать 3-4 «кадра».",c:"Фотосессия завершена — наша память сохранила самые важные кадры знакомства!"},
  {n:"Имя-Загадка",t:["ИЗЗ","ПЭФ","ПЗ"],a:"универсальный",d:"12-15 мин",l:"без привязки",p:"-",leg:"Один из вас загадает имя друга и опишет его без названия имени: цвет одежды, причёска, где стоит. Остальные отгадывают, о ком речь. Так мы проверим, насколько внимательно запомнили друг друга!",r:"Дети в кругу. По очереди каждый выходит, загадывает имя и даёт 2-3 подсказки («Этот человек в зелёной футболке, стоит у окна, любит танцевать»). Группа отгадывает имя. Если угадали — загадывает следующий.",c:"Все загадки разгаданы — мы убедились, что видим и помним каждого!"},
  {n:"Круг Доверия-Имена",t:["ИЗЗ","Доверие","СЭФ"],a:"универсальный",d:"10 мин",l:"помещение/улица",p:"-",leg:"Мы стоим в кругу, закрываем глаза и по памяти называем имя того, кто, как нам кажется, стоит справа от нас. Потом открываем глаза и проверяем. Это упражнение поможет нам не только запомнить имена, но и почувствовать связь с отрядом.",r:"Дети в кругу, закрывают глаза. По очереди каждый называет имя человека, который, по его мнению, стоит справа. Затем открывают глаза, проверяют. Если верно — все тихо хлопают. Если нет — человек сам называет своё имя с улыбкой.",c:"Глаза открыты, имена названы — теперь мы чувствуем друг друга ещё лучше."},
  {n:"Тёплый Ветерок",t:["ПТБ","СЭФ","ИЗ"],a:"младший",d:"8-10 мин",l:"помещение",p:"-",leg:"Ребята, представьте, что мы — облака, которые дарят друг другу нежный ветерок. Мы будем очень аккуратно касаться плеч и ладошек соседей, передавая тепло и заботу. Это поможет нам почувствовать себя одной дружной стаей облаков.",r:"Дети стоят в кругу, положив руки на плечи соседей. По команде вожатого они лёгкими движениями «передают ветерок» по кругу: поглаживают плечи, хлопают по ладошкам. Можно менять направление. Важно: касания только добрые и разрешённые. Игра завершается общим объятием круга.",c:"Ветерок обошёл всех — теперь мы чувствуем тепло и заботу каждого в нашем облачном отряде."},
  {n:"Живой Паровозик",t:["ПТБ","ПЭФ","ИС/С"],a:"младший",d:"10 мин",l:"улица/помещение",p:"-",leg:"Мы с вами — весёлый паровозик, который отправляется в путешествие! Вагончики сцепляются друг с другом крепко, но нежно: кладём руки на плечи впереди стоящему. Наш паровозик умеет ехать вперёд, назад и даже кружиться — главное, не расцепляться!",r:"Дети выстраиваются в цепочку, кладя руки на плечи впереди стоящего. Вожатый-«машинист» даёт команды: «Вперёд медленно!», «Назад!», «Поворот!». Паровозик движется, не разрываясь. Можно добавить звуки «чух-чух». Игра завершается, когда паровозик «приедет на станцию».",c:"Паровозик прибыл! Мы научились двигаться вместе, чувствуя плечо друга."},
  {n:"Слепой Художник",t:["ПТБ","Доверие","ПЗ"],a:"средний",d:"15 мин",l:"помещение",p:"повязки на глаза (платки), бумага, фломастеры",leg:"Представьте, что вы — художники, которые рисуют... пальцами на спине друга! Один из вас закрывает глаза, а другой «рисует» у него на спине простую фигуру или букву. Задача — угадать, что нарисовано, только через прикосновение.",r:"Дети делятся на пары. Один закрывает глаза, второй пальцем «рисует» на его спине фигуру (круг, треугольник, буква). Первый угадывает. Затем меняются ролями. Можно усложнить: рисовать слово из 3 букв. Важно: касания только в зоне спины, аккуратно.",c:"Художники показали мастерство — мы научились «говорить» через прикосновения и доверять друг другу."},
  {n:"Тактильный Код",t:["ПТБ","ИС/С","ПЭФ"],a:"средний",d:"12-15 мин",l:"помещение",p:"-",leg:"Мы с вами — шпионы, которые передают секретные сообщения через прикосновения. Каждый из вас получит код: одно касание — «да», два — «нет», три — «опасность». Ваша задача: передать сообщение по цепочке, касаясь плеча соседа, и не выдать код вслух!",r:"Дети стоят в шеренге или кругу. Вожатый шепчет первому «сообщение» (например, «да-нет-да»). Тот передаёт его касаниями плеча следующему (1 хлопок = да, 2 = нет). Последний называет, что понял. Сравнивают с оригиналом. Можно играть командами на скорость.",c:"Код расшифрован! Мы убедились, что можем общаться не только словами, но и через доверительные прикосновения."},
  {n:"Энергетический Круг",t:["ПТБ","СЭФ","Доверие"],a:"старший",d:"10 мин",l:"помещение",p:"-",leg:"Мы с вами создаём круг энергии. Возьмитесь за руки, закройте глаза и почувствуйте тепло ладоней соседей. По моему сигналу мы будем мягко сжимать руки по очереди, передавая импульс по кругу. Это поможет нам настроиться на одну волну и почувствовать единство.",r:"Дети в кругу, держатся за руки, глаза закрыты. Вожатый начинает: слегка сжимает руку соседа справа. Тот передаёт сжатие дальше. Импульс идёт по кругу. Можно менять скорость, направление. Важно: движения плавные, без резких рывков. Игра завершается, когда импульс обойдёт круг 2-3 раза.",c:"Энергия обошла всех — теперь мы чувствуем связь и поддержку каждого в отряде."},
  {n:"Зеркало-Партнёр",t:["ПТБ","МПВ","Доверие"],a:"старший",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Вы с партнёром — два зеркала, которые отражают движения друг друга. Встаньте лицом к лицу, положите ладони на ладони партнёра. Один начинает медленно двигаться, а второй — зеркально повторять. Так мы научимся чувствовать ритм и доверять прикосновениям.",r:"Дети делятся на пары, встают лицом друг к другу, ладони соприкасаются. Один — «ведущий», медленно двигает руками, телом. Второй — «зеркало», повторяет. Через 2 минуты меняются ролями. Важно: движения плавные, без резких рывков, касания только ладонями.",c:"Зеркала настроены — мы научились чувствовать партнёра через прикосновения и движение."},
  {n:"Рукопожатие-Эстафета",t:["ПТБ","ПЭФ","Здоровалки"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Мы с вами — путешественники, которые приветствуют друг друга особенными рукопожатиями. Каждое рукопожатие — как пароль дружбы: обычное, с хлопком, с двумя руками. Давайте пройдём по кругу и обменяемся приветствиями!",r:"Дети в кругу. По очереди каждый подходит к соседу справа, они обмениваются рукопожатием по образцу вожатого (простое, с хлопком, «замок» и т.д.). Затем следующий. Можно придумывать свои варианты. Важно: касания только рук, добровольно.",c:"Пароли дружбы приняты — теперь мы можем приветствовать друг друга десятком способов!"},
  {n:"Тактильная Волна",t:["ПТБ","ПЭФ","ИС/С"],a:"универсальный",d:"7-10 мин",l:"помещение/улица",p:"-",leg:"Представьте, что мы — море, в котором бежит волна. Волна передаётся через лёгкое прикосновение к плечу соседа. Когда волна доходит до конца — она возвращается обратно. Давайте почувствуем ритм нашего общего моря!",r:"Дети стоят в шеренге или кругу. Первый слегка касается плеча второго, тот — третьего, и так по цепочке. Когда касание доходит до последнего, он начинает волну в обратную сторону. Можно ускорять, запускать две волны навстречу.",c:"Волна успокоилась — мы почувствовали ритм и связь друг с другом через лёгкие прикосновения."},
  {n:"Ладошка-Компас",t:["ПТБ","Доверие","СЭФ"],a:"универсальный",d:"10 мин",l:"помещение",p:"-",leg:"Закройте глаза и протяните ладошку вперёд. Ваш партнёр аккуратно коснётся вашей ладони — и это будет сигналом, в какую сторону сделать шаг. Так, через прикосновения, мы поможем друг другу найти путь в кругу.",r:"Дети делятся на пары. Один закрывает глаза, второй направляет его лёгкими касаниями ладони: вверх — шаг вперёд, вниз — назад, влево/вправо — поворот. Задача — пройти по кругу и вернуться на место. Затем меняются ролями.",c:"Компас сработал — мы научились доверять направлениям, которые подсказывают друзья."},
  {n:"Объятие-Эстафета",t:["ПТБ","ПЭФ","ИС/С"],a:"универсальный",d:"8-12 мин",l:"помещение/улица",p:"-",leg:"Мы с вами передаём по кругу тёплое объятие — как эстафету добра. Один обнимает соседа, тот — следующего, и так по цепочке. Важно: объятия только те, которые комфортны каждому. Давайте создадим волну тепла в нашем отряде!",r:"Дети в кругу. По сигналу первый обнимает соседа справа (коротко, по согласию), тот — следующего. Объятие «бежит» по кругу. Можно запустить в обратную сторону, или две волны навстречу. Важно: никто не принуждается, можно заменить на рукопожатие.",c:"Волна тепла обошла всех — теперь мы чувствуем поддержку и заботу в отряде."},
  {n:"Капитан Корабля",t:["ИВЛ","ИС/С","ПЭФ"],a:"младший",d:"12-15 мин",l:"улица/помещение",p:"-",leg:"Ребята, наш отряд — это корабль, который плывёт к острову Сокровищ! Но чтобы доплыть, нам нужен капитан, который будет отдавать команды: «Весла вперёд!», «Паруса поднять!». Кто хочет попробовать себя в роли капитана и повести нас к цели?",r:"Дети делятся на 2-3 «экипажа» по 8-10 человек. В каждом экипаже по очереди каждый ребёнок пробует быть капитаном 1-2 минуты: отдаёт простые команды («шаг вперёд», «хлопни», «повернись»). Остальные выполняют. Вожатый наблюдает, кто уверенно даёт команды, кого слушают.",c:"Корабль прибыл! Мы увидели, кто умеет вести за собой, и каждый попробовал быть капитаном."},
  {n:"Собери Команду",t:["ИВЛ","Разбивки","ПЭФ"],a:"младший",d:"10 мин",l:"помещение/улица",p:"цветные жетоны или ленточки (опционально)",leg:"У нас есть важное задание: собрать команды для спасения лесных зверят! Но собрать их могут только те, кто возьмёт на себя ответственность. Кто хочет стать организатором и позвать к себе 4-5 друзей для общего дела?",r:"Вожатый объявляет: «Нужно собрать команды по 5 человек!». Дети, желающие быть лидерами, выходят вперёд и зовут к себе участников («Кто хочет быть в команде спасателей?»). Когда команды собраны, они выполняют простое задание (построиться по росту, придумать название). Вожатый отмечает, кто быстро собрал команду, как общался.",c:"Команды спасателей готовы! Мы увидели, кто умеет организовывать и вдохновлять других."},
  {n:"Мост Доверия",t:["ИВЛ","Доверие","ИС/С"],a:"средний",d:"15-20 мин",l:"помещение/улица",p:"2-3 верёвки или скакалки",leg:"Представьте, что нам нужно построить живой мост через пропасть, чтобы перебраться на другую сторону. Но мост можно построить, только если кто-то возьмёт на себя роль инженера: распределит задачи, объяснит, кто за что отвечает. Кто готов попробовать?",r:"Дети делятся на 2 команды. Каждая получает задачу: построить «мост» из тел (например, встать так, чтобы можно было пройти, не касаясь пола). Один доброволец в каждой команде становится «инженером» — руководит процессом. Вожатый наблюдает: кто берёт инициативу, как распределяет роли, как реагирует команда. Через 5 минут роли можно сменить.",c:"Мосты построены! Мы увидели, кто умеет брать ответственность и организовывать команду для общей цели."},
  {n:"Квест-Организатор",t:["ИВЛ","ПЗ","ИС/С"],a:"средний",d:"20 мин",l:"улица/помещение",p:"карточки с заданиями (можно написать на листочках)",leg:"Наш отряд получил секретное послание: чтобы раскрыть тайну, нужно выполнить 3 задания. Но выполнять их будем не все вместе, а маленькими группами. Кто хочет стать организатором: получить задание, собрать группу и довести дело до конца?",r:"Вожатый готовит 3-4 простых задания (например, «найти 5 предметов круглой формы», «придумать кричалку отряда»). Желающие быть лидерами выбирают задание, собирают 4-5 человек, выполняют за 5-7 минут. Затем представляют результат. Вожатый отмечает, кто как организовал процесс, вовлёк участников.",c:"Тайна раскрыта! Мы увидели, кто умеет ставить цели, собирать команду и доводить дело до результата."},
  {n:"Совет Мудрецов",t:["ИВЛ","ПЗ","СЭФ"],a:"старший",d:"15-20 мин",l:"помещение",p:"-",leg:"Представьте, что наш отряд — это королевство, которое столкнулось с важной задачей: как сделать эту смену незабываемой для каждого? Нам нужен совет мудрецов — тех, кто предложит идеи и возьмёт на себя ответственность за их реализацию. Кто готов войти в совет?",r:"Дети сидят в кругу. Вожатый озвучивает задачу. Желающие высказаться поднимают руку. Те, кто предлагает идеи и готов их реализовать, выходят в центр — формируют «совет» из 5-7 человек. Совет обсуждает 5 минут, затем представляет план отряду. Вожатый наблюдает: кто предлагает, кто аргументирует, кто берёт на себя роль.",c:"Совет принял решение! Мы увидели, кто умеет генерировать идеи, аргументировать и брать на себя ответственность за общее дело."},
  {n:"Лидер-Навигатор",t:["ИВЛ","ИС/С","ПЭФ"],a:"старший",d:"15 мин",l:"улица",p:"карточки с маршрутом (опционально)",leg:"Нам нужно добраться до секретной точки на территории лагеря, но карта есть только у одного человека в каждой группе. Задача лидера — не просто идти самому, а так объяснить путь команде, чтобы все дошли вместе. Кто готов стать навигатором?",r:"Дети делятся на группы по 6-7 человек. В каждой группе один доброволец получает «карту» (схему с 3-4 ориентирами). Его задача — провести группу к финишу, объясняя путь, но не показывая карту. Остальные следуют за ним. Вожатый наблюдает: как лидер коммуницирует, как реагирует на вопросы, как справляется с трудностями.",c:"Все группы на месте! Мы увидели, кто умеет вести за собой, объяснять и брать ответственность за результат команды."},
  {n:"Кто Начнёт?",t:["ИВЛ","ПЭФ","Минутки"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Мы с вами начинаем новое дело, но для этого нужен тот, кто сделает первый шаг. Кто готов начать: хлопнуть в ладоши, сказать слово, показать движение — чтобы все подхватили? Давайте посмотрим, кто возьмёт на себя инициативу!",r:"Дети в кругу. Вожатый говорит: «Нужно начать общее дело: например, хлопать в ритме. Кто начнёт?». Желающий выходит, начинает действие. Группа подхватывает. Через 30 секунд вожатый останавливает, благодарит. Можно повторить 2-3 раза с разными действиями.",c:"Инициатива принята! Мы увидели, кто не боится сделать первый шаг и повести за собой."},
  {n:"Распредели Роли",t:["ИВЛ","Разбивки","ИС/С"],a:"универсальный",d:"10-12 мин",l:"помещение/улица",p:"карточки с ролями (опционально)",leg:"У нас есть общее задание, но чтобы его выполнить, нужно распределить роли: кто будет считать, кто — объяснять, кто — проверять. Кто готов взять на себя роль организатора и помочь команде распределить задачи?",r:"Дети делятся на группы по 5-6 человек. Вожатый даёт задание (например, «построиться по алфавиту имён за 2 минуты»). В каждой группе доброволец берёт на себя роль организатора: распределяет, кто за что отвечает. Вожатый наблюдает, как проходит процесс, кто проявляет инициативу.",c:"Задание выполнено! Мы увидели, кто умеет видеть задачу целиком и организовывать других для её решения."},
  {n:"Идея в Круг",t:["ИВЛ","ПЗ","ПЭФ"],a:"универсальный",d:"10-15 мин",l:"без привязки",p:"-",leg:"Представьте, что наш отряд — это творческая студия, которой нужно придумать название, девиз и талисман. Но для этого нужны те, кто не боится предложить идею первым и взять на себя ответственность за её развитие. Кто готов начать?",r:"Дети в кругу. Вожатый озвучивает задачу: «Придумаем название отряда!». Желающий предлагает идею. Если идея нравится группе — он становится «автором» и собирает вокруг себя 2-3 человек, чтобы развить идею. Через 5 минут представляют результат. Вожатый отмечает, кто предложил, кто развил, кто организовал.",c:"Идеи воплощены! Мы увидели, кто умеет генерировать, аргументировать и вести за собой для реализации замысла."},
  {n:"Эстафета Ответственности",t:["ИВЛ","ПЭФ","ИС/С"],a:"универсальный",d:"12-15 мин",l:"улица/помещение",p:"предметы для эстафеты (мяч, флажок)",leg:"Мы с вами бежим эстафету, где важнее не скорость, а умение передать ответственность. Каждый участник — на своём этапе — должен не просто пробежать, но и объяснить следующему, что делать дальше. Кто готов взять на себя роль связующего звена?",r:"Дети делятся на 2-3 команды. На каждом этапе эстафеты участник получает задание (например, «объясни следующему, как правильно прыгать на одной ноге»). Он выполняет, затем объясняет следующему. Вожатый наблюдает: кто чётко объясняет, кто берёт на себя роль наставника, как команда реагирует.",c:"Эстафета завершена! Мы увидели, кто умеет не только делать сам, но и передавать знания, брать ответственность за успех команды."},
  {n:"Единый Организм",t:["ИС/С","ПТБ","ПЭФ"],a:"младший",d:"10-12 мин",l:"помещение/улица",p:"-",leg:"Ребята, представьте, что наш отряд — это один большой живой организм! У него много рук, ног и глаз, но сердце у него одно — наше общее. Давайте научимся двигаться вместе: когда я говорю «организм шагает» — все делаем шаг, «организм хлопает» — все хлопаем. Главное — чувствовать друг друга!",r:"Дети стоят плотно в кругу или шеренге. Вожатый даёт команды: «Организм шагает вперёд», «Организм поворачивается», «Организм приседает». Дети выполняют движения синхронно, не разрывая контакт (можно держаться за руки или за плечи). Если кто-то выбивается — группа мягко помогает. Игра завершается общим движением «организм дышит» (плавные вдохи-выдохи).",c:"Наш организм научился двигаться как одно целое — теперь мы чувствуем ритм друг друга и можем достигать любых целей вместе!"},
  {n:"Паутина Дружбы",t:["ИС/С","ИЗЗ","Доверие"],a:"младший",d:"12-15 мин",l:"помещение",p:"клубок ярких ниток",leg:"У нас в руках волшебная нить, которая связывает нас в одну большую паутину дружбы. Каждый из вас скажет, за что он благодарен отряду, и передаст нить дальше, держа конец в руке. Так мы создадим невидимую, но очень крепкую связь между всеми!",r:"Дети в кругу. Вожатый начинает: держит конец нити, говорит благодарность («Я рад, что мы вместе»), наматывает нить на палец и бросает клубок любому ребёнку. Тот ловит, говорит свою благодарность, наматывает, передаёт дальше. Когда все в паутине — вожатый предлагает аккуратно «распутаться», не разжимая рук, или просто полюбоваться связью.",c:"Паутина дружбы сплетена! Теперь мы видим: каждый из нас важен, и вместе мы — одна крепкая команда."},
  {n:"Общий Ритм",t:["ИС/С","ПЭФ","ПТБ"],a:"средний",d:"10-15 мин",l:"без привязки",p:"-",leg:"Мы с вами — один большой музыкальный инструмент. У каждого есть свой звук: хлопок, притоп, щелчок. Наша задача — создать общий ритм, в котором каждый слышит соседа и подстраивается. Когда мы найдём этот ритм — вся группа зазвучит как один оркестр!",r:"Дети в кругу. Вожатый задаёт простой ритм (хлоп-хлоп-притоп). Каждый повторяет. Затем по очереди участники добавляют свой элемент. Группа подхватывает. Цель — создать единый ритм, в котором все участвуют. Если сбиваются — начинают заново, поддерживая друг друга. Игра завершается, когда ритм звучит слаженно 30 секунд.",c:"Оркестр настроен! Мы научились слышать друг друга и создавать общее звучание — так же будем действовать и в других делах."},
  {n:"Живой Мост",t:["ИС/С","Доверие","ПТБ"],a:"средний",d:"15 мин",l:"помещение/улица",p:"-",leg:"Представьте, что нам нужно переправить важного посланника через реку, но моста нет. Единственный способ — построить живой мост из наших тел! Каждый из вас — опора, которая держит других. Только вместе, чувствуя вес и баланс, мы сможем выполнить задачу.",r:"Дети делятся на две группы, выстраиваются параллельными шеренгами лицом друг к другу, берутся за руки, образуя «тоннель». Один доброволец («посланник») проходит по рукам/плечам (аккуратно, с поддержкой вожатых). Важно: все участники напрягают мышцы, страхуют, двигаются синхронно. После первого прохода меняются роли.",c:"Посланник переправлен! Мы доказали: когда каждый выполняет свою часть, команда способна на невозможное."},
  {n:"Космический Корабль",t:["ИС/С","ИВЛ","ПЭФ"],a:"старший",d:"15-20 мин",l:"помещение/улица",p:"-",leg:"Мы с вами — экипаж космического корабля, который готовится к взлёту. Но корабль не взлетит, если хотя бы один член экипажа не выполнит свою роль: пилот, инженер, связист. Наша задача — синхронизировать действия и запустить обратный отсчёт так, чтобы все сработало как один механизм.",r:"Дети делятся на роли (по 4-5 человек на роль): «двигатели» (топают), «навигация» (хлопают), «связь» (щёлкают), «пилоты» (дают команды). Вожатый-«ЦУП» даёт команды: «Запуск двигателей!», «Синхронизация!». Группы выполняют свои действия, постепенно объединяя ритмы. Финал — общий обратный отсчёт и «взлёт» (все подпрыгивают).",c:"Корабль на орбите! Мы увидели: только слаженная работа каждого звена приводит к общему успеху."},
  {n:"Единый Холст",t:["ИС/С","ПЗ","СЭФ"],a:"старший",d:"20 мин",l:"помещение",p:"большой лист бумаги (можно склеить), маркеры/карандаши",leg:"Перед нами пустой холст, который может стать шедевром, только если каждый внесёт свой штрих. Но есть правило: нельзя договариваться словами — только смотреть, чувствовать, дополнять друг друга. Давайте создадим картину нашего отряда, где каждый элемент важен!",r:"Дети стоят вокруг большого листа. По сигналу начинают рисовать одновременно, без слов. Можно рисовать символы, узоры, абстракции. Важно: не занимать всё место, оставлять пространство для других, реагировать на уже нарисованное. Через 10 минут вожатый останавливает процесс. Группа рассматривает результат, делится впечатлениями.",c:"Шедевр создан! Мы увидели: когда каждый вкладывает частичку себя, рождается нечто большее, чем сумма частей."},
  {n:"Цепь Силы",t:["ИС/С","ПТБ","ПЭФ"],a:"универсальный",d:"8-10 мин",l:"помещение/улица",p:"-",leg:"Мы с вами — звенья одной цепи. Чтобы цепь стала неразрывной, каждое звено должно крепко держаться за соседа. Давайте проверим нашу силу: возьмёмся за руки, закроем глаза и по сигналу все одновременно потянемся в разные стороны, не разрывая цепь!",r:"Дети в кругу, крепко держатся за руки. По команде «тянемся к солнцу» — все поднимают руки вверх, не разжимая ладоней. По команде «корни» — приседают, сохраняя контакт. Можно добавлять движения: «волна», «спираль». Важно: не причинять боль, чувствовать соседа. Игра завершается общим выдохом и аплодисментами себе.",c:"Цепь выдержала испытание! Мы почувствовали: вместе мы сильнее, и каждый из нас — важное звено."},
  {n:"Общий Пульс",t:["ИС/С","СЭФ","Доверие"],a:"универсальный",d:"10 мин",l:"помещение",p:"-",leg:"Закройте глаза и прислушайтесь к себе. А теперь — к соседу. Наша задача — синхронизировать дыхание и создать общий пульс отряда. Когда мы дышим в одном ритме — мы становимся одной командой, которая чувствует и понимает без слов.",r:"Дети сидят или стоят в кругу, глаза закрыты. Вожатый задаёт ритм дыхания: вдох на 4 счёта, выдох на 6. Группа подстраивается. Через 2-3 минуты вожатый убирает счёт — группа продолжает дышать синхронно «по памяти». Можно добавить лёгкое покачивание в такт. Игра завершается плавным открытием глаз и улыбкой.",c:"Пульс отряда бьётся в унисон — теперь мы настроены на одну волну и готовы действовать вместе."},
  {n:"Живая Конструкция",t:["ИС/С","ПЭФ","ИВЛ"],a:"универсальный",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Наш отряд — это конструктор, из которого можно собрать что угодно: башню, мост, звезду. Но собирать будем без слов! Каждый из вас — деталь, которая занимает своё место, чувствуя, куда её «пристраивают» другие. Давайте создадим живую скульптуру нашей команды!",r:"Дети стоят свободно. Вожатый называет фигуру («звезда», «круг», «башня»). Дети без слов, жестами и перемещениями, собирают общую фигуру. Важно: каждый находит своё место, помогает другим встроиться. Когда фигура готова — все замирают на 10 секунд. Можно сделать 2-3 фигуры.",c:"Конструкции собраны! Мы научились чувствовать пространство и роль каждого в общем замысле."},
  {n:"Круг Намерений",t:["ИС/С","ПЗ","СЭФ"],a:"универсальный",d:"10-12 мин",l:"без привязки",p:"-",leg:"Встаньте в круг, возьмитесь за руки и закройте глаза. Сейчас каждый из нас мысленно отправит в центр круга одно желание для нашей команды: чтобы мы были дружными, смелыми, весёлыми. Когда все отправят — мы вместе «вдохнём» эти намерения и станем сильнее.",r:"Дети в кругу, держатся за руки, глаза закрыты. Вожатый даёт 30 секунд на формулировку мысленного намерения. Затем по сигналу все одновременно делают глубокий вдох и выдох, «впитывая» общие желания. Можно повторить 2-3 цикла. Важно: тишина, концентрация, уважение к процессу.",c:"Намерения приняты! Теперь у нашей команды есть общая энергия и цель, которая будет нас поддерживать."},
  {n:"Танец Настроения",t:["ПЭФ","ПТБ","Здоровалки"],a:"младший",d:"8-10 мин",l:"помещение/улица",p:"смартфон с музыкой (опционально)",leg:"Ребята, представьте, что у нас в руках невидимые кисточки, которыми мы рисуем настроение танцем! Когда звучит весёлая музыка — мы танцуем как радостные зайчики, когда быстрая — как стремительные ракетки. Давайте зарядимся энергией и хорошим настроением!",r:"Дети свободно двигаются под музыку. Вожатый меняет жанры: весёлая детская, быстрая, с паузами. Даёт образы: «танцуем как облака», «как мячики», «как фейерверк». Важно: нет неправильных движений, каждый выражает себя. Игра завершается на пике веселья общим прыжком и криком «Ура!».",c:"Настроение на максимуме! Теперь у нас есть заряд бодрости на весь день."},
  {n:"Смехо-Эстафета",t:["ПЭФ","ИЗ","Минутки"],a:"младший",d:"7-10 мин",l:"без привязки",p:"-",leg:"У нас есть волшебный смех, который передаётся по цепочке, как искорка! Один начинает смеяться — «ха-ха», следующий подхватывает — «хи-хи», и так по кругу. Давайте устроим фейерверк смеха, который зарядит всех хорошим настроением!",r:"Дети в кругу. Первый издаёт любой смешной звук или смех. Сосед справа повторяет и добавляет свой. Цепочка идёт по кругу, звуки накладываются, создавая «хор смеха». Можно ускорять темп. Если кто-то стесняется — группа поддерживает. Игра завершается общим громким смехом.",c:"Смех обошёл всех — теперь у нас у всех поднялось настроение и появилось желание творить!"},
  {n:"Эмоциональный Взрыв",t:["ПЭФ","ПТБ","ИС/С"],a:"средний",d:"10-12 мин",l:"улица/помещение",p:"-",leg:"Представьте, что внутри у каждого из вас — маленький вулкан эмоций! По моему сигналу мы будем выпускать эти эмоции через движения: прыжки, хлопки, кричалки. Но не просто так, а в ритме, чтобы получился общий танец радости! Готовы взорваться позитивом?",r:"Дети в кругу. Вожатый задаёт ритм хлопками. По команде «вулкан просыпается» — все начинают двигаться в ритме, добавляя свои элементы: прыжки, повороты, звуки. Через минуту вожатый меняет ритм. Важно: не сталкиваться, уважать пространство. Финал — общий прыжок с криком «Бум!» и замирание в смешной позе.",c:"Эмоции выпущены! Теперь у нас лёгкое сердце и море энергии для новых приключений."},
  {n:"Кричалка-Пазл",t:["ПЭФ","ИС/С","Здоровалки"],a:"средний",d:"10 мин",l:"без привязки",p:"-",leg:"Мы с вами собираем супер-кричалку отряда, но не просто так! Каждый из вас придумает одну строчку, а мы сложим их в единый ритмичный призыв. Когда кричалка будет готова — мы исполним её так громко и дружно, чтобы весь лагерь услышал наш боевой настрой!",r:"Дети в кругу. Вожатый начинает: «Мы — отряд...». Первый участник добавляет слово или короткую фразу («весёлый!»), второй — следующую («и дружный!»). Так собирается 4-6 строк. Затем группа разучивает ритм и исполняет кричалку 3 раза, с движениями. Можно записать на телефон для памяти.",c:"Кричалка готова! Теперь у нас есть свой боевой девиз, который поднимает настроение в любую минуту."},
  {n:"Флешмоб-Импульс",t:["ПЭФ","ИС/С","ПТБ"],a:"старший",d:"15 мин",l:"улица/помещение",p:"смартфон с музыкой (опционально)",leg:"У нас есть 10 минут, чтобы создать мини-флешмоб, который зарядит энергией всех вокруг! Каждый предлагает одно движение, мы собираем их в цепочку, добавляем ритм — и вуаля! Готовы стать создателями позитивного вирусного момента?",r:"Дети в кругу. По очереди каждый предлагает короткое движение (хлопок, шаг, поворот). Вожатый или доброволец собирает 5-7 движений в последовательность. Группа разучивает под счёт, затем под музыку. Исполняют 2-3 раза, можно с импровизацией. Важно: поддержать каждого, кто предлагает идею.",c:"Флешмоб готов! Теперь у нас есть свой заряд бодрости, который можно показать другим и поднять настроение всему лагерю."},
  {n:"Энерго-Обмен",t:["ПЭФ","Доверие","ПТБ"],a:"старший",d:"12 мин",l:"помещение",p:"-",leg:"Встаньте в две шеренги лицом друг к другу. Сейчас мы будем обмениваться энергией через взгляды, улыбки и лёгкие касания ладоней. Один ряд «отправляет» позитив — другой «принимает» и усиливает. Через минуту меняемся. Давайте создадим поток хорошего настроения, который зарядит каждого!",r:"Дети в двух шеренгах. По сигналу первая шеренга делает шаг вперёд, улыбается, хлопает в ладоши партнёрам напротив, говорит «Заряжаю!». Вторая отвечает «Принимаю!» и добавляет своё движение. Через минуту шеренги меняются ролями. Можно добавить музыку. Завершается общим шагом навстречу и аплодисментами.",c:"Энерго-обмен завершён! Теперь каждый из нас заряжен позитивом и готов делиться им с окружающими."},
  {n:"Радуга Движений",t:["ПЭФ","ПТБ","Здоровалки"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Представьте, что каждый цвет радуги — это особое движение! Красный — прыжок, оранжевый — хлопок, жёлтый — поворот. Я называю цвет — вы выполняете движение. А когда назову «радуга» — все движения сразу! Давайте раскрасим наше настроение яркими красками!",r:"Дети свободно стоят. Вожатый называет цвета в разном порядке, темп ускоряется. На «радуга» — все выполняют любое весёлое движение. Можно добавить звуки. Важно: нет ошибок, только позитив. Игра завершается общим криком «Ура!» и прыжком.",c:"Радуга собрана! Теперь наше настроение такое же яркое и разноцветное, как настоящая радуга после дождя."},
  {n:"Бум-Хлоп-Прыг",t:["ПЭФ","Минутки","Здоровалки"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Мы играем в энергетическую зарядку: на слово «бум» — топаем, «хлоп» — хлопаем, «прыг» — подпрыгиваем. Темп буду ускорять, а я могу запутывать, называя слова не по порядку. Готовы проверить свою реакцию и зарядиться бодростью?",r:"Дети стоят. Вожатый называет слова в разном темпе и порядке. Дети выполняют соответствующие действия. Можно добавлять новые слова («вжик» — поворот, «ура» — крик). Кто ошибается — не выбывает, а просто смеётся и продолжает. Игра завершается на пике веселья.",c:"Зарядка прошла на ура! Теперь у нас быстрая реакция и море энергии для новых дел."},
  {n:"Волна Аплодисментов",t:["ПЭФ","ИС/С","Здоровалки"],a:"универсальный",d:"7-10 мин",l:"помещение/улица",p:"-",leg:"Давайте создадим живую волну аплодисментов, которая прокатится по нашему отряду и вернётся обратно! Каждый из вас — часть этой волны: когда доходит очередь, вы громко хлопаете и передаёте эстафету соседу. Почувствуйте, как растёт общий восторг!",r:"Дети в кругу или шеренге. Первый начинает хлопать, следующий подхватывает через секунду, создавая эффект «волны». Когда волна доходит до конца — она идёт обратно. Можно запускать две волны навстречу, ускорять темп. Завершается общими аплодисментами себе.",c:"Волна восторга прошла через каждого! Теперь мы чувствуем силу нашей общей энергии и поддержки."},
  {n:"Позитив-Пинг-Понг",t:["ПЭФ","ИЗ","Минутки"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Мы с вами играем в словесный пинг-понг, но вместо мячика — хорошие слова! Я говорю «радость», вы отвечаете «веселье», следующий — «смех» и так далее. Темп ускоряется, а мы заряжаемся позитивом, который летает между нами, как искорки!",r:"Дети в кругу. Вожатый начинает с позитивного слова. Следующий быстро говорит своё слово на ту же тему. Цепочка идёт по кругу. Если кто-то затрудняется — группа помогает. Можно менять темы: «качества друга», «летние радости». Игра завершается общим криком самого популярного слова.",c:"Позитив обошёл всех! Теперь у нас в запасе целая коллекция хороших слов и настроений."},
  {n:"Облако Спокойствия",t:["СЭФ","Доверие","ПТБ"],a:"младший",d:"8-10 мин",l:"помещение",p:"-",leg:"Ребята, представьте, что мы — лёгкие облака, которые плывут по небу. Давайте ляжем на спинки, закроем глазки и представим, как мягкий ветерок качает нас. Дышим медленно: вдох — облачко поднимается, выдох — опускается. Так мы отдохнём и наберёмся тишины.",r:"Дети ложатся на спину (на коврики/траву), закрывают глаза. Вожатый спокойным голосом ведёт визуализацию: «Представьте голубое небо, тёплое солнышко...». Даёт инструкции по дыханию. Через 3-4 минуты предлагает медленно потянуться и открыть глаза. Важно: полная тишина, кроме голоса вожатого.",c:"Облачка отдохнули! Теперь у нас спокойное сердце и ясные мысли для новых дел."},
  {n:"Тихий Лес",t:["СЭФ","ПТБ","ИС/С"],a:"младший",d:"10 мин",l:"улица/помещение",p:"-",leg:"Мы с вами попали в волшебный лес, где живут звуки тишины. Давайте станем деревьями: ноги — корни, руки — ветви. Закройте глаза и слушайте: как шепчет ветер, как поёт птица. А теперь сами станьте частью этой тишины — двигайтесь медленно и беззвучно.",r:"Дети стоят, закрывают глаза. Вожатый описывает звуки леса. Затем даёт задание: «Медленно поднимите руки-ветви... плавно покачайтесь...». Все движения — в тишине, без слов. Через 5 минут предлагает медленно «проснуться», открыть глаза, улыбнуться.",c:"Лес наполнил нас тишиной и спокойствием. Теперь мы можем действовать с ясной головой и добрым сердцем."},
  {n:"Дыхание Волны",t:["СЭФ","Доверие","ПТБ"],a:"средний",d:"10-12 мин",l:"помещение/улица",p:"-",leg:"Представьте, что вы стоите на берегу моря. Волна накатывается — вы делаете глубокий вдох, волна отступает — медленный выдох. Давайте синхронизируем наше дыхание с ритмом моря. Когда мы дышим вместе — мысли успокаиваются, а тело расслабляется.",r:"Дети стоят или сидят в кругу, глаза закрыты. Вожатый задаёт ритм: вдох на 4 счёта, задержка на 2, выдох на 6. Группа повторяет. Через 3-4 минуты вожатый убирает счёт — группа продолжает «по памяти». Можно добавить лёгкое покачивание. Завершается плавным открытием глаз.",c:"Волна унесла тревоги. Теперь мы спокойны, собраны и готовы к новым задачам с ясным умом."},
  {n:"Звёздный Дождь",t:["СЭФ","ПТБ","СЭФ"],a:"средний",d:"12 мин",l:"помещение",p:"-",leg:"Закройте глаза и представьте ночное небо. По нему медленно плывут звёзды, а иногда падает звёздный дождь — тихий, волшебный, умиротворяющий. Каждая падающая звезда уносит с собой тревогу и оставляет вместо неё спокойствие. Давайте вместе понаблюдаем за этим чудом.",r:"Дети сидят или лежат, глаза закрыты. Вожатый спокойным голосом ведёт визуализацию: описывает звёздное небо, падающие звёзды, ощущение покоя. Даёт паузы для самостоятельного «наблюдения». Через 5-7 минут предлагает медленно вернуться, потянуться, открыть глаза. Тишина сохраняется до конца.",c:"Звёздный дождь умыл наши мысли. Теперь внутри — тишина, ясность и готовность к новым свершениям."},
  {n:"Тишина Между Нотами",t:["СЭФ","Доверие","ПЗ"],a:"старший",d:"10-15 мин",l:"помещение",p:"-",leg:"В музыке важна не только нота, но и пауза между нотами. Давайте создадим общую тишину, в которой каждый сможет услышать себя. Сядьте удобно, закройте глаза. Мы не будем говорить, двигаться, издавать звуки — просто будем присутствовать здесь и сейчас, вместе.",r:"Дети сидят в кругу, глаза закрыты. Вожатый даёт инструкцию: «Просто наблюдайте за дыханием, за ощущениями в теле. Если приходят мысли — не гоните их, просто отпустите». Выдерживается 5-7 минут тишины. Затем вожатый мягко возвращает группу: «Медленно пошевелите пальцами, откройте глаза».",c:"Тишина наполнила нас. Теперь мы слышим себя и друг друга глубже, готовы к осознанным действиям."},
  {n:"Ручей Мыслей",t:["СЭФ","ПЗ","Доверие"],a:"старший",d:"12-15 мин",l:"помещение/улица",p:"-",leg:"Представьте, что ваши мысли — это листья, которые плывут по тихому ручью. Не нужно их ловить или менять — просто наблюдайте, как они появляются и уплывают. Давайте вместе посидим у этого ручья, чтобы очистить ум и обрести внутреннее равновесие.",r:"Дети сидят в удобной позе, глаза закрыты. Вожатый ведёт медитацию: описывает ручей, предлагает «отпускать» мысли, как листья. Акцент на наблюдении без оценки. Через 7-10 минут мягко возвращает внимание к телу, дыханию, звукам вокруг. Завершается глубоким вдохом и открытием глаз.",c:"Ручей унёс лишнее. Теперь ум ясен, сердце спокойно — мы готовы действовать с мудростью и балансом."},
  {n:"Свеча Спокойствия",t:["СЭФ","Доверие","ПТБ"],a:"универсальный",d:"8-10 мин",l:"помещение",p:"воображаемая свеча (можно использовать фонарик смартфона)",leg:"В центре нашего круга горит волшебная свеча спокойствия. Давайте по очереди «передавать» её взглядом: кто смотрит на свечу — дышит глубоко, кто получает взгляд — мягко кивает и тоже дышит. Так тишина и умиротворение обойдут каждого из нас.",r:"Дети в кругу. Вожатый начинает: смотрит на «свечу» (воображаемую или фонарик), делает глубокий вдох-выдох, затем переводит взгляд на соседа. Тот принимает «эстафету», повторяет дыхание, передаёт дальше. Важно: полная тишина, плавные движения. Игра завершается, когда «свеча» вернётся к вожатому.",c:"Свеча обошла всех. Теперь спокойствие живёт в каждом из нас и в нашей общей тишине."},
  {n:"Шёпот Ветра",t:["СЭФ","ПТБ","Минутки"],a:"универсальный",d:"7-10 мин",l:"без привязки",p:"-",leg:"Закройте глаза и представьте, что ветер шепчет вам на ушко что-то очень важное. Сейчас мы будем передавать этот шёпот по кругу: один наклоняется к соседу и очень тихо говорит одно хорошее слово, тот передаёт дальше. Слушайте внимательно — и сердцем, и ушами.",r:"Дети в кругу, глаза закрыты. Первый шепчет соседу справа одно позитивное слово («мир», «радость», «друг»). Тот передаёт дальше. Последний называет слово вслух — сравнивают с оригиналом. Можно играть на точность или просто на процесс. Важно: шёпот, тишина, концентрация.",c:"Шёпот ветра донёс до каждого доброе слово. Теперь у нас на душе тепло и спокойно."},
  {n:"Песок Времени",t:["СЭФ","Доверие","ПЗ"],a:"универсальный",d:"10 мин",l:"помещение",p:"-",leg:"Представьте, что в ваших ладонях — волшебный песок времени. Когда вы медленно пересыпаете его из одной руки в другую, уходит спешка, тревога, суета. Давайте вместе сделаем это: медленно, осознанно, в тишине. Почувствуйте, как время замедляется, а внутри наступает покой.",r:"Дети сидят или стоят, закрывают глаза. Вожатый даёт инструкцию: «Представьте песок... медленно пересыпайте... дышите ровно». Через 3-4 минуты предлагает «собрать» песок, сжать ладони, сделать глубокий вдох. Затем медленно открыть глаза. Тишина сохраняется до конца.",c:"Песок времени успокоил наши мысли. Теперь мы здесь и сейчас — собранные, спокойные, готовые к важному."},
  {n:"Круг Тишины",t:["СЭФ","Доверие","ИС/С"],a:"универсальный",d:"8-12 мин",l:"помещение/улица",p:"-",leg:"Встаньте в круг, возьмитесь за руки и закройте глаза. Сейчас мы создадим общее пространство тишины, в котором каждый может просто быть. Не нужно говорить, двигаться, думать о чём-то особенном — просто чувствуйте тепло рук соседей и своё дыхание.",r:"Дети в кругу, держатся за руки, глаза закрыты. Вожатый даёт 30 секунд на настройку. Затем выдерживается 3-5 минут тишины. Можно мягко напоминать: «чувствуйте дыхание», «слышите тишину». Завершается общим глубоким вдохом-выдохом и плавным открытием глаз.",c:"Тишина объединила нас. Теперь мы чувствуем связь друг с другом и внутри — спокойную уверенность."},
  {n:"Парный Танец Дружбы",t:["МПВ","ПТБ","ПЭФ"],a:"младший",d:"10 мин",l:"помещение/улица",p:"смартфон с музыкой (опционально)",leg:"Ребята, давайте научимся танцевать в парах, как настоящие друзья! Мальчики и девочки объединяются в пары, берутся за руки и повторяют простые движения за мной. Главное — улыбаться, не стесняться и чувствовать ритм вместе!",r:"Дети делятся на пары (мальчик+девочка, при нечётном количестве — одна тройка или вожатый в паре). Под музыку выполняют простые движения: шаг вперёд-назад, поворот, хлопок. Вожатый показывает, темп медленный. Через 2-3 минуты пары меняются. Важно: акцент на дружбе, а не на «романтике».",c:"Танец дружбы завершён! Теперь мы умеем двигаться в паре, не стесняясь, и чувствуем себя комфортно с любым партнёром."},
  {n:"Комплимент-Эстафета",t:["МПВ","ИЗ","ПЭФ"],a:"младший",d:"10-12 мин",l:"без привязки",p:"-",leg:"Сегодня мы учимся говорить друг другу добрые слова! Мальчики и девочки встают в два круга: внутренний и внешний. Когда музыка играет — кружимся, когда останавливается — находим пару и говорим комплимент: «Ты классно прыгаешь!», «У тебя красивая улыбка!».",r:"Дети образуют два круга: мальчики внутри, девочки снаружи (или наоборот). Под музыку движутся в разные стороны. Когда музыка останавливается, каждый находит напротив стоящего и говорит короткий добрый комплимент. Через 30 секунд музыка снова играет — круги сдвигаются, ищем новую пару. 4-5 раундов.",c:"Комплименты сказаны! Теперь мы умеем замечать хорошее в других и говорить об этом, независимо от того, мальчик ты или девочка."},
  {n:"Диалог Без Слов",t:["МПВ","Доверие","ПТБ"],a:"средний",d:"12-15 мин",l:"помещение",p:"-",leg:"Представьте, что вы с партнёром — два инопланетянина, которые не знают языка друг друга, но хотят подружиться. Ваша задача: за 2 минуты установить контакт без слов — только жестами, мимикой, взглядом. Мальчики и девочки объединяются в пары — давайте учиться понимать друг друга!",r:"Дети делятся на пары (разнополые). Встают лицом друг к другу. По сигналу начинают «общаться» без слов: жесты, улыбки, кивки. Задача — договориться о простом действии (например, одновременно поднять руку). Через 2 минуты — обсуждение в паре: что получилось, что было сложно. Затем пары меняются.",c:"Диалог состоялся! Мы увидели: понимать друг друга можно и без слов, главное — желание и уважение."},
  {n:"Общий Проект",t:["МПВ","ИС/С","ИВЛ"],a:"средний",d:"15-20 мин",l:"помещение",p:"бумага, маркеры, скотч (подручные средства)",leg:"Нам нужно создать плакат «Наш идеальный отряд», но работать будем в смешанных мини-группах: 2 мальчика + 2 девочки. Ваша задача: договориться, кто что рисует, и создать один общий рисунок, где виден вклад каждого. Давайте учиться сотрудничать!",r:"Дети делятся на группы по 4 человека (2+2). Каждая группа получает лист и материалы. За 10 минут создают плакат на тему. Важно: обсудить идею, распределить роли, учесть мнение всех. Затем — мини-презентация. Вожатый отмечает, как группы взаимодействовали.",c:"Плакат готов! Мы увидели: когда мальчики и девочки работают вместе, получается ярче, интереснее и дружнее."},
  {n:"Интервью-Партнёр",t:["МПВ","ПЗ","Доверие"],a:"старший",d:"15 мин",l:"без привязки",p:"-",leg:"Сейчас вы в парах (мальчик+девочка) проведёте мини-интервью: 3 минуты на вопросы, 3 минуты — ответы. Темы: «Что для тебя важно в дружбе?», «Какой ты в команде?». Цель — не оценить, а понять точку зрения другого. Давайте учиться слушать и слышать!",r:"Дети делятся на разнополые пары. Получают 2-3 вопроса от вожатого. По очереди задают и отвечают, активно слушая. Через 6 минут — краткий обмен впечатлениями в паре: «Что нового я узнал?». Затем можно обсудить в общем кругу (по желанию).",c:"Интервью завершены! Мы увидели: за разными взглядами часто скрываются общие ценности, а диалог помогает найти общий язык."},
  {n:"Ролевая Мозаика",t:["МПВ","ИВЛ","ИС/С"],a:"старший",d:"20 мин",l:"помещение/улица",p:"карточки с ролями (опционально)",leg:"Представьте, что мы снимаем короткий фильм о дружбе. В смешанных группах (3-4 человека) вы получите роли: режиссёр, актёр, сценарист, оператор. Ваша задача: за 10 минут придумать и показать сценку на 1 минуту, где важен вклад каждого. Давайте творить вместе!",r:"Дети делятся на группы (разнополые). Каждая получает набор ролей. За 10 минут готовят мини-сценку на тему «Настоящий друг». Затем показывают отряду. Вожатый отмечает, как группы распределяли роли, учитывали идеи, взаимодействовали.",c:"Фильмы показаны! Мы увидели: когда мальчики и девочки объединяют таланты, рождаются крутые идеи и крепкая дружба."},
  {n:"Зеркало-Партнёр Лайт",t:["МПВ","ПТБ","Доверие"],a:"универсальный",d:"10 мин",l:"без привязки",p:"-",leg:"Встаньте в пары (мальчик+девочка) лицом друг к другу. Один начинает делать плавные движения руками, а второй — как зеркало — повторяет. Через минуту меняетесь. Давайте учиться чувствовать ритм партнёра и доверять друг другу!",r:"Дети делятся на разнополые пары. Встают на расстоянии вытянутой руки. Один — ведущий, медленно двигает руками, телом. Второй — зеркало, повторяет. Важно: движения плавные, без резких рывков. Через 1-2 минуты — смена ролей. Можно добавить музыку.",c:"Зеркала настроены! Мы научились чувствовать партнёра и двигаться в унисон — так же будем понимать друг друга и в жизни."},
  {n:"Общий Ритм-Пары",t:["МПВ","ПЭФ","ПТБ"],a:"универсальный",d:"8-10 мин",l:"без привязки",p:"-",leg:"Мы с вами создаём общий ритм в парах! Мальчики и девочки объединяются, берутся за руки и по сигналу начинают отбивать ритм: хлопок-притоп-щелчок. Задача — синхронизироваться с партнёром, а потом — с другими парами. Давайте почувствуем единство!",r:"Дети в разнополых парах. Вожатый задаёт простой ритм. Пары повторяют. Через минуту пары объединяются в четвёрки, затем — весь отряд. Важно: слушать партнёра, подстраиваться, не соревноваться. Завершается общим ритмом и аплодисментами.",c:"Ритм стал общим! Мы увидели: когда мальчики и девочки слушают друг друга, получается гармония."},
  {n:"Вопрос-Доверие",t:["МПВ","ПЗ","СЭФ"],a:"универсальный",d:"12-15 мин",l:"без привязки",p:"карточки с вопросами (опционально)",leg:"В парах (мальчик+девочка) вы по очереди будете задавать друг другу лёгкие вопросы: «Что тебя радует?», «Какой твой любимый способ отдыхать?». Цель — не допросить, а узнать и понять. Давайте учиться задавать вопросы с уважением и слушать с интересом!",r:"Дети в разнополых парах. Получают 2-3 вопроса (или придумывают сами). По очереди задают и отвечают. Важно: не перебивать, не оценивать, слушать внимательно. Через 5-7 минут — краткий обмен впечатлениями: «Что удивило? Что понравилось?».",c:"Диалог состоялся! Мы увидели: за разными ответами скрываются общие мечты и ценности, а искренний вопрос сближает."},
  {n:"Совместный Рисунок",t:["МПВ","ИС/С","ПЭФ"],a:"универсальный",d:"15 мин",l:"помещение",p:"большой лист, маркеры/карандаши",leg:"Перед вами чистый лист, а у вас в парах (мальчик+девочка) — по маркеру. Ваша задача: нарисовать одну картину, не договариваясь словами. Просто чувствуйте партнёра, дополняйте его линии, создавайте общее. Давайте творить вместе, без слов!",r:"Дети в разнополых парах. Каждая пара получает лист и 2 маркера. За 10 минут рисуют одну картину без слов. Важно: не занимать всё место, реагировать на линии партнёра, дополнять. Затем — мини-выставка и обсуждение: «Что получилось? Как договаривались?».",c:"Картины готовы! Мы увидели: когда мальчики и девочки творят вместе, рождаются неожиданные и красивые идеи."},
  {n:"Волна-Привет",t:["Игры с залом","ПЭФ","Здоровалки"],a:"младший",d:"5-7 мин",l:"помещение/улица",p:"-",leg:"Ребята, сейчас мы с вами станем одной большой волной, которая может бежать по всему залу! Я буду показывать движения, а вы — повторять за мной и передавать соседу. Когда волна добежит до конца — мы вместе крикнем «Ура!» и начнём наше мероприятие!",r:"Дети сидят или стоят рядами. Вожатый на сцене показывает движение (хлопок, взмах руками, прыжок). Первый ряд повторяет и «передаёт» движение следующему ряду. Когда волна доходит до конца — все вместе выполняют финальное действие и кричат «Ура!». Можно запустить 2-3 волны с разными движениями.",c:"Волна добежала! Теперь мы заряжены энергией и готовы к празднику."},
  {n:"Эхо-Команда",t:["Игры с залом","ПЭФ","Минутки"],a:"младший",d:"5 мин",l:"помещение",p:"микрофон (опционально)",leg:"Представьте, что этот зал — волшебная пещера, которая повторяет за нами всё, что мы делаем! Я говорю слово или показываю движение — а вы хором и дружно отвечаете. Давайте проверим, насколько громко и слаженно умеет отвечать наше эхо!",r:"Вожатый на сцене говорит короткие фразы («Раз-два-три!», «Мы — команда!») или показывает движения. Зал хором повторяет. Темп ускоряется, фразы становятся веселее. Можно делить зал на сектора и запускать «эхо» по очереди. Завершается общим криком девиза мероприятия.",c:"Эхо ответило! Теперь мы звучим как одна команда и готовы к старту."},
  {n:"Ритм-Зал",t:["Игры с залом","ПЭФ","ИС/С"],a:"средний",d:"7-10 мин",l:"помещение",p:"смартфон с битом (опционально)",leg:"Сейчас мы превратим этот зал в один большой музыкальный инструмент! Я задаю ритм хлопками — вы подхватываете. Затем добавляем притопы, щелчки, кричалки. Когда весь зал зазвучит в унисон — мы готовы начинать наше мероприятие на высокой ноте!",r:"Вожатый на сцене задаёт простой ритм (хлоп-хлоп-притоп). Зал повторяет. Постепенно добавляются новые элементы: щелчки, крик «Эй!», движение руками. Можно делить зал на сектора и запускать ритм по очереди, затем объединять. Финал — общий мощный ритм и крик «Поехали!».",c:"Зал настроен! Теперь мы звучим как один оркестр и готовы к действию."},
  {n:"Кричалка-Эстафета",t:["Игры с залом","ПЭФ","Здоровалки"],a:"средний",d:"7 мин",l:"без привязки",p:"-",leg:"Давайте создадим общую кричалку, которая прокатится по залу как эстафета! Я начинаю: «Кто готов?» — левая часть зала отвечает: «Мы готовы!». Правая часть добавляет: «К победе!». А потом — все вместе кричим финал! Погнали!",r:"Вожатый делит зал на 2-3 сектора. Запускает фразу по секторам: каждый добавляет свою часть. Затем все сектора объединяют фразу и кричат хором. Можно повторить с разными кричалками, ускорять темп, добавлять движения. Завершается общим мощным криком.",c:"Кричалка собрана! Теперь наш зал звучит как один голос — мы готовы к старту!"},
  {n:"Импульс-Зал",t:["Игры с залом","ПЭФ","ИС/С"],a:"старший",d:"8-10 мин",l:"помещение",p:"световое сопровождение (опционально)",leg:"Представьте, что этот зал — электрическая цепь, а вы — её элементы. Я запускаю импульс: хлопок, взмах, крик — а вы передаёте его дальше, усиливая. Когда импульс обойдёт весь зал и вернётся — мы вместе включим «полную мощность» и начнём мероприятие!",r:"Вожатый на сцене запускает «импульс»: движение + звук. Первый ряд повторяет и передаёт следующему. Импульс бежит по залу, можно менять направление, ускорять. Когда возвращается — все вместе выполняют финальное действие (прыжок + крик). Можно запускать 2-3 импульса с разными паттернами.",c:"Импульс замкнул цепь! Теперь мы заряжены на максимум и готовы к событию."},
  {n:"Флеш-Разогрев",t:["Игры с залом","ПЭФ","ПТБ"],a:"старший",d:"10 мин",l:"помещение",p:"смартфон с музыкой (опционально)",leg:"У нас есть 5 минут, чтобы превратить этот зал в площадку для мини-флешмоба! Я показываю 3-4 простых движения — вы разучиваете по секторам, а потом выполняем все вместе под музыку. Готовы зарядить зал энергией перед стартом?",r:"Вожатый на сцене показывает 3-4 движения (хлопок, шаг, поворот, жест). Зал разучивает по секторам, затем объединяет. Под музыку выполняется 2-3 раза, можно с импровизацией. Финал — общее движение + крик девиза. Важно: поддержать каждого, кто вовлекается.",c:"Флеш готов! Теперь зал заряжен, энергия на пике — начинаем!"},
  {n:"Сигнал-Старт",t:["Игры с залом","ПЭФ","Минутки"],a:"универсальный",d:"5 мин",l:"без привязки",p:"-",leg:"Сейчас мы научимся реагировать на сигналы, как одна команда! На слово «раз» — хлопаем, «два» — топаем, «три» — кричим «Старт!». Темп буду ускорять, а вы — ловить ритм. Когда справимся — значит, готовы начинать мероприятие!",r:"Вожатый называет слова-сигналы в разном порядке и темпе. Зал выполняет соответствующие действия. Можно добавлять новые сигналы, путать, ускорять. Кто ошибается — не выбывает, а смеётся и продолжает. Завершается общим выполнением всех сигналов подряд и криком «Старт!».",c:"Сигналы приняты! Теперь мы на одной волне и готовы к действию."},
  {n:"Хлопок-По-Цепочке",t:["Игры с залом","ПЭФ","ИС/С"],a:"универсальный",d:"5-7 мин",l:"без привязки",p:"-",leg:"Давайте запустим по залу волну хлопков, которая обойдёт каждого и вернётся ко мне! Первый ряд хлопает — второй подхватывает, и так по цепочке. Когда волна вернётся — мы все вместе сделаем финальный хлопок и начнём наше событие!",r:"Дети сидят рядами. Вожатый даёт сигнал первому ряду — они хлопают. Второй ряд подхватывает через секунду, создавая эффект волны. Когда волна доходит до конца — она идёт обратно. Можно запускать 2 волны навстречу, ускорять темп. Завершается общим хлопком и криком «Поехали!».",c:"Волна вернулась! Теперь мы чувствуем ритм друг друга и готовы к старту."},
